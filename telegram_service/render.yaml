# Render Blueprint — 경량 오답 발송 서비스
# Render 대시보드에서 이 저장소 연결 시 자동 인식됩니다.
services:
  - type: web
    name: distribution-wrong-bot
    runtime: python
    rootDir: telegram_service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false                       # 대시보드에서 직접 입력 (비밀)
      - key: TELEGRAM_CHANNEL
        value: "@licencedistribute"
      - key: TELEGRAM_TIMEZONE
        value: Asia/Seoul
      - key: ALLOW_ORIGINS
        value: https://witkoreachj0321.github.io
