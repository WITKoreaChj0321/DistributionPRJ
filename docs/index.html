"4":"자사가 기존에 가지고 있는 마케팅 믹스체계와 일치하는 지를 살펴보아야 한다.","5":"선택할 시장이 자사가 가지고 있는 목표 및 이미지와 일 치하는지 살펴보아야 한다."},"ans":3},{"year":"2022년 2회","num":54,"subj":"유통마케팅","q":"셀프서비스를 활용한 상품판매의 특징으로 가장 옳지 않은 것은?","opts":{"1":"영업시간의 유연성 증가","2":"소매점의 판매비용 절감","3":"고객에게 전달되는 상품정보의 정확성 향상","4":"구매과정에 대한 고객의 자기통제력 향상","5":"직원의 숙련도와 상관없는 비교적 균일한 서비스제공"},"ans":3},{"year":"2022년 2회","num":55,"subj":"유통마케팅","q":"고객생애가치(CLV: customer lifetime value)에 대한 설명으 로 가장 옳지 않은 것은?","opts":{"1":"CLV는 어떤 고객으로부터 얻게 되는 전체 이익흐름의 현재가치를 의미한다.","2":"충성도가 높은 고객은 반드시 CLV가 높다.","3":"CLV를 증대시키려면 고객에게 경쟁자보다 더 큰 가치를 제공해야 한다.","4":"CLV 관리는 단속적 거래보다는 장기적 거래관계를 통한 이익에 집중한다.","5":"올바른 CLV를 정확하게 산출하려면 수입흐름 뿐만 아니 라 고객획득비용이나 고객유지비용 같은 비용 흐름도 고 려해야 한다."},"ans":2},{"year":"2022년 2회","num":56,"subj":"유통마케팅","q":"판매촉진 방법 가운데 프리미엄(premium)의 장점으로 가장 옳지 않은 것은?","opts":{"1":"지속적으로 사용해도 제품 자체 이미지에 손상을 가져 오지 않는다.","2":"많은 비용을 투입하지 않으면서 신규고객을 확보하는 효 과적인 방법이다.","3":"제품에 별도의 매력을 부가함으로써 부족할 수 있는 상 품력을 보완할 수 있다.","4":"제품수준이 평준화되어 차별화가 어려운 상황에서 특히 효과적이다.","5":"치열한 경쟁상황에서 제품에 대한 주목률을 높여주고 특 히 구매시점에 경쟁제품보다 돋보이게 한다."},"ans":2},{"year":"2022년 2회","num":59,"subj":"유통마케팅","q":"단수가격설정정책(odd pricing)에 대한 설명으로 옳은 것은?","opts":{"1":"최대한 인하된 상품 가격이라는 인상을 주어 판매량을 증가시키기 위해 가격을 990원, 1,990원처럼 설정하는 것을 말한다.","2":"가격이 높을수록 우수한 품질이나 높은 지위를 상징하는 경우에 주로 사용된다.","3":"캔음료나 껌처럼 오랫동안 같은 가격을 지속적으로 유지 함으로써 소비자가 그 가격을 당연하게 받아들이는 것을 말한다.","4":"같은 계열에 속하는 몇 개의 제품 가격을 품질에 따라 1 만원, 3만원, 5만원 등으로 설정하는 것을 말한다.","5":"고객을 모으기 위해서 특정 제품을 아주 저렴한 가격으 로 판매하는 방법이다."},"ans":1},{"year":"2022년 2회","num":60,"subj":"유통마케팅","q":"고객 서비스는 사전적 고객 서비스, 현장에서의 고객서비스, 사후적 고객 서비스로 구분해볼 수 있다. 다음 중 사전적 고객 서비스 요소로 가장 옳은 것은?","opts":{"1":"자사의 경영철학에 따라 서비스에 관한 표준을 정하고 조직을 편성하여 교육 및 훈련한다.","2":"구매계획이나 공급 여력 등에 따라 발생할지 모르는 재 고품절을 방지하기 위해 적정 재고수준을 유지한다.","3":"고객의 주문 상황이나 기호에 맞는 상품의 주문을 위한 정보시스템을 효율적으로 관리·운영한다.","4":"고객의 상품 주문에서부터 상품 인도에 이르기까지 적절 한 물류서비스를 공급한다.","5":"폭넓은 소비자 선택을 보장하기 위해 가능한 범위 내에 서 다양한 상품을 진열하고 판매한다."},"ans":1},{"year":"2022년 2회","num":61,"subj":"유통마케팅","q":"아래 글상자의 사례들에 해당하는 유통경쟁전략으로 가장 옳은 것은?","opts":{"1":"편의성 증대 ② 정보기술의 도입 및 확대","2":"","3":"점포 포지셔닝 강화 ④ 유통업체 브랜드의 확대","4":"","5":"e-커머스 확대 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":3,"img":["boxes/2022_2_61.png"]},{"year":"2022년 2회","num":62,"subj":"유통마케팅","q":"과자나 라면 같은 상품들을 정돈하지 않고 뒤죽박죽으로 진 열하여 소비자들에게 저렴한 특가품이라는 인상을 주려는 진열방식의 명칭으로 가장 옳은 것은?","opts":{"1":"돌출진열(extended display)","2":"섬진열(island display)","3":"점블진열(jumble display)","4":"후크진열(hook display)","5":"골든라인진열(golden line display)"},"ans":3},{"year":"2022년 2회","num":63,"subj":"유통마케팅","q":"다음의 여러 가격결정 방법 중에서 원가중심 가격결정 (cost-oriented pricing)방법에 해당하지 않는 것은?","opts":{"1":"원가가산법(cost plus pricing)","2":"손익분기점 가격결정법(breakeven pricing)","3":"목표이익 가격결정법(target-profit pricing)","4":"지각가치 중심 가격결정법(perceived value pricing)","5":"이폭가산법(markup pricing)"},"ans":4},{"year":"2022년 2회","num":64,"subj":"유통마케팅","q":"고객관계관리(CRM)에 대한 접근방법으로 가장 옳지 않은 것은?","opts":{"1":"마케팅부서만이 아닌 전사적 관점에서 고객지향적인 전 략적 마케팅활동을 수행한다.","2":"전사적 자원관리(ERP) 시스템을 통해 고객정보를 파악하 고 분석한다.","3":"데이터마이닝 기법을 활용해 고객행동에 내재돼 있는 욕 구(needs)를 파악한다.","4":"고객과의 관계 강화를 지속적으로 모색하는 고객중심 비 즈니스모델을 수립한다.","5":"표적고객에 대한 고객관계 강화에 집중하며 고객점유율 향상에 중점을 둔다."},"ans":2},{"year":"2022년 2회","num":66,"subj":"유통마케팅","q":"점포의 구성 및 설계에 대한 설명으로 옳지 않은 것은?","opts":{"1":"포스 죠닝(POS zoning)은 판매가 이루어지는 마지막 접 점이므로 최대한 고객의 체류시간을 늘려야 한다.","2":"매장의 주통로는 고객의 편안한 이동을 제공하는 동시에 보조통로들과 잘 연계되게 구성해야 한다.","3":"공간면적당 판매생산성 향상을 고려하여 매장 내의 유휴 공간이 없도록 레이아웃을 구성해야 한다.","4":"동선 폭은 고객의 편의를 고려해 유동성과 체류시간 등 의 동선 혼잡도를 예상하여 결정해야 한다.","5":"표적고객을 최대한 명확하게 설정하고 상품 관련성을 고 려하여 상품을 군집화한다."},"ans":1},{"year":"2022년 2회","num":69,"subj":"유통마케팅","q":"아래 글상자의 괄호 안에 들어갈 용어를 순서대로 나열한 것으로 가장 옳은 것은?","opts":{"1":"㉠ 상품계열, ㉡ 상품품목 ② ㉠ 상품형태, ㉡ 상품지원","2":"","3":"㉠ 상품품목, ㉡ 상품계열 ④ ㉠ 상품지원, ㉡ 상품형태","4":"","5":"㉠ 상품형태, ㉡ 상품계열"},"ans":1,"img":["boxes/2022_2_69.png"]},{"year":"2022년 2회","num":72,"subj":"유통마케팅","q":"의사결정시스템에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"최고경영층은 주로 비구조적 의사결정에 대한 문제에 직 면해 있고, 운영층은 주로 구조적 의사결정에 대한 문제 에 직면해 있다.","2":"의사결정지원시스템을 이용해 의사결정의 품질을 높이기 위해서는 의사결정지원시스템에서 활용하는 데이터의 품 질을 개선해야 한다.","3":"의사결정지원시스템은 수요 예측 문제, 민감도 분석 등 에 활용된다.","4":"운영층은 주로 의사결정지원시스템을 이용해 마케팅 계 획 설계, 예산 수립 계획 등과 같은 업무를 수행한다.","5":"의사결정지원시스템의 의사결정 품질 개선을 위해 딥러 닝(deep learning)과 같은 고차원적 알고리즘(algorithm) 이 활용된다."},"ans":4},{"year":"2022년 2회","num":74,"subj":"유통마케팅","q":"바코드에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"유통업체의 재고관리와 판매관리에 도움을 제공한다.","2":"국가표준기관에 의해 관리되고 있다.","3":"컬러 색상은 인식하지 못하고, 흑백 색상만 인식한다.","4":"스캐너 또는 리더기를 이용하여 상품 관련 정보를 간편 하게 읽어들일 수 있다.","5":"바코드에는 국가코드, 제조업체코드, 상품품목코드 등에 대한 정보가 저장되어 있다."},"ans":3},{"year":"2022년 2회","num":75,"subj":"유통마케팅","q":"아래 글상자의 내용을 지칭하는 용어로 가장 옳은 것은?","opts":{"1":"오프쇼어링(off-shoring)","2":"커스터마이징(customizing)","3":"매스커스터마이제이션(masscustomization)","4":"긱 이코노미(gig economy)","5":"리쇼어링(reshoring)"},"ans":4,"img":["boxes/2022_2_75.png"]},{"year":"2022년 2회","num":77,"subj":"유통정보","q":"유통정보시스템 이용에 있어서 정보보안의 주요 목표에 대 한 내용으로 가장 옳은 것은?","opts":{"1":"허락받지 않은 사용자가 정보를 변경해서는 안되는 것은 기밀성이다.","2":"정보의 소유자가 원치 않으면 정보를 공개할 수 없는 것 은 무결성이다.","3":"보낸 이메일을 상대가 읽었는지 알 수 있는 수신 확인 기능은 부인방지 원칙을 잘 반영한 것이다.","4":"웹사이트에 접속하려고 할 때 에러 등 서비스 장애가 일 어나는 것은 무결성이 떨어진다고 볼 수 있다. 최강 자격","5":""},"ans":3},{"year":"2022년 2회","num":78,"subj":"유통정보","q":"유통업체에서 새로운 비즈니스 모델을 개발하고자 할 때 사 용하는 비즈니스 모델 캔버스를 구성하는 요인에 대한 설명 으로 가장 옳지 않은 것은?","opts":{"1":"유통채널이란 기업이 고객에게 가치를 전달하는 경로이 다.","2":"고객 세분화란 고객이 무언가를 수행하는 것을 도움으로 써 가치를 창출할 수 있다는 것이다.","3":"핵심자원은 기업이 비즈니스를 수행하는데 핵심이 되는 중요한 자산이다.","4":"고객관계 구축이란 우량 고객과 비우량 고객을 구분하 고, 차별화된 관리방안을 마련하는 것을 의미한다.","5":"핵심 파트너십은 비즈니스 생태계에서 원만한 기업관계 를 구축하기 위한 핵심역량을 말한다."},"ans":2},{"year":"2022년 2회","num":81,"subj":"유통정보","q":"고객관리를 최적화하기 위해 활용되는 비즈니스 인텔리전스 (Business Intelligence: BI)에 대한 설명으로 가장 옳지 않 은 것은?","opts":{"1":"BI는 의사결정자에게 적절한 시간, 적절한 장소, 적절한 형식의 실행가능한 방식으로 정보를 제공한다.","2":"BI는 사물인터넷 기술을 이용해서 새로운 데이터를 수집 하는 기능을 제공한다.","3":"BI는 데이터 마이닝이나 OLAP 등의 다양한 분석도구를 사용하여 의사결정에 필요한 정보를 제공한다.","4":"BI는 발생된 사건의 내부 데이터, 구조화된 데이터, 히스 토리컬 데이터(historical data) 등에 대한 분석기능을 제 공한다. 격증 기출문제 전자문제집 CBT : www.comcbt.com","5":""},"ans":2},{"year":"2022년 2회","num":82,"subj":"유통정보","q":"일반 상거래와 비교할 때, 전자상거래의 차별화된 특성을 설명한 것으로 가장 옳지 않은 것은?","opts":{"1":"고객과 대화형 비즈니스 모델로의 변이가 가능하다.","2":"인터넷 비즈니스는 시간적, 공간적 제약 없이 실시간으 로 운영 가능하다.","3":"재고부담을 최소화하면서 기술개발과 마케팅에 더 많은 투자를 한다.","4":"변화에 대한 융통성은 프로세스에 의존하기보다는 유형 자산에 의존한다.","5":"동시다발적 비즈니스 요소가 성립하며 포괄적 비즈니스 모델에 의한 운영이 가능하다."},"ans":4},{"year":"2022년 2회","num":83,"subj":"유통정보","q":"아래 글상자의 괄호 안에 들어갈 용어를 순서대로 나열한 것으로 가장 옳은 것은?","opts":{"1":"㉠ 블록체인, ㉡ DID(Decentralized Identity)","2":"㉠ 금융권 공동인증, ㉡ OID(Open Identity)","3":"㉠ 블록체인, ㉡ PID(Personality Identity)","4":"㉠ 블록체인, ㉡ OID(Open Identity)","5":"㉠ 공인인증, ㉡ DID(Decentralized Identity)"},"ans":1,"img":["boxes/2022_2_83.png"]},{"year":"2022년 2회","num":84,"subj":"유통정보","q":"QR(Quick Response)에 대한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"QR은 1980년대 중반 미국의 의류업계와 유통업체가 상 호 협력하면서 시작되었다.","2":"QR의 도입으로 기업은 리드타임의 증가, 재고비용의 감 소, 판매의 증진 등의 획기적인 성과를 거둘 수 있다.","3":"QR이 업계 전반에 걸쳐 확산되기 위해서는 유통업체마 다 각각 다르게 운영되고 있는 의류상품에 대한 상품분 류체계를 표준화하여야 한다.","4":"미국의 식품업계는 QR에 대한 벤치마킹을 통해 식품업 계에 적용할 수 있는 SCM 시스템인 ECR을 개발하였다.","5":"QR의 핵심은 유통업체가 제조업체에게 판매된 의류에 대한 정보를 매일 정기적으로 제공함으로써 제조업체로 하여금 판매가 부진한 상품에 대해서는 생산을 감축하고 잘 팔리는 상품의 생산에 주력할 수 있도록 하는데 있 다."},"ans":2},{"year":"2022년 2회","num":86,"subj":"유통정보","q":"노나카 이쿠지로 교수가 제시한 지식변환 프로세스에서 암 묵적 형태로 존재하는 지식을 형식화하여 수집 가능한 데이 터로 생성시켜 공유가 가능하도록 만드는 과정을 일컫는 용 어로 옳은 것은?","opts":{"1":"공동화(socialization) ② 지식화(intellectualization)","2":"","3":"외부화(externalization) ④ 내면화(internalization)","4":"","5":"연결화(combination)"},"ans":3},{"year":"2022년 2회","num":90,"subj":"유통정보","q":"아래 글상자의 내용과 관련있는 용어로 가장 옳은 것은?","opts":{"1":"마이데이터 ② BYOD(Bring Your Own Device)","2":"","3":"개인 핀테크 ④ 디지털 전환","4":"","5":"빅테크 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":1,"img":["boxes/2022_2_90.png"]},{"year":"2022년 3회","num":1,"subj":"유통물류일반","q":"국제물류주선업에 관련된 설명으로 가장 옳지 않은 것은?","opts":{"1":"화주에게 운송에 관련된 최적의 정보를 제공하고 물류비, 인력 등을 절감하는 데 도움을 줄 수 있다.","2":"일반적으로 선사는 소량화물을 직접 취급하지 않기 때문 에 소량화물의 화주들에게는 무역화물운송업무의 간소화 와 운송비용 절감의 혜택을 제공할 수 있다.","3":"국제물류주선인은 다수의 화주로부터 위탁받은 화물로 선 사에 보다 효과적인 교섭권을 행사하여 유리한 운임률 유 도를 통해 규모의 경제 효과를 창출할 수 있다.","4":"안정적 물량 확보를 위해 선사는 국제물류주선인과 계약 하는 것보다 일반화주와 직접 계약하는 것이 유리하다.","5":"NVOCC(Non-Vessel Operating Common Carrier)는 실제 운송인형 복합운송인에 속하지 않는다."},"ans":4},{"year":"2022년 3회","num":2,"subj":"유통물류일반","q":"소비자기본법(법률 제17799호, 2020.12.29., 타법개정)에 의 한 소비자의 기본적 권리로만 바르게 짝지어진 것은?","opts":{"1":"㉠, ㉡, ㉢, ㉣, ㉤ ② ㉠, ㉡, ㉢","2":"","3":"㉠, ㉡, ㉣ ④ ㉡, ㉢, ㉤","4":"","5":"㉡, ㉣, ㉤"},"ans":3,"img":["boxes/2022_3_2.png"]},{"year":"2022년 3회","num":3,"subj":"유통물류일반","q":"재고관리에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"소비자가 원하는 상품을 적시에 제공하기 위하여 소매점 은 항상 적절한 양의 재고를 보유해야 할 필요가 있다.","2":"재고가 지나치게 많을 경우, 적절한 시기에 처분하기 위 해 상품가격을 인하시켜 판매하기 때문에 투매손실이 발 생할 수 있다.","3":"재고가 너무 적은 경우 소비자의 수요에 대응할 수 없는 기회손실이 발생할 수 있다.","4":"투매손실이나 기회손실이 발생하지 않도록 하기 위해서 유지해야 하는 적정 재고량은 표준재고이다.","5":"재고가 적정 수준 이하가 되면 미리 결정해둔 일정주문량 을 발주하는 방법은 상황 발주법이다."},"ans":5},{"year":"2022년 3회","num":5,"subj":"유통물류일반","q":"산업재와 유통경로에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"산업재는 원자재의 저가격협상과 수급연속성, 안정적인 공급경로의 구축이 중요하다.","2":"설비품(고정장비)은 구매결정자의 지위가 낮으며 단위당 가격이 낮고 단기적 거래가 많다.","3":"윤활유, 잉크 등과 같은 운영소모품의 거래는 구매 노력 이 적게 들기에 구매결정자의 지위나 가격이 낮다. 최강 자격","4":"","5":""},"ans":2},{"year":"2022년 3회","num":6,"subj":"유통물류일반","q":"JIT(Just-in-time)와 JIT(Just-in-time) Ⅱ와의 차이점에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"JIT는 부품과 원자재를 원활히 공급받는 데 초점을 두고, JITⅡ는 부품, 원부자재, 설비공구, 일반자재 등 모든 분 야를 공급받는 데 초점을 둔다.","2":"JIT가 개별적인 생산현장(plant floor)을 연결한 것이라면, JITⅡ는 공급체인 상의 파트너의 연결과 그 프로세스를 변화시키는 시스템이다.","3":"JIT는 자사 공장 내의 무가치한 활동을 감소ㆍ제거하는데 주력하고, JITⅡ는 기업 간의 중복업무와 무가치한 활동을 감소ㆍ제거하는데 주력한다.","4":"JIT가 풀(pull)형인 MRP와 대비되는 푸시(push)형의 생산 방식인데 비해, JITⅡ는 JIT와 MRP를 동시에 수용할 수 있는 기업 간의 운영체제를 의미한다.","5":"JIT가 물동량의 흐름을 주된 개선대상으로 삼는 데 비해, JITⅡ는 기술, 영업, 개발을 동시화(synchronization)하여 물동량의 흐름을 강력히 통제한다."},"ans":4},{"year":"2022년 3회","num":7,"subj":"유통물류일반","q":"공급사슬관리(SCM)를 위해 활용할 수 있는 지연전략 (postponement strategy)에 대한 설명으로 가장 옳은 것은?","opts":{"1":"지연전략은 고객의 수요를 제품설계에 반영하기 위해 완 제품의 재고보유 시간을 최대한 연장시키는 전략이다.","2":"주문 이전에는 모든 스웨터를 하얀색으로 생산한 후 주문 이 들어오면 염색을 통해 수요에 맞춰 공급하는 것은 지 리적 지연전략이다.","3":"가장 중요한 창고에 재고를 유지하며, 지역 유통업자들에 게 고객의 주문을 넘겨주거나 고객에게 직접 배송하는 것 은 제조 지연전략이다.","4":"컴퓨터의 경우, 유통센터에서 프린터, 웹캠 등의 장치를 조립하거나 포장하는 것은 지리적 지연전략이다.","5":"자동차를 판매할 때 사운드 시스템, 선루프 등을 설치옵 션으로 두는 것은 결합 지연전략이다."},"ans":5},{"year":"2022년 3회","num":9,"subj":"유통물류일반","q":"각 점포가 독립된 회사라는 점에서 프랜차이즈 체인방식과 같지만, 조직의 주체는 가맹점이며 전 가맹점이 경영의 의사 결정에 참여한다는 차이점이 있는 연쇄점(chain)의 형태로 가 장 옳은 것은?","opts":{"1":"정규연쇄점(regular chain)","2":"직영점형 연쇄점(corporate chain)","3":"조합형 연쇄점(cooperative chain)","4":"마스터 프랜차이즈(master franchise)","5":"임의형 연쇄점(voluntary chain)"},"ans":5},{"year":"2022년 3회","num":12,"subj":"유통물류일반","q":"제품/시장 확장그리드(product/market expansion grid)에서 기존제품을 가지고 새로운 세분시장을 파악해서 진출하는 방식의 기업성장전략으로 가장 옳은 것은?","opts":{"1":"시장침투전략(market penetration strategy)","2":"시장개발전략(market development strategy)","3":"제품개발전략(product development strategy)","4":"다각화전략(diversification strategy)","5":"수평적 다각화전략(horizontal diversification strategy)"},"ans":2},{"year":"2022년 3회","num":13,"subj":"유통물류일반","q":"공급사슬을 효율적 공급사슬과 반응적 공급사슬로 구분하여 설계할 때 반응적 공급사슬에 대한 특징으로 가장 옳지 않 은 것은?","opts":{"1":"리드타임을 적극적으로 단축하려 노력한다.","2":"여유생산능력이 높다.","3":"저가격, 일관된 품질이 납품업체 선정기준이다.","4":"제품 혹은 서비스의 다양성을 강조하는 생산전략이다.","5":"신속한 납기가 가능할 정도의 재고 투자를 한다."},"ans":3},{"year":"2022년 3회","num":15,"subj":"유통물류일반","q":"프로젝트 조직에 대한 내용으로 가장 옳지 않은 것은?","opts":{"1":"과제 진행에 따라 인력 구성의 탄력성이 존재한다.","2":"목적달성을 지향하는 조직이므로 구성원들의 과제해결을 위한 사기를 높일 수 있다.","3":"기업 전체의 목적보다는 사업부만의 목적달성에 더 관심 을 기울이게 된다.","4":"해당 조직에 파견된 사람은 선택된 사람이라는 우월감이 조직 단결을 저해하기도 한다.","5":"전문가로 구성된 일시적인 조직이므로 그 조직 관리자의 지휘능력이 중요하다."},"ans":3},{"year":"2022년 3회","num":16,"subj":"유통물류일반","q":"소비재의 유형별로 일반적인 경로목표를 설정할 경우에 대 한 설명으로 가장 옳지 않은 것은?","opts":{"1":"편의품의 경우 최대의 노출을 필요로 하기에 개방적 유 통을 사용한다.","2":"일부 의약품은 고객 편의를 위해 편의점을 통한 개방적 유통을 사용하기도 한다.","3":"이질적 선매품의 경우 품질비교가 가능하도록 유통시킨 다.","4":"동질적 선매품의 경우 가격비교가 용이하도록 유통시킨 다.","5":"전문품은 구매횟수가 정기적인 것이 특징이기에 개방적 유통을 사용한다."},"ans":5},{"year":"2022년 3회","num":17,"subj":"유통물류일반","q":"A사의 제품은 연간 19,200개 정도가 판매될 것으로 예상되 고 있다. 제품의 1회 주문비용은 150원, 제품당 연간 재고 유지비가 9원이라고 할 때 경제적주문량(EOQ)으로 가장 옳 은 것은?","opts":{"1":"600개 ② 650개","2":"","3":"700개 ④ 750개","4":"","5":"800개"},"ans":5},{"year":"2022년 3회","num":19,"subj":"유통물류일반","q":"인플레이션 상황에서 급격한 가격인상 없이 매출과 수익의 손실을 막기 위해 유통기업들이 채택할 수 있는 방법으로 가장 옳지 않은 것은?","opts":{"1":"취급하는 상품의 종류를 재정비하여 재고비용이나 수송 비용을 줄인다.","2":"생산성이 낮은 인력이나 시설을 정리하고 정보화를 통해 이를 대체한다.","3":"무료설치, 운반, 장기보증 같은 부가적 상품서비스를 줄 이거나 없앤다.","4":"포장비를 낮추기 위해 더 저렴한 포장재를 이용한다.","5":"절약형 상표, 보급형 상표의 비중을 줄인다."},"ans":5},{"year":"2022년 3회","num":20,"subj":"유통물류일반","q":"서비스 유통의 형태인 플랫폼 비즈니스(platform business) 에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"플랫폼을 통해 사람과 사람, 사람과 사물을 연결함으로 써 새로운 유형의 서비스가 창출된다.","2":"정보통신기술의 발달은 사람 간의 교류를 더 빠르고 효 율적으로 실현시키면서 플랫폼 비즈니스 성장에 긍정적 인 영향을 미치고 있다.","3":"플랫폼 비즈니스의 구성원은 플랫폼 구축자와 플랫폼 사 용자로 크게 나뉜다.","4":"플랫폼은 소식, 물건, 서비스 등 다양한 유형의 콘텐츠 교류가 가능하게 해주는 일종의 장터이다.","5":"플랫폼 비즈니스 사업자는 플랫폼을 제공해주는 대가를 직접적으로 취할 수 없으므로, 광고 등을 통해 간접적으 로 수익을 올리는 비즈니스 모델이다."},"ans":5},{"year":"2022년 3회","num":21,"subj":"유통물류일반","q":"수직적 통합이 일어나는 경우 합병하는 회사측은 현실적으 로 여러 문제점에 직면할 수 있는데 이에 대한 설명으로 가 장 옳지 않은 것은?","opts":{"1":"분업에 따른 전문화의 이점을 누리기 힘들어진다.","2":"유통경로 구성원 간의 관계를 경쟁관계로 바뀌게 한다.","3":"조직의 슬림화로 인해 구성원의 업무량이 증가한다.","4":"통합하려는 기업은 많은 자금을 합병에 투입하게 된다.","5":"조직관리에 많은 비용을 소모하게 되어 경기가 좋지 않 을 때에는 자금부담이 생길 수 있다."},"ans":3},{"year":"2022년 3회","num":22,"subj":"유통물류일반","q":"아래 글상자에서 설명하는 개념으로 옳은 것은?","opts":{"1":"블랙 스완 효과(black swan effect)","2":"밴드 왜건 효과(band wagon effect)","3":"채찍 효과(bullwhip effect)","4":"베블렌 효과(Veblen effect)","5":"디드로 효과(Diderot effect)"},"ans":3,"img":["boxes/2022_3_22.png"]},{"year":"2022년 3회","num":24,"subj":"유통물류일반","q":"기업윤리의 중요성을 강조하기 위해 취할 수 있는 방법으로 가장 옳지 않은 것은?","opts":{"1":"기업윤리와 관련된 헌장이나 강령을 만들어 발표한다.","2":"기업의 모든 의사결정 프로세스에서 반영될 수 있게 모 니터링한다.","3":"윤리경영의 지표로서 정성적인 지표는 적용하기 힘드므 로 계량적인 윤리경영지표만을 활용한다.","4":"조직 내의 문제점을 제기할 수 있는 제도를 활성화한다.","5":"윤리기준을 적용한 감사 결과를 조직원과 공유한다."},"ans":3},{"year":"2022년 3회","num":28,"subj":"상권분석","q":"입지의사결정 과정에서 점포의 매력도에 영향을 미치는 입 지조건 평가에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"상권단절요인에는 하천, 학교, 종합병원, 공원, 주차장, 주유소 등이 있다.","2":"주변을 지나는 유동인구의 수보다는 인구특성과 이동방 향 및 목적 등이 더 중요하다.","3":"점포가 보조동선 보다는 주동선상에 위치하거나 가까울 수록 소비자 유입에 유리하다.","4":"점포나 부지형태는 정방형이 장방형보다 가시성이나 접 격증 기출문제 전자문제집 CBT : www.comcbt.com","5":""},"ans":4},{"year":"2022년 3회","num":30,"subj":"상권분석","q":"소매입지를 선정하기 위해 활용되는 각종 지수(index)에 대 한 설명으로 가장 옳지 않은 것은?","opts":{"1":"시장포화지수(IRS)는 특정 시장 내에서 주어진 제품계열 에 대한 점포면적당 잠재매출액의 크기이다.","2":"구매력지수(BPI)는 주로 통계자료의 수집단위가 되는 행 정구역별로 계산할 수 있다.","3":"시장확장잠재력지수(MEP)는 지역 내 소비자들이 타지역 에서 쇼핑하는 비율을 고려하여 계산한다.","4":"판매활동지수(SAI)는 특정지역의 총면적당 점포면적 총 량의 비율을 말한다.","5":"구매력지수(BPI)는 주로 인구, 소매 매출액, 유효소득 등 의 요인을 이용하여 측정한다."},"ans":4},{"year":"2022년 3회","num":31,"subj":"상권분석","q":"유추법(analog method)을 통해 신규점포에 대한 수요를 추 정하는 과정에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"비교점포는 통계분석 대신 주관적 판단을 주로 사용해서 선정한다.","2":"신규점포의 수요는 비교점포의 상권정보를 활용해서 산 정한다.","3":"비교점포의 상권을 단위거리에 따라 구역(zone)으로 나 눈다.","4":"비교점포의 구역별 고객1인당 매출액을 추정한다.","5":"수요예측을 위해 반드시 2개 이상의 비교점포를 선정해 야 한다."},"ans":5},{"year":"2022년 3회","num":32,"subj":"상권분석","q":"주변에 인접한 점포가 없이 큰길가에 위치한 자유입지인 고 립된 점포입지에 관한 설명 중 가장 옳지 않은 것은?","opts":{"1":"대형점포를 개설할 경우 관련상품의 일괄구매 (onestopshopping)를 가능하게 한다.","2":"토지 및 건물의 가격이 상대적으로 싸다.","3":"개점 초기에 소비자를 점포 내로 유인하기가 쉽다.","4":"고정자산에 투입된 비용이 적어서 상대적으로 상품가격 의 할인에 융통성이 있다.","5":"비교구매를 원하는 소비자에게는 매력적이지 않다."},"ans":3},{"year":"2022년 3회","num":34,"subj":"상권분석","q":"상권과 관련된 가맹본부와 가맹점 사이의 관계에 대한 설명 으로 가장 옳지 않은 것은?","opts":{"1":"가맹계약 체결 시 가맹본부는 가맹점사업자의 영업지역 을 설정하여 가맹계약서에 이를 기재하여야 한다.","2":"정보공개서는 가맹본부의 재정상태, 임원 프로필, 직영점 및 가맹점 수 등과 같은 정보를 포함한다.","3":"상권의 급격한 변화가 발생하는 경우에는 가맹본부의 경 영전략상의 의사결정과정을 통해 기존 영업지역을 합리 적으로 변경할 수 있다.","4":"지역 환경에 따라 수익이 다를 수 있으므로 가맹희망자 는 개점하려는 지역의 환경과 가맹본부에서 제시한 창업 환경의 유사성을 면밀히 검토해야 한다.","5":"가맹본부는 가맹계약을 위반하여 가맹계약 기간 중 가맹 사업자의 영업지역 안에서 가맹사업자와 같은 업종의 자 기 또는 계열회사의 직영점이나 가맹점을 설치하면 안 된다."},"ans":3},{"year":"2022년 3회","num":35,"subj":"상권분석","q":"상권 규정 요인에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"상권을 규정하는 요인에는 시간요인과 비용요인이 있다.","2":"공급측면에서 비용요인이 상대적으로 저렴할수록 상권은 축소된다.","3":"재화의 이동에서 사람을 매개로 하는 소매상권은 재화의 종류에 따라 비용 지출이나 시간 사용이 달라지므로 상 권의 크기도 달라진다.","4":"수요측면에서 고가품, 고급품일수록 상권범위가 확대된 다.","5":"시간요인은 상품가치를 좌우하는 보존성이 강한 재화일 수록 상권이 확대된다."},"ans":2},{"year":"2022년 3회","num":36,"subj":"상권분석","q":"상권의 유형에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"도심상권은 중심업무지구(CBD)를 포함하며 상권의 범위 가 넓고 소비자들의 평균 체류시간이 길다.","2":"근린상권은 점포인근 거주자들이 주요 소비자로 생활밀 착형 업종의 점포들이 입지하는 경향이 있다.","3":"부도심상권은 간선도로의 결절점이나 역세권을 중심으로 형성되는 경우가 많으며 도시전체의 소비자를 유인한다.","4":"역세권상권은 지하철이나 철도역을 중심으로 형성되며 지상과 지하의 입체적 상권으로 고밀도 개발이 이루어지 는 경우가 많다.","5":"아파트상권은 고정고객의 비중이 높아 안정적인 수요확 보가 가능하지만 외부와 단절되는 경우가 많아 외부고객 을 유치하는 상권확대가능성이 낮은 편이다."},"ans":3},{"year":"2022년 3회","num":39,"subj":"상권분석","q":"소매점의 상권을 공간적으로 구획하는 과정에서 상권의 지 리적 경계를 분석할 때 활용할 수 있는 기법이나 도구에 해 당하지 않는 것은?","opts":{"1":"내점객 및 거주자 대상 서베이법(survey technique)","2":"티센다각형(thiessen polygon)","3":"소매매트릭스분석(retail matrix analysis)","4":"고객점표법(CST: customer spotting technique)","5":"컨버스의 분기점분석(Converse's breaking-point analysis)"},"ans":3},{"year":"2022년 3회","num":40,"subj":"상권분석","q":"다양한 소매점포 유형들 중에서 광범위한 상권범위를 갖는 대형상업시설인 쇼핑센터의 전략적 특성은 테넌트믹스 (tenant mix)를 통해 결정된다고 한다. 상업시설의 주요 임 차인으로서 시설 전체의 성격을 결정하는 앵커점포(anchor store)에 해당하는 것으로 가장 옳은 것은?","opts":{"1":"마그넷 스토어 ② 특수테넌트","2":"","3":"핵점포 ④ 일반테넌트","4":"","5":"보조핵점포"},"ans":3},{"year":"2022년 3회","num":41,"subj":"상권분석","q":"넬슨(R.L. Nelson)의 소매입지 선정원리 중에서 아래 글상 자의 괄호 안에 들어갈 내용을 순서대로 나열한 것으로 가 장 옳은 것은?","opts":{"1":"㉠ 양립성, ㉡ 누적적 흡인력","2":"㉠ 양립성, ㉡ 경합의 최소성","3":"㉠ 누적적 흡인력, ㉡ 양립성","4":"㉠ 상권의 잠재력, ㉡ 경합의 최소성","5":"㉠ 누적적 흡인력, ㉡ 경합의 최소성"},"ans":3,"img":["boxes/2022_3_41.png"]},{"year":"2022년 3회","num":42,"subj":"상권분석","q":"상권분석 기법과 관련한 특성을 설명하는 내용으로 그 연결 이 가장 옳지 않은 것은?","opts":{"1":"회귀모형은 원인과 결과변수 사이의 관계를 분석하여 원 인변수의 영향력을 파악한다.","2":"다항로짓(MNL)모형은 점포이미지와 입지특성을 반영하 여 상권을 분석할 수 있다.","3":"Christaller의 중심지이론은 중심지와 배후지의 관계를 규 명하고 중심지체계 및 중심지 공간배열의 원리를 설명한 다.","4":"체크리스트법은 소비자의 점포선택 행동을 결정론적이 아닌 확률론적으로 인식한다.","5":"유사점포법에서는 상권의 범위와 특성을 파악하기 위하 여 CST map을 활용한다. 최강 자격"},"ans":4},{"year":"2022년 3회","num":43,"subj":"상권분석","q":"소매점의 상품구색과 상권 및 입지 특성에 대한 설명 중에 서 가장 옳지 않은 것은?","opts":{"1":"편의품 소매점의 상권은 도보로 이동이 가능한 범위 이 내로 제한되는 경우가 많다.","2":"편의품은 일반적으로 소비자가 점포선택에 구매노력을 상대적으로 덜 기울이기 때문에 주택이나 사무실 등에 가까운 입지가 유리하다.","3":"선매품 소매점은 편의품 보다 상권의 위계에서 높은 단 계의 소매 중심지나 상점가에 입지하여 넓은 범위의 상 권을 가져야 한다.","4":"전문품 소매점의 경우 고객이 지역적으로 밀집되어 있어 서 상권의 밀도는 높고 범위는 좁은 것이 특징이다.","5":"동일 업종이라 하더라도 점포의 규모나 품목구성에 따라 상권의 범위가 달라진다."},"ans":4},{"year":"2022년 3회","num":44,"subj":"상권분석","q":"입지조건에 대한 일반적인 평가 중에서 가장 옳은 것은?","opts":{"1":"방사(放射)형 도로구조에서 분기점에 위치하는 것은 불리 하다.","2":"일방통행로에 위치한 점포는 시계성(가시성)과 교통접근 성에 있어서 유리하다.","3":"곡선형 도로의 안쪽입지는 바깥쪽입지보다 시계성(가시 성) 확보 측면에서 불리하다.","4":"주도로와 연결된 내리막이나 오르막 보조도로에 위치한 점포는 양호한 입지이다.","5":"차량 출입구는 교차로 교통정체에 의한 방해를 피하기 위해 모퉁이에 근접할수록 좋다."},"ans":3},{"year":"2022년 3회","num":46,"subj":"상권분석","q":"유통업 고객관계관리 활동의 성과 평가기준으로서 가장 옳 은 것은?","opts":{"1":"시장점유율의 크기","2":"판매량의 안정성","3":"고객자산(customer equity)의 크기","4":"고객정보의 신뢰성","5":"시장의 다변화 정도"},"ans":3},{"year":"2022년 3회","num":49,"subj":"상권분석","q":"유통업체가 활용하는 자체 브랜드(PB: private brand)의 유 형으로 가장 옳지 않은 것은?","opts":{"1":"제조업체 브랜드의 외형이나 명칭을 모방한 저가브랜드 사용료를 지불한 제조업체 브랜드의 라이센스 브랜드","2":"가격에 민감한 세분시장을 표적으로 하는 저가 브랜드","3":"제조업체 브랜드와 품질과 가격에서 경쟁하는 프리미엄 브랜드","4":"사용료를 지불한 제조업체 브랜드의 라이센스 브랜드","5":"제조업체 브랜드를 모방한 대체품이지만 유통업체 브랜 드임을 밝힌 유사 브랜드"},"ans":4},{"year":"2022년 3회","num":50,"subj":"상권분석","q":"가격결정방식에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"가격 탄력성이 1보다 클 경우 그 상품에 대한 수요는 가 격비탄력적이라고 한다.","2":"가격을 결정할 때 기업의 마케팅목표, 원가, 시장의 경쟁 구조 등을 고려해야 한다.","3":"제품의 생산과 판매를 위해 소요되는 모든 비용을 충당 하고 기업이 목표로 한 이익을 낼 수 있는 수준에서 가 격을 결정하는 방식을 원가중심 가격결정이라고 한다.","4":"소비자가 제품에 대해 지각하는 가치에 따라 가격을 결 정하는 것을 수요중심 가격결정이라고 한다.","5":"자사제품의 원가나 수요보다도 경쟁제품의 가격을 토대 로 가격을 결정하는 방식을 경쟁중심 가격결정이라고 한 다."},"ans":1},{"year":"2022년 3회","num":51,"subj":"유통마케팅","q":"프랜차이즈 본부가 직영점을 설치하는 이유로 가장 옳지 않 은 것은?","opts":{"1":"본부 직영점들은 프랜차이즈 시스템 내의 다른 점포들에 대한 모델점포로서의 기능을 할 수 있다.","2":"직영점들은 프랜차이즈 시스템의 초기에 프랜차이즈 유 통망의 성장을 촉진할 수 있다.","3":"본부 직영점을 통해 점포운영상의 문제점들을 직접 피부 로 파악할 수 있다.","4":"본부가 전체 프랜차이즈 시스템의 운영에 대해 강력한 통제를 유지할 수 있는 가능성을 높일 수 있다.","5":"본부는 가맹점 증가보다 직영점을 통해 가입비, 교육비 등의 수입을 보다 적극적으로 확보할 수 있다."},"ans":5},{"year":"2022년 3회","num":53,"subj":"유통마케팅","q":"효과적인 진열을 위해 활용하는 IP(item presentation), PP(point of presentation), VP(visual presentation)에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"IP의 목적은 판매포인트 전달과 판매유도이다.","2":"IP는 고객이 하나의 상품에 대한 구입의사를 결정할 수 있도록 돕기 위한 진열이다.","3":"VP의 목적은 중점상품과 테마에 따른 매장 전체 이미지 표현이다.","4":"VP는 점포나 매장 입구에서 유행, 인기, 계절상품 등을 제안하기 위한 진열이다.","5":"PP는 어디에 어떤 상품이 있는가를 알려주는 진열이다."},"ans":1},{"year":"2022년 3회","num":54,"subj":"유통마케팅","q":"매장 배치에 관한 아래의 내용 중에서 옳게 설명된 것은?","opts":{"1":"백화점 등 고급점포는 매장의 효율을 높이기 위해 그리 드(grid) 방식의 고객동선 설계가 바람직하다.","2":"복합점포매장의 경우, 고가의 전문매장, 가구매장 등은 고층이나 층 모서리에 배치하는 것이 바람직하다.","3":"충동구매를 일으키는 상품은 점포 후면에 진열, 배치하 는 것이 바람직하다.","4":"층수가 높은 점포는 층수가 높을수록 그 공간가치가 높 아진다.","5":"넓은 바닥면적이 필요한 상품은 통행량이 많은 곳에 배 치하여야 한다."},"ans":2},{"year":"2022년 3회","num":55,"subj":"유통마케팅","q":"산업재에 적합한 촉진수단으로 가장 옳은 것은?","opts":{"1":"광고 ② 홍보","2":"","3":"인적판매 ④ PR","4":"","5":"콘테스트"},"ans":3},{"year":"2022년 3회","num":57,"subj":"유통마케팅","q":"브랜드 관리와 관련된 설명으로 가장 옳지 않은 것은?","opts":{"1":"브랜드 자산(brand equity)이란 해당 브랜드를 가졌기 때 문에 발생하는 차별적 브랜드 가치를 말한다.","2":"브랜드 재인(brand recognition)은 브랜드가 과거에 본인 에게 노출된 적이 있음을 알아차리는 것이다.","3":"브랜드 인지도(brand awareness)가 높을수록 브랜드 자 산(brand equity)이 증가한다고 볼 수 있다.","4":"브랜드 인지도(brand awareness)는 브랜드 이미지의 풍 부함을 의미한다.","5":"브랜드 회상(brand recall)이란 브랜드 정보를 기억으로 부터 인출하는 것을 말한다."},"ans":4},{"year":"2022년 3회","num":59,"subj":"유통마케팅","q":"소매업체 대상 판촉프로그램에 대한 설명으로 옳지 않은 것 은?","opts":{"1":"가격할인이란 일정 기간의 구매량에 대해 가격을 할인해 주는 방법을 말한다.","2":"리베이트란 진열위치, 판촉행사, 매출실적 등 소매상의 협력 정도에 따라 판매금액의 일정률에 해당하는 금액을 반환해 주는 것을 말한다.","3":"인적지원이란 월 매출이 일정수준 이상인 점포에는 판촉 사원을 고정적으로 배치하고 그 외 관리대상이 될 만한 점포에는 판촉사원을 순회시키는 것을 말한다.","4":"소매점 경영지도란 소매상에게 매장연출방법, 상권분석 등의 경영지도를 통해 매출증대를 돕는 것을 말한다.","5":"할증판촉이란 소매점이 진행하고 있는 특정 제품 및 세 일 관련 광고 비용 일부를 부담하는 것을 말한다."},"ans":5},{"year":"2022년 3회","num":60,"subj":"유통마케팅","q":"아래 글상자에서 설명하는 경우에 적용할 수 있는 유통 마 케팅전략으로 가장 옳은 것은?","opts":{"1":"시장확대전략 ② 비차별화전략","2":"","3":"집중화전략 ④ 차별화전략","4":"","5":"원가우위전략"},"ans":3,"img":["boxes/2022_3_60.png"]},{"year":"2022년 3회","num":61,"subj":"유통마케팅","q":"점포의 매장면적에 관한 설명으로 가장 옳지 않은 것은?","opts":{"1":"점포면적은 매장면적과 비매장면적으로 구분한다.","2":"각 상품부문의 면적당 생산성을 고려하여 매장면적을 배 분한다.","3":"일반적으로 전체 면적에서 차지하는 매장면적의 비율은 점포의 규모가 클수록 높아진다.","4":"매장면적을 배분할 때는 소비자의 편의성에 대한 요구, 효과적인 진열과 배치 등도 고려해야 한다.","5":"전체 면적 중 매장면적의 비율은 고급점포일수록 낮아 진다."},"ans":3},{"year":"2022년 3회","num":62,"subj":"유통마케팅","q":"제조업자가 중간상들과의 거래에서 사용하는 가격할인 유형 중 판매촉진지원금에 대한 설명으로 옳은 것은?","opts":{"1":"중간상이 제품을 현금으로 구매할 경우 제조업자가 판매 대금의 일부를 할인해 주는 것이다.","2":"중간상이 제조업자가 일반적으로 수행해야 할 업무의 일 부를 수행할 경우 경비의 일부를 제조업자가 부담하는 것이다.","3":"중간상이 제조업자를 대신하여 지역광고를 하거나 판촉 을 실시할 경우 지급하는 보조금이다.","4":"중간상이 대량구매를 하는 경우 해주는 현금할인이다.","5":"중간상이 하자있는 제품, 질이 떨어지는 제품 등을 구매 할 때 지급하는 지원금이다. 최강 자격"},"ans":3},{"year":"2022년 3회","num":63,"subj":"유통마케팅","q":"고객생애가치(CLV: customer lifetime value)에 대한 설명으 로 가장 옳은 것은?","opts":{"1":"업태에 따라 고객생애가치는 다르게 추정될 수 있다.","2":"고객생애가치는 고객과 기업 간의 정성적 관계 가치이므 로 수치화하여 측정하기 어렵다.","3":"고객생애가치는 고객이 일생동안 구매를 통해 기업에게 기여하는 수익을 미래가치로 환산한 금액이다.","4":"고객생애가치는 고객점유율(customer share)에 기반하여 추정할 수 있다.","5":"고객의 생애가치는 고객의 이용실적, 고객당 비용, 고객 이탈가능성 및 거래기간 등을 통해 추정할 수 있다."},"ans":5},{"year":"2022년 3회","num":64,"subj":"유통마케팅","q":"아래 글상자에서 설명하는 가격전략으로 가장 옳은 것은?","opts":{"1":"가격계열화전략(price lining strategy)","2":"가격품목화전략(price itemizing strategy)","3":"가격단위화전략(price unitizing strategy)","4":"가격구색화전략(price assortment strategy)","5":"가격믹스전략(price mix strategy)"},"ans":1,"img":["boxes/2022_3_64.png"]},{"year":"2022년 3회","num":65,"subj":"유통마케팅","q":"마이클 포터(Michael Porter)의 5요인모델(5-Forces Model) 에 근거한 설명으로 가장 옳지 않은 것은?","opts":{"1":"기존 기업들은 높은 진입장벽의 구축을 통해 시장매력도 를 높일 수 있다.","2":"구매자의 교섭력이 높아질수록 시장 매력도는 낮아진다.","3":"시장매력도는 산업 전체의 평균 수익성을 의미한다.","4":"경쟁자, 공급자, 구매자가 분명하게 구분되는 것을 가정 한다.","5":"대체재가 많을수록 시장의 매력도는 높아진다."},"ans":5},{"year":"2022년 3회","num":66,"subj":"유통마케팅","q":"상품구색의 다양성(variety)에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"취급하는 상품계열의 수가 어느 정도 되는가를 의미한 다.","2":"취급하는 상품품목의 수가 얼마나 되느냐와 관련된다.","3":"동일한 성능이나 용도를 가진 상품들을 하나의 상품군으 로 취급하기도 한다.","4":"동일한 고객층 또는 동일한 가격대 등을 하나의 상품군 으로 취급하기도 한다.","5":"전문점은 백화점이나 양판점에 비해 상품구색의 다양성 이 한정되어 있다."},"ans":2},{"year":"2022년 3회","num":68,"subj":"유통마케팅","q":"고객관계를 강화하기 위한 고객관리전략으로 가장 옳지 않 은 것은?","opts":{"1":"잠재가능고객 파악 및 차별적 프로모션 실행","2":"구매 후 고객관리를 통한 관계 심화","3":"고객충성도의 주기적 측정 및 관리","4":"적극적이고 체계적인 불평관리","5":"고객이탈을 방지하는 인센티브 제공"},"ans":1},{"year":"2022년 3회","num":69,"subj":"유통마케팅","q":"판매원의 판매활동에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"상품과 대금의 교환을 실현시키는 활동이다.","2":"상품의 효용과 가치에 대한 정보를 제공하는 활동이다.","3":"제한된 공간에서 소매점의 이익을 극대화하기 위한 활동 이다.","4":"고객이 상품과 서비스를 구매하도록 설득하는 활동이다.","5":"대화를 통해 고객의 욕구를 파악하고 그에 부합되는 제 품을 추천하는 활동이다."},"ans":3},{"year":"2022년 3회","num":70,"subj":"유통마케팅","q":"판매 결정을 촉구하는 판매원의 행동기법으로 가장 옳지 않 은 것은?","opts":{"1":"두 가지 대안 중 어느 한쪽을 선택하도록 유도한다.","2":"제품을 구매함으로써 얻게 되는 여러 이점을 설명한다.","3":"고객이 어느 정도 사고 싶은 마음이 있는지 파악할 수 있는 질문을 한다.","4":"고객에게 어필할 수 있는 주요 이익을 요약 설명한다.","5":"구매하지 않아도 된다는 태도를 취하여 소비자를 유혹하 는게 아니라는 신뢰감을 갖게 한다."},"ans":5},{"year":"2022년 3회","num":71,"subj":"유통마케팅","q":"인터넷 상거래의 비즈니스 모델 유형별로 세부 비즈니스 모 델을 짝지어 놓은 것으로 가장 옳지 않은 것은?","opts":{"1":"소매 모델 - 소비자에게 제품이나 서비스 판매 - 온·오 프 병행소매","2":"중개 모델 - 판매자와 구매자 연결 - 이마켓플레이스","3":"콘텐츠서비스 모델 - 이용자에게 콘텐츠 제공 - 포털","4":"광고 모델 - 인터넷을 매체로 광고 - 배너광고","5":"커뮤니티 모델 - 공통관심의 이용자들에게 만남의 장제 공 - 검색 에이전트"},"ans":5},{"year":"2022년 3회","num":72,"subj":"유통마케팅","q":"아래 글상자에서 암묵지에 해당하는 내용만을 모두 나열한 것으로 가장 옳은 것은?","opts":{"1":"㉠, ㉢, ㉣ ② ㉠, ㉢, ㉤","2":"","3":"㉡, ㉢, ㉣ ④ ㉡, ㉢, ㉣, ㉥","4":"","5":"㉢, ㉣, ㉤, ㉥ 최강 자격"},"ans":3,"img":["boxes/2022_3_72.png"]},{"year":"2022년 3회","num":73,"subj":"유통마케팅","q":"베스트 오브 브리드(best of breed)전략을 통해 ERP 시스 템을 구축할 경우에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"상대적으로 낮은 비용으로 시스템을 구축할 수 있다.","2":"특정 기능 구현에 있어서 고도의 탁월한 기능성을 발휘 함으로써 보다 많은 경쟁우위를 창출하도록 해준다.","3":"별도의 미들웨어 개발없이 모듈간 통합을 할 수 있다.","4":"소프트웨어 선택, 프로젝트 관리 및 업그레이드에 더 많 은 시간과 자원이 소요된다.","5":"고도의 전문성을 지닌 IT자원이 요구된다."},"ans":3},{"year":"2022년 3회","num":74,"subj":"유통마케팅","q":"데이터의 깊이와 분석차원을 마음대로 조정해가며 분석하는 OLAP(online analytical processing)의 기능으로 가장 옳은 것은?","opts":{"1":"분해(slice &dice) ② 리포팅(reporting)","2":"","3":"드릴링(drilling) ④ 피보팅(pivoting)","4":"","5":"필터링(filtering)"},"ans":3},{"year":"2022년 3회","num":75,"subj":"유통마케팅","q":"절차별 모바일 결제 서비스에 대한 내용 중 괄호 안에 들어 갈 용어를 순서대로 나열한 것으로 가장 옳은 것은?","opts":{"1":"① ② ②","2":"","3":"③ ④ ④","4":"","5":"⑤"},"ans":3,"img":["boxes/2022_3_75.png"]},{"year":"2022년 3회","num":77,"subj":"유통정보","q":"NoSQL에 관련된 내용으로 가장 옳지 않은 것은?","opts":{"1":"화면과 개발로직을 고려한 데이터 셋을 구성하여 일반적 인 데이터 모델링이라기 보다는 파일구조 설계에 가깝다 고 볼 수 있다.","2":"데이터 항목을 클러스터 환경에 자동적으로 분할하여 적 재한다.","3":"스키마 없이 데이터를 상대적으로 자유롭게 저장한다.","4":"대규모의 데이터를 유연하게 처리할 수 있는 전통적인 관계형 데이터베이스 시스템이다.","5":"간단한 API Call 또는 HTTP를 통한 단순한 접근 인터페 이스를 제공한다."},"ans":4},{"year":"2022년 3회","num":78,"subj":"유통정보","q":"유통업체에서 활용하는 비즈니스 애널리틱스(analytics)의 유형에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"대시보드(dashboards)는 데이터 분석결과에 대한 이용자 이해도를 높이기 위한 데이터 시각화 기술이다.","2":"스코어카드(scorecards)는 데이터베이스로부터 정보를 추출하는 주요 매커니즘이다.","3":"데이터 마이닝(data mining)은 대규모 데이터를 분석하 여 숨겨진 상관관계 및 트렌드를 발견하는 기법이다.","4":"리포트(reports)는 비즈니스에서 요구하는 정보를 포맷화 하고 조직화하기 위해 변환시켜 표현하는 것이다.","5":"알림(alert)은 특정 사건이 발생했을 때 이를 관리자에게 인지시켜주는 자동화된 기능이다."},"ans":2},{"year":"2022년 3회","num":82,"subj":"유통정보","q":"유통업체의 지식관리 시스템 구축 및 활용과 관련된 설명으 로 가장 옳은 것은?","opts":{"1":"기업은 지식에 대한 유지관리를 위해 불필요한 지식도 철저하게 잘 보존해야 한다.","2":"지식관리 시스템을 도입하면 조직 내부의 지식관리에 대 한 모든 문제를 해결할 수 있다.","3":"지식관리 시스템 활용에 있어, 직원이 보유한 업무처리 지식에 대한 공유 방지를 위해 철저하게 통제한다.","4":"지식관리 시스템 구축은 단기적 관점에서 경쟁력을 강화 하기 위한 프로젝트로 단기 매출 증대에 기여 하도록 시 스템을 구축해야 한다.","5":"성공적인 도입을 위해서 초기에는 소규모로 시스템을 도 입하고, 성과가 나타나기 시작하면 전사적으로 지식관리 시스템을 확장하는 것이 유용하다."},"ans":5},{"year":"2022년 3회","num":83,"subj":"유통정보","q":"빅데이터 분석과 관련된 설명으로 가장 옳지 않은 것은?","opts":{"1":"텍스트 마이닝(text mining)은 자연어를 분석하고, 자연 어 속에 숨겨진 정보를 파악하는 데이터 분석기법이다.","2":"오피니언 마이닝(opinion mining)은 특정한 상품 및서비 스에 대한 시장 규모 예측, 고객 구전효과 분석에 활용 되는 데이터 분석 기법이다.","3":"소셜 네트워크분석(social network analysis)은 그래프 이론을 활용해서 소셜 네트워크의 연구구조 및 강도를 분석하는 데이터 분석 기법이다.","4":"군집 분석(cluster analysis)은 비슷한 특성을 가지고 있 는 데이터를 통합해서 유사한 특성으로 군집화하는 데이 터 분석 기법이다.","5":"회귀 분석(regression analysis)은 종속변수와 독립변수 의 상관관계를 분석하는 데이터 분석 기법이다."},"ans":5},{"year":"2022년 3회","num":85,"subj":"유통정보","q":"아래 글상자에서 설명하는 내용에 부합하는 용어로 가장 옳 은 것은?","opts":{"1":"고퍼(gopher) ② 냅스터(napster)","2":"","3":"시맨틱웹(semantic-Web) ④ 오페라(opera)","4":"","5":"웹클리퍼(Web-clipper)"},"ans":3,"img":["boxes/2022_3_85.png"]},{"year":"2022년 3회","num":86,"subj":"유통정보","q":"식별코드와 바코드에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"GS1 표준 상품 식별코드는 전세계적으로 널리 사용되는 '사실상의(de facto)' 국제 표준이다.","2":"상품 식별코드 자체에는 상품명, 가격, 내용물 등에 대한 정보가 포함되어 있다.","3":"바코드는 식별코드를 기계가 읽을 수 있도록 막대 모양 으로 표현한 것이다.","4":"GTIN은 기업에서 자사의 거래단품을 고유하게 식별하는 데 사용하는 국제표준상품코드이다.","5":"ITF-14는 GTIN-14코드체계(물류단위 박스)를 표시하는 데 사용되는 바코드 심벌이다."},"ans":2},{"year":"2022년 3회","num":87,"subj":"유통정보","q":"QR 코드에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"1994년 일본의 덴소 웨이브(DENSO WAVE)에서 데이터 를 빠르게 읽는 데 중점을 두고 개발 보급한 기술이다.","2":"360° 어느 방향에서나 빠르게 데이터를 읽을 수 있다.","3":"기존 바코드 기술과 비교할 때, 대용량 데이터의 저장이 가능하고, 고밀도 정보표현이 가능하다.","4":"일부 찢어지거나 젖었을 때 오류를 복원하는 기능이 포 함되어 있다.","5":"바이너리(binary), 제어 코드를 제외한 모든 숫자와 문자 를 처리할 수 있다."},"ans":5},{"year":"2022년 3회","num":88,"subj":"유통정보","q":"아래 글상자에서 설명하고 있는 용어로 가장 옳은 것은?","opts":{"1":"IC Index ② 스칸디아네비게이터","2":"","3":"균형성과표 ④ 기술요소평가법","4":"","5":"무형자산모니터 최강 자격"},"ans":3,"img":["boxes/2022_3_88.png"]},{"year":"2022년 3회","num":89,"subj":"유통정보","q":"드론의 구성요인에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"드론의 항법센서는 전자광학센서, 초분광센서, 적외선 센 서 등이 있다.","2":"탑재 컴퓨터는 드론을 운영하는 브레인 역할을 하는 컴 퓨터로 드론의 위치, 모터, 배터리 상태 등을 확인할 수 있다.","3":"드론 모터는 드론의 움직임이 가능하도록 지원하고, 배 터리는 모터에 에너지를 제공한다.","4":"드론 임무장비는 드론 비행을 하면서 특정한 임무를 하 도록 관련 장비를 장착한다.","5":"드론 프로펠러 및 프레임은 드론이 비행하도록 프레임 워크를 제공한다."},"ans":1},{"year":"2022년 3회","num":90,"subj":"유통정보","q":"POS시스템의 특징에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"SKU별로 상품 정보를 파악할 수 있는 관리시스템으로 상품 판매동향을 파악할 수 있다.","2":"모든 거래정보 및 영업정보를 즉시 파악할 수 있으므로 정보의 변화에 즉각 대응할 수 있는 배치(batch)시스템 이다.","3":"현장에서 발생하는 각종 거래 관련 데이터를 실시간으로 직접 컴퓨터에 전달하는 수작업이 필요 없는 온라인시스 템이다.","4":"고객과의 거래와 관련된 정보를 POS시스템을 통해 수집 할 수 있다.","5":"POS를 통해 수집된 정보는 고객판촉 활동의 기초자료로 사용할 수 있다. 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":2},{"year":"2023년 1회","num":1,"subj":"유통물류일반","q":"수요의 가격탄력성 크기를 결정하는 요인과 관련된 설명으로 가장 옳지 않은 것은?","opts":{"1":"대체재가 있는 경우의 가격탄력성은 크고, 대체재가 없으 면 가격탄력성은 작다.","2":"소득에서 재화의 가격이 차지하는 비중과 가격탄력성은 반비례한다.","3":"평균적으로 생활필수품인 경우 가격탄력성은 작다.","4":"평균적으로 사치품인 경우 가격탄력성은 크다.","5":"재화의 용도가 다양할수록 가격탄력성은 크다."},"ans":2},{"year":"2023년 1회","num":2,"subj":"유통물류일반","q":"유통비용을 최소화시킬 수 있는 유통시스템 설계를 위한 유 통경로의 길이 결정 시 파악해야 할 요소 중 상품요인과 관 련된 것만으로 옳게 나열된 것은?","opts":{"1":"부피, 부패성, 기술적 특성, 총마진","2":"고객에 대한 지식, 통제의 욕구, 재무적 능력","3":"비용, 품질, 이용가능성","4":"지리적 분산, 고객밀집도, 고객의 수준, 평균 주문량","5":"단위가치, 상품표준화, 비용, 품질"},"ans":1},{"year":"2023년 1회","num":3,"subj":"유통물류일반","q":"조직 내에서 일반적으로 발생할 수 있는 갈등의 순기능적 역 할에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"향후 발생가능한 갈등을 해결할 수 있는 표준화된 방법을 개발할 수 있다.","2":"갈등해결 과정에서 동맹체가 결성되는 경우 어느 정도 경 로구성원 간의 힘의 균형을 이룰 수 있다.","3":"경로구성원 간의 의사소통의 기회를 늘림으로써 정보 교 환을 활발하게 해준다.","4":"고충처리와 갈등 해결의 공식창구와 표준절차를 마련하는 데 도움을 준다.","5":"유통시스템 내의 자원을 권력 순서대로 재분배하게 해준 다."},"ans":5},{"year":"2023년 1회","num":6,"subj":"유통물류일반","q":"동기부여와 관련된 여러 가지 학설에 대한 설명으로 옳지 않 은 것은?","opts":{"1":"매슬로우는 인간의 욕구를 생리적 욕구부터 자아실현의 욕구까지 총 5단계로 구분하여 설명하였다.","2":"맥클리란드는 성장, 관계, 생존의 3단계로 구분하여 설명 하였다.","3":"알더퍼의 경우 한 차원 이상의 욕구가 동시에 동기부여 요인으로 사용될 수 있다고 주장하였다.","4":"허쯔버그의 동기요인에는 승진가능성과 성장가능성이 포 함된다.","5":"허쯔버그의 위생요인에는 급여와 작업조건이 포함된다."},"ans":2},{"year":"2023년 1회","num":7,"subj":"유통물류일반","q":"화인 표시의 종류와 설명의 연결이 옳지 않은 것은?","opts":{"1":"품질 표시(quality mark)는 내용품의 품질이나 등급을 표 시한다.","2":"주의 표시(care mark)는 내용물의 취급상 주의 사항을 표 시한다.","3":"목적항 표시(destination mark)는 선적·양륙 작업을 용이 하게 하고 화물이 잘못 배송되는 일이 없도록 목적항을 표시한다.","4":"수량 표시(case mark)는 포장 화물 안의 내용물의 총 수 량을 표시한다.","5":"원산지 표시(origin mark)는 관세법규에 따라 표시하는 수 출물품의 원산지를 표시한다."},"ans":4},{"year":"2023년 1회","num":8,"subj":"유통물류일반","q":"물류합리화 방안의 하나인 포장 표준화에 관한 내용으로 옳 지 않은 것은?","opts":{"1":"재료표준화 - 환경대응형 포장 재료의 개발","2":"강도표준화 – 품목별 적정 강도 설정","3":"치수표준화 – 표준 팰릿(pallet)의 선정","4":"관리표준화 – 포장재 구매 기준 및 사후 관리 기준 제정","5":"가격표준화 – , 상권을 규정 하는 요인에는 시간요인과 비용요인이 있다.","2":"시간요인 측면에서 봤을 때, 상품가치를 좌우하는 보존 성이 강한 재화일수록 오랜 운송에 견딜 수 있으므로 상 권이 확대된다.","3":"재화의 이동에서 사람을 매개로 하는 소매상권은 재화의 종류에 따라 비용이나 시간사용이 달라지므로 상권의 크 기가 달라진다.","4":"비용요인에는 생산비, 운송비, 판매비용 등이 포함되며 비용이 상대적으로 저렴할수록 상권은 축소된다.","5":"고가의 제품일수록 소비자는 많은 시간과 비용을 투입하 므로 상권의 범위가 넓어진다."},"ans":4},{"year":"2023년 1회","num":28,"subj":"상권분석","q":"상권에 대한 일반적인 설명으로 가장 옳지 않은 것은?","opts":{"1":"업종이나 취급하는 상품의 종류는 상권의 범위에 영향을 준다.","2":"사회적, 행정적 요인 등의 기준에 의한 확정적 개념이기 에 초기 설정이 중요하다.","3":"가격이 비교적 낮고 구매 빈도가 높은 편의품의 경우 상 권이 좁은 편이다.","4":"가격이 비교적 높고 수요 빈도가 낮은 전문품의 경우 상 권이 넓은 편이다.","5":"소자본 상권의 경우 유동인구가 많고 접근성이 높은 곳 이 유리하다."},"ans":2},{"year":"2023년 1회","num":30,"subj":"상권분석","q":"신규로 소매점포를 개점하기 위한 준비과정의 논리적 순서 로서 가장 옳은 것은?","opts":{"1":"소매믹스설계 - 점포계획 – 상권분석 – 입지선정","2":"소매믹스설계 – 상권분석 – 입지선정 - 점포계획","3":"점포계획 – 소매믹스설계 - 상권분석 – 입지선정","4":"상권분석 – 입지선정 - 소매믹스설계 – 점포계획","5":"상권분석 – 입지선정 – 점포계획 – 소매믹스설계"},"ans":5},{"year":"2023년 1회","num":31,"subj":"상권분석","q":"소매점포의 입지는 도로조건 즉, 해당 부지가 접하는 도로 의 성격과 구조에 따라 영향을 받는다. 도로조건에 대한 일 반적 평가로서 가장 옳지 않은 것은?","opts":{"1":"도로와의 접면 – 가로의 접면이 넓을수록 유리함","2":"곡선형 도로 – 곡선형 도로의 커브 안쪽보다는 바깥쪽이 유리함","3":"도로의 경사 – 경사진 도로에서는 상부보다 하부가 유리 함","4":"일방통행 도로 – 가시성과 접근성 면에서 유리함","5":"중앙분리대 – 중앙분리대가 있는 도로는 건너편 고객의 접근성이 떨어지기 때문에 불리함"},"ans":4},{"year":"2023년 1회","num":32,"subj":"상권분석","q":"점포를 이용하는 소비자나 점포 주변 거주자들로부터 자료 를 수집하여 현재 영업 중인 점포의 상권범위를 파악하려는 조사기법으로 보기에 가장 적합하지 않은 것은?","opts":{"1":"점두조사","2":"내점객조사","3":"체크리스트(checklist)법","4":"지역표본추출조사","5":"CST(customer spotting techniques)"},"ans":3},{"year":"2023년 1회","num":33,"subj":"상권분석","q":"점포입지의 매력성에 영향을 미치는 요인들을 상권요인과 입지요인으로 구분할 수 있다. 입지요인으로 가장 옳은 것 은?","opts":{"1":"가구 특성 ② 경쟁 강도","2":"","3":"소득 수준 ④ 인구 특성","4":"","5":"점포 면적"},"ans":5},{"year":"2023년 1회","num":34,"subj":"상권분석","q":"소매입지 유형과 아래 글상자 속의 입지특성의 올바르고 빠 짐없는 연결로서 가장 옳은 것은?","opts":{"1":"백화점 - ㉠, ㉢, ㉣","2":"독립입지 - ㉠, ㉡, ㉣","3":"도심입지 - ㉠, ㉢, ㉣","4":"교외 대형쇼핑몰 - ㉡, ㉢, ㉣","5":"근린쇼핑센터 - ㉠, ㉡, ㉣"},"ans":1,"img":["boxes/2023_1_34.png"]},{"year":"2023년 1회","num":37,"subj":"상권분석","q":"대형마트, 대형병원, 대형공연장 등 대규모 서비스업종의 입 지 특성에 대한 아래의 내용 중에서 옳지 않은 것은?","opts":{"1":"대규모 서비스업은 나홀로 독자적인 입지선택이 가능하 다.","2":"상권 및 입지적 특성을 반영한 매력도와 함께 서비스나 마케팅력이 매우 중요하다.","3":"주로 차량을 이용하는 고객이 많고, 상권범위는 반경 2~3km 이상이라고 볼 수 있다.","4":"경쟁점이 몰려있으면 상호보완효과가 높아지므로 경쟁력 은 입지에 의해 주로 정해진다.","5":"대규모 서비스업은 유동인구에 의존하는 적응형 입지보 다는 목적형 입지유형에 해당한다."},"ans":4},{"year":"2023년 1회","num":38,"subj":"상권분석","q":"지리학자인 크리스탈러(W. Christaller)의 중심지이론의 기본 적 가정과 개념에 대한 설명으로 옳지 않은 것은?","opts":{"1":"중심지 활동이란 중심지에서 재화와 서비스가 제공되는 활동을 의미한다.","2":"중심지에서 먼 곳은 재화와 서비스를 제공받지 못하게 된다고 가정한다.","3":"조사대상 지역은 구매력이 균등하게 분포하고 끝이 없는 등방성의 평지라고 가정한다.","4":"최소요구범위는 생산자가 정상이윤을 얻을 만큼 충분한 소비자들을 포함하는 경계까지의 거리이다.","5":"중심지이론은 인간의 각종 활동공간이 어떤 핵을 중심으 로 배열되어 있다는 인식에서 비롯되었다."},"ans":2},{"year":"2023년 1회","num":40,"subj":"상권분석","q":"소매점의 상권분석은 점포를 신규로 개점하는 경우에도 필 요하지만 기존 점포의 경영을 효율화 하려는 목적으로도 다 양하게 활용될 수 있다. 상권분석의 주요 목적으로 보기에 가장 연관성이 떨어지는 것은?","opts":{"1":"소매점의 경영성과를 반영한 점포의 위치이동, 면적확대, 면적축소 등으로 인한 매출변화를 예측할 수 있다.","2":"다점포를 운영하는 체인업체가 특정 상권 내에서 운영할 수 있는 적정 점포수를 파악할 수 있다.","3":"소매점을 이용하는 소비자들의 인구통계적 특성들을 파 악하여 보다 성공적인 소매전략을 수립하는데 도움을 준 다.","4":"소매점을 둘러싸고 있는 상권내외부의 소비자를 상대로 하는 촉진활동의 초점이 명확해질 수 있다.","5":"상품제조업체와의 공급체인관리(SCM)를 개선하여 물류 비용을 절감할 수 있는 정보를 얻을 수 있다."},"ans":5},{"year":"2023년 1회","num":41,"subj":"상권분석","q":"점포의 매매나 임대차시 필요한 점포 권리분석을 위해서 공 부서류를 이용할 수 있다. 이들 공부서류와 확인 가능한 내 용의 연결이 옳지 않은 것은?","opts":{"1":"지적도 – 토지의 모양과 경계, 도로 등을 확인할 수 있 음","2":"등기사항전부증명서 - 소유권 및 권리관계 등을 알 수 있음","3":"건축물대장 – 건물의 면적, 층수, 용도, 구조 등을 확인 할 수 있음","4":"토지초본 – 토지의 소재, 지번, 지목, 면적 등을 확인할 수 있음","5":"토지이용계획확인서 – 토지를 규제하는 도시계획 상황을 확인할 수 있음"},"ans":4},{"year":"2023년 1회","num":42,"subj":"상권분석","q":"상권분석 과정에 활용도가 큰 지리정보시스템(GIS)에 관한 설명으로서 가장 옳지 않은 것은?","opts":{"1":"지도작성체계와 데이터베이스관리체계의 결합으로 상권 분석의 유용한 도구가 되고 있다.","2":"데이터베이스와 함께 활용하기 위해 수치지도보다는 디 지털지도가 필요하다.","3":"지도상에 지리적인 형상을 표현하고 데이터의 값과 범위 를 지리적인 형상에 할당하고 지도를 확대·축소하는 기 능을 위상이라 한다.","4":"빅데이터를 활용하는 지리정보시스템(GIS)과 고객관계관 리(CRM)의 합성어인 “gCRM”을 활용하기도 한다.","5":"속성정보를 요약하여 표현한 지도를 작성하며, 점, 선, 면의 형상으로 주제도를 작성하기도 한다."},"ans":2},{"year":"2023년 1회","num":43,"subj":"상권분석","q":"상권분석 과정에서 점포의 위치와 해당 점포를 이용하는 소 비자의 분포를 공간적으로 표현할 때 보편적으로 관찰되는 거리감소효과(distance decay effect)에 대한 설명으로 옳지 않은 것은?","opts":{"1":"고객점표(CST) 지도를 이용하면 쉽게 관찰할 수 있다.","2":"거리조락현상 또는 거리체증효과라고도 한다.","3":"거리 마찰에 따른 비용과 시간의 증가 때문에 나타난다.","4":"유사점포법, 회귀분석법을 이용하여 확인할 수 있다.","5":"점포로부터 멀어질수록 고객의 밀도가 낮아지는 경향을 말한다. 최강 자격"},"ans":2},{"year":"2023년 1회","num":44,"subj":"상권분석","q":"아래 글상자의 내용에서 말하는 장단점은 어떤 형태의 소매 점포 출점에 대한 내용인가?","opts":{"1":"기존건물에 속한 점포임대 ② 기존건물 매입","2":"","3":"부지매입 건물신축 ④ 기존건물의 점포매입","4":"","5":"신축건물 임대"},"ans":3,"img":["boxes/2023_1_44.png"]},{"year":"2023년 1회","num":45,"subj":"상권분석","q":"확률적으로 매출액이나 상권의 범위를 예측하는 상권분석 기법들에서 이론적 근거로 이용하고 있는 Luce의 선택공리 와 관련이 없는 것은?","opts":{"1":"공간상호작용모델(SIM)은 소매점의 상권분석과 입지의사 결정에 이용하는 근거가 된다.","2":"특정 선택대안의 효용이 다른 대안보다 높을수록 선택될 확률이 높다고 가정한다.","3":"어떤 대안이 선택될 확률은 그 대안이 갖는 효용을 전체 선택대안들이 가지는 효용의 총합으로 나눈 값과 같다고 본다.","4":"소비자가 어느 점포에 대해 느끼는 효용이 가장 크더라 도 항상 그 점포를 선택하지 않을 수 있다고 인식한다.","5":"Reilly의 소매중력모형, Huff모형, MNL모형은 Luce의 선 택공리를 근거로 하는 대표적 상권분석 기법들이다."},"ans":5},{"year":"2023년 1회","num":46,"subj":"상권분석","q":"광고 매체를 선정할 때 고려해야 할 여러 가지 요인에 대한 설명으로 옳지 않은 것은?","opts":{"1":"도달범위(reach)란 일정기간 동안 특정 광고에 적어도 한 번 이상 노출된 청중의 수 또는 비율을 말한다.","2":"GRP(gross rating points)란 광고효과를 계량화하여 측 정하기 위한 기준으로 보통 시청자들의 광고인지도를 중 심으로 측정한다.","3":"광고스케줄링이란 일정기간 동안 광고예산을 어떻게 배 분하여 집행할 것인가에 대한 결정이다.","4":"도달빈도(frequency)란 일정기간 동안 특정광고가 한 사 람에게 노출된 평균 횟수를 말한다.","5":"CPRP(cost per rating points)란 매체비용을 시청률로 나눈 비용이라 할 수 있다."},"ans":2},{"year":"2023년 1회","num":47,"subj":"상권분석","q":"매장 레이아웃(layout)에 대한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"격자형 배치는 고객이 매장 전체를 둘러보고 자신이 원 하는 상품을 쉽게 찾을 수 있게 한다.","2":"격자형 배치는 다른 진열방식에 비해 공간효율성이 높고 비용면에서 효과적이다.","3":"경주로형 배치는 고객들이 다양한 매장의 상품을 볼 수 있게 하여 충동구매를 유발할 수 있다.","4":"자유형 배치는 규모가 작은 전문매장이나 여러 개의 소 규모 전문매장이 있는 대형점포의 배치 방식이다.","5":"자유형 배치는 고객들이 주 통로를 지나다니면서 다양한 각도의 시선으로 상품을 살펴볼 수 있다. 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":5},{"year":"2023년 1회","num":48,"subj":"상권분석","q":"전략적 CRM(customer relationship management)의 적용과 정으로서 가장 옳지 않은 것은?","opts":{"1":"정보관리과정 ② 전략 개발과정","2":"","3":"투자 타당성 평가 과정 ④ 가치창출 과정","4":"","5":"다채널 통합과정"},"ans":3},{"year":"2023년 1회","num":49,"subj":"상권분석","q":"도매상의 마케팅믹스전략에 관한 설명으로 가장 옳지 않은 것은?","opts":{"1":"소매상이나 제조업자와 마찬가지로 거래규모나 시기에 따른 가격할인 또는 매출증대를 위한 가격인하 등의 가 격변화를 시도하기도 한다.","2":"제조업자가 제공하는 촉진물과 촉진프로그램을 적극 활 용할 뿐만 아니라 자체적인 촉진프로그램의 개발을 통해 고객인 소매상을 유인하여야 한다.","3":"도매상은 소매상에게 제공해야 할 제품구색과 서비스 수 준을 결정해야 한다.","4":"도매상은 최종소비자를 대상으로 영업활동을 하는 것이 기 때문에 점포와 같은 물리적인 시설에 비용투자를 해 야 한다.","5":"일반적으로 도매상은 소요비용을 충당하기 위해 원가에 일정비율을 마진으로 가산하는 원가중심가격결정법을 사 용한다."},"ans":4},{"year":"2023년 1회","num":51,"subj":"유통마케팅","q":"머천다이징의 개념에 관한 설명 중 가장 옳지 않은 것은?","opts":{"1":"소매점포가 소비자들의 특성에 적합한 제품들을 잘 선정 해서 매입하고 진열하는 것이다.","2":"소매업체가 좋은 제품을 찾아서 좋은 조건에 매입해서 진열하는 것과 관련된 모든 것을 말한다.","3":"고객의 니즈를 만족시킬 뿐만 아니라 수요를 적극적으로 창출하기 위한 상품화계획을 의미한다.","4":"제품계획 혹은 상품화활동은 상품의 시장성을 향상시킬 수 있는 계획활동이다.","5":"제품 및 제품성과에 대한 소비자들의 지각과 느낌을 상 징한다."},"ans":5},{"year":"2023년 1회","num":53,"subj":"유통마케팅","q":"제품믹스(product mix) 또는 제품포트폴리오(product portfolio)의 특성 중에서 “제품라인 내 제품품목(product item)의 수”를 일컫는 말로 옳은 것은?","opts":{"1":"제품믹스의 깊이(product mix depth)","2":"제품믹스의 폭(product mix width)","3":"제품믹스의 일관성(product mix consistency)","4":"제품믹스의 길이(product mix length)","5":"제품믹스의 구성(product mix composition) 최강 자격"},"ans":1},{"year":"2023년 1회","num":54,"subj":"유통마케팅","q":"아래 글상자의 ( ㉠ )과 ( ㉡ )에 들어갈 용어로 가장 옳은 것은?","opts":{"1":"㉠ 후방통합, ㉡ 전방통합","2":"㉠ 전방통합, ㉡ 후방통합","3":"㉠ 경로통합, ㉡ 전방통합","4":"㉠ 전략적 제휴, ㉡ 후방통합","5":"㉠ 전략적 제휴, ㉡ 경로통합"},"ans":2,"img":["boxes/2023_1_54.png"]},{"year":"2023년 1회","num":55,"subj":"유통마케팅","q":"아래 글상자의 내용과 관련하여 가장 옳지 않은 것은?","opts":{"1":"㉠은 소매업체의 성장전략 중 시장침투 전략에 대한 설 명이다.","2":"㉠은 자사 점포에서 쇼핑하지 않은 고객을 유인하거나 기존 고객들이 더 많은 상품을 구매하도록 유인하는 전 략이다.","3":"㉡은 위험이 낮고 투자가 적게 요구되는 전략이지만, 가 맹계약 해지를 통해 경쟁자가 되는 위험을 가지고 있다.","4":"㉡은 소매업체가 해외시장에 진출할 때 활용되는 진입전 략 중 하나이다.","5":"㉢은 새로운 시장에서 기존 소매업태를 이용하는 성장전 략이다."},"ans":3,"img":["boxes/2023_1_55.png"]},{"year":"2023년 1회","num":56,"subj":"유통마케팅","q":"로열티 프로그램으로 가장 옳지 않은 것은?","opts":{"1":"구매액에 따라 보너스 점수를 부여하거나 방문수에 따라 스탬프를 모으게 하는 스탬프 제도","2":"상품구매자를 대상으로 여러 혜택을 얻을 수 있는 프로 그램에 가입하게 하는 회원제도","3":"20%의 우량고객에 집중해 핵심고객에게 많은 혜택이 부 여되는 마케팅 프로그램 기획 및 운영","4":"동일 기업 내 다수의 브랜드의 통합 또는 이종기업간의 제휴를 통한 통합 포인트 적립 프로그램","5":"기업의 자선활동 및 공익프로그램과의 연계를 통한 사회 문제해결 및 공유가치 창출 프로그램"},"ans":5},{"year":"2023년 1회","num":58,"subj":"유통마케팅","q":"아래 글상자의 괄호 안에 들어갈 소매업 발전이론으로 옳은 것은?","opts":{"1":"소매아코디언이론(retail accordion theory)","2":"소매수명주기이론(retail life cycle theory)","3":"소매차륜이론(the wheel of retailing theory)","4":"변증법적이론(dialectic theory)","5":"진공지대이론(vacuum zone theory)"},"ans":1,"img":["boxes/2023_1_58.png"]},{"year":"2023년 1회","num":59,"subj":"유통마케팅","q":"제품에 맞는 판매기법으로 가장 옳지 않은 것은?","opts":{"1":"편의품은 입지 조건에 따라 판매가 크게 좌우되므로 접 근이 더 용이하도록 배달서비스 제공을 고려할 필요가 있다.","2":"편의품은 보다 풍요로운 생활과 즐거움을 제공하는 제품 으로 스타일과 디자인을 강조한다.","3":"선매품의 경우 고객의 질문에 충분히 답할 수 있는 판매 원의 교육 훈련이 필요하다.","4":"선매품은 패션성이 강하기 때문에 재고가 누적되지 않도 록 시의적절한 판촉을 수행한다.","5":"전문품은 전문적이고 충분한 설명을 통해 소비자의 구매 의욕을 충분히 자극시켜야 한다."},"ans":2},{"year":"2023년 1회","num":60,"subj":"유통마케팅","q":"옴니채널(omni-channel)의 특징으로 옳지 않은 것은?","opts":{"1":"독립적으로 운영되던 채널들이 유기적으로 통합되어 서 로의 부족한 부분을 메워주는 보완적 관계를 갖는다.","2":"채널 간의 불필요한 경쟁은 온·오프라인의 판매실적을 통합함으로써 해결한다.","3":"동일한 제품을 온라인이나 오프라인에 상관없이 동일한 가격과 프로모션으로 구매할 수 있다.","4":"온·오프라인의 재고관리 시스템을 일원화할 수 있다.","5":"동일한 기업으로부터 공급받은 제품을 매장별로 독특한 마케팅 프로그램을 활용하여 판매한다."},"ans":5},{"year":"2023년 1회","num":61,"subj":"유통마케팅","q":"고객의 개인정보보호에 관한 내용으로 가장 옳지 않은 것 은?","opts":{"1":"고객정보를 제3자에게 제공하거나 제공받은 목적 외의 용도로 이용해서는 안 된다.","2":"고객은 개인정보수집, 이용, 제공 등에 대해 동의 철회 및 정정을 요구할 수 있다.","3":"SMS 광고 전송 시 전송자의 명칭을 표시하고, 수신거부 의사를 표현할 수 있게 해야 한다.","4":"경품응모권을 통해 수집한 개인정보는 보유 및 이용기간 최강 자격","5":""},"ans":4},{"year":"2023년 1회","num":62,"subj":"유통마케팅","q":"CRM과 eCRM을 비교하여 설명한 내용으로 가장 옳은 것 은?","opts":{"1":"CRM과 달리 eCRM은 원투원마케팅(one-to-one marketing)과 데이터베이스마케팅 활용을 중시한다.","2":"CRM과 달리 eCRM은 고객 개개인에 대한 차별적 서비 스를 실시간으로 제공한다.","3":"eCRM과 달리 CRM은 고객접점과 커뮤니케이션 경로의 활용을 중시한다.","4":"eCRM과 달리 CRM 싱(licensing)","5":"㉠ 해외직접투자, ㉡ 프랜차이징(franchising)"},"ans":2,"img":["boxes/2023_2_3.png"]},{"year":"2023년 2회","num":4,"subj":"유통물류일반","q":"경제활동의 윤리적 환경과 조건을 세계 각국 공통으로 표준 화하려는 것으로 비윤리적인 기업의 제품이나 서비스를 국제 거래에서 제한하는 움직임을 뜻하는 것은?","opts":{"1":"우루과이라운드 ② 부패라운드","2":"","3":"블루라운드 ④ 그린라운드","4":"","5":"윤리라운드"},"ans":5},{"year":"2023년 2회","num":6,"subj":"유통물류일반","q":"리더의 행동을 생산에 대한 관심과 사람에 대한 관심을 기준 으로 구분하여 연구한 블레이크(Blake)와 무톤(Mouton)의 관 리격자연구에 따른 리더십 유형에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"중도형(5-5) - 절충에 신경을 쓰기 때문에 때로는 우유부 단하게 비칠 수 있다.","2":"팀형(9-9) - 팀의 업적에만 관심을 갖는 리더로 부하를 하나의 수단으로 취급할 수 있다.","3":"컨츄리클럽형(1-9) - 부하의 욕구나 동기를 충족시키면 그들이 알아서 수행할 것이라는 전제하에 나타나는 리더 십이다.","4":"무관심형(1-1) - 리더는 업무에 대한 지시만 하고 어려운 문제가 생기면 회피한다.","5":"과업형(9-1) - 리더 혼자서 의사결정을 하고 관리의 초점 도 생산성 제고에 맞춰진다."},"ans":2},{"year":"2023년 2회","num":7,"subj":"유통물류일반","q":"기업이 자금을 조달하는 각종 원천에 대한 설명으로 옳지 않 은 것은?","opts":{"1":"단기자금 조달을 위해 신용대출을 활용하기도 한다.","2":"채권발행의 경우 기업 경영진의 지배력은 유지되는 장점 이 있다.","3":"주식 매각의 장점은 주주들에게 주식배당을 할 법적의무 가 없어진다는 것이다.","4":"팩토링은 대표적인 담보대출의 한 형태이다.","5":"채권발행은 부채의 증가로 인해 기업에 대한 인식에 악영 향을 끼칠 수 있다."},"ans":4},{"year":"2023년 2회","num":8,"subj":"유통물류일반","q":"에머슨(Emerson, H.)의 직계·참모식 조직(line and staff organization)의 단점에 대한 설명으로 옳지 않은 것은?","opts":{"1":"명령체계와 조언, 권고적 참여가 혼동되기 쉽다.","2":"집행부문이 스태프(staff) 부문에 자료를 신속·충분하게 제 공하지 않으면 참모 부문의 기능은 잘 발휘되지 못한다.","3":"집행부문의 종업원과 스태프(staff) 부문의 직원 간에 불 화를 가져올 우려가 있다.","4":"라인(line)의 창의성을 결여하기 쉽다.","5":"명령이 통일되지 않아 전체의 질서적 관리가 혼란스러워 지는 경우가 발생할 수 있다."},"ans":5},{"year":"2023년 2회","num":11,"subj":"유통물류일반","q":"유통산업의 경제적 의의에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"유통산업은 국민 경제적 측면에서 생산과 소비를 연결해 주는 기능을 수행한다.","2":"유통산업은 국민들로 하여금 상품이나 서비스 소비를 가 능하게 함으로써 생활수준을 유지·향상시켜 준다.","3":"유통산업은 국가경제를 순환시키는데 중요한 역할을 담 당하고 있다.","4":"우리나라 유통산업은 2010년대 후반 유통시장 개방과 자유화 정책 이후 급속히 발전하여 제조업에 이은 국가 기간산업으로 성장하였다.","5":"유통산업은 생산과 소비의 중개를 통해 제조업의 경쟁력 을 높이고 소비자 후생의 증진에 큰 기여를 하고 있다."},"ans":4},{"year":"2023년 2회","num":12,"subj":"유통물류일반","q":"물류의 기본적 기능과 관련한 활동에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"서로 다른 두 을 결정하는 방법을 말한다.","4":"소비자를 대상으로 하는 판매촉진의 유형 중 쿠폰 (coupon)은 가격할인을 보장하는 일종의 증서로 지면에 표시된 가격만큼 제품가격에서 할인해 주는 방법이다.","5":"중간상의 판매촉진의 유형으로 협동광고는 제조업자가 협동하여 지역의 소매상들이 공동으로 시행하는 광고를 말한다."},"ans":3},{"year":"2023년 2회","num":59,"subj":"유통마케팅","q":"고객관계관리(CRM)와 관련한 채널관리 이슈에 대한 설명으 로 가장 옳지 않은 것은?","opts":{"1":"채널은 고객접점으로서 관리되어야 한다.","2":"채널의 정보교환 기능을 활성화시켜야 한다.","3":"채널 파트너와의 협업을 관리해야 한다.","4":"채널을 차별화함으로써 발생할 수 있는 채널 간 갈등을 최소화해야한다.","5":"CRM을 성공적으로 수행하기 위해서 다양한 채널을 독립 적으로 운영해야 한다."},"ans":5},{"year":"2023년 2회","num":60,"subj":"유통마케팅","q":"다음 중 소매업이 상품 판매를 효과적으로 전개하기 위해 제공하는 물적·기능적 서비스에 해당하지 않는 것은?","opts":{"1":"포장지, 선물상자의 제공 등과 같은 상품부대물품의 제 공 서비스","2":"할부판매, 외상 판매 등과 같은 금융적 서비스","3":"전달 카탈로그, 광고 선전 등과 같은 정보 제공 서비스","4":"고객의 선택 편의 및 구매 효율을 높이는 셀프서비스와 같은 시스템적 서비스","5":"상품 설명, 쇼핑 상담, 배달 등과 같은 노역 기술 제공 서비스"},"ans":5},{"year":"2023년 2회","num":62,"subj":"유통마케팅","q":"아래 글상자의 내용이 공통적으로 설명하고 있는 CRM 분석 도구로 가장 옳은 것은?","opts":{"1":"데이터 마이닝(data mining)","2":"데이터웨어하우징(data warehousing)","3":"OLTP(online transaction processing)","4":"OLAP(online analytical processing)","5":"EDI(electronic data interchange)"},"ans":4,"img":["boxes/2023_2_62.png"]},{"year":"2023년 2회","num":64,"subj":"유통마케팅","q":"고객생애가치 이론에 관한 설명으로 가장 옳은 것은?","opts":{"1":"고객생애가치는 특정 고객으로부터 얻게 되는 이익흐름 의 미래가치를 의미한다.","2":"고객 애호도가 높다는 것은 곧 고객생애가치가 높다는 것을 가리킨다.","3":"기업은 고객생애가치를 높이기 위하여 경쟁자보다 더 높 은 가치를 제공해 주어야 한다.","4":"올바른 고객생애가치를 산출하기 위해서는 기업의 수입 흐름만 고려하면 된다.","5":"고객생애가치는 고객과의 한번의 거래에서 나오는 이익 을 의미한다."},"ans":3},{"year":"2023년 2회","num":66,"subj":"유통마케팅","q":"아래 글상자에서 말하는 여러 효과를 모두 보유하고 있는 마케팅 활동은?","opts":{"1":"쿠폰 ② 프리미엄","2":"","3":"컨테스트 ④ 인적 판매","4":"","5":"리베이트"},"ans":1,"img":["boxes/2023_2_66.png"]},{"year":"2023년 2회","num":67,"subj":"유통마케팅","q":"아래 글상자의 설명으로 가장 옳은 것은?","opts":{"1":"혼합식 머천다이징(scrambled merchandising)","2":"선별적 머천다이징(selective merchandising)","3":"세그먼트 머천다이징(segment merchandising)","4":"계획적 머천다이징(programed merchandising)","5":"상징적 머천다이징(symbol merchandising)"},"ans":3,"img":["boxes/2023_2_67.png"]},{"year":"2023년 2회","num":68,"subj":"유통마케팅","q":"아래 글상자의 괄호 안에 들어갈 용어로 가장 옳은 것은?","opts":{"1":"㉠ 선도가격(leader pricing), ㉡ 수량가격(quantity based pricing)","2":"㉠ 단수가격(odd pricing), ㉡ 변동가격(dynamic pricing)","3":"㉠ 선도가격(leader pricing), ㉡ 단수가격(odd pricing) 최강 자격","4":"","5":""},"ans":3,"img":["boxes/2023_2_68.png"]},{"year":"2023년 2회","num":69,"subj":"유통마케팅","q":"소매점의 POS(point of sales)시스템에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"POS시스템을 통해 소매점별로 수집된 판매 제품의 품목 명, 수량, 가격, 판촉 등에 관한 정보를 수집할 수 있다.","2":"POS시스템은 POS 단말기, 바코드 스캐너, 스토어 콘트 롤러(store controller)로 구성되어 있다.","3":"POS시스템을 통해 확보한 정보는 고객관계관리(CRM)를 위한 기반 데이터로 활용된다.","4":"전년도 목표 대비 판매량 분석 또는 전월 대비 매출액 변화분석과 같은 시계열 정보를 수집하고 분석하는데 한 계가 있다.","5":"POS시스템을 통해 신제품에 대한 마케팅효과, 판촉효과 등을 분석할 수 있다."},"ans":4},{"year":"2023년 2회","num":70,"subj":"유통마케팅","q":"제품수명주기(PLC) 단계 중 성숙기에 이루어지는 판매촉진 전략으로 옳은 것은?","opts":{"1":"상표 전환을 유도하기 위한 판촉을 증대한다.","2":"수요확대에 따라 점차적으로 판촉을 감소한다.","3":"매출증대를 위한 판매촉진 활동은 최저 수준으로 감소시 킨다.","4":"제품의 인지도 향상을 위한 강력한 판촉을 전개한다.","5":"제품 가격을 높이는 대신 짧은 기간에 모든 판촉수단을 활용하는 전략을 실행한다."},"ans":1},{"year":"2023년 2회","num":72,"subj":"유통마케팅","q":"라이브 커머스(live commerce)에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"라이브 스트리밍(live streaming)과 커머스(commerce)의 합성어이다.","2":"온라인 상에서 실시간으로 쇼호스트가 상품을 설명하고 판매하는 비즈니스 프로세스이다.","3":"온라인 상에서 소비자와 쇼호스트는 실시간으로 소통이 가능하지만 소비자간의 대화는 불가능하다.","4":"기존 이커머스(e-commerce)보다 소통과 재미를 더한 진화된 커머스 형태이다.","5":"최근 소비자들에게 인기를 얻으면서 급성장하고 있다."},"ans":3},{"year":"2023년 2회","num":75,"subj":"유통마케팅","q":"디지털 공급망을 구현하는데 활용되는 블록체인 스마트 계 약(blockchain smart contract) 기술에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"특정 요구사항이 충족되면 네트워크를 통해 실시간으로 계약이 실행된다.","2":"거래 내역이 블록체인 상에 기록되기 때문에 높은 신뢰 도를 형성한다.","3":"블록체인 스마트 계약은 중개자 없이 실행될 수 있기 때 문에 상대적으로 거래 비용이 낮다.","4":"블록체인 기록을 뒷받침하는 높은 수준의 암호화와 분산 원장 특성으로 네트워크에서 높은 보안성을 확보하고 있 다.","5":"블록체인을 활용하기 때문에 거래 기록에 대하여 가시성 을 확보할 수 없다."},"ans":5},{"year":"2023년 2회","num":76,"subj":"유통정보","q":"경쟁력있는 수익창출 방안을 개발하는데 활용되는 비즈니스 모델 캔버스를 구성하는 9가지 요인 중에 ㉠ 가장 먼저 작 성해야 하는 요인과 ㉡ 마지막으로 작성해야 하는 요인이 있다. 여기서 ㉠과 ㉡에 해당하는 내용으로 가장 옳은 것 은?","o ","2":"코리안넷","3":"글로벌 바코드 조회서비스(Global Bar-code Party Information Registry)","4":"글로벌 기업정보 조회서비스(Global Electronic Party Information Registry)","5":"GS1(Global Standard No.1)"},"ans":4},{"year":"2023년 2회","num":90,"subj":"유통정보","q":"기업활동과 관련된 내·외부자료를 영역별로 각기 수집·저장 관리하는 경우 자료의 활용을 위해, 목적에 맞게 적당한 형 태로 변환하거나 통합하는 과정을 거쳐야 한다. 수집된 자 료를 표준화시키거나 변환하여 목표 저장소에 저장할 수 있 도록 도와주는 기술로 가장 옳은 것은?","opts":{"1":"OLTP(online transaction processing)","2":"OLAP(online analytical processing)","3":"ETL(extract, transform, load)","4":"정규화(normalization)","5":"플레이크(flake) 최강 자격"},"ans":3},{"year":"2023년 3회","num":1,"subj":"유통물류일반","q":"특정 업무를 수행하는 데 소요되는 비용이 가장 낮은 유통경 로기관이 해당 업무를 수행하는 방향으로 유통경로의 구조가 결정된다고 설명하는 유통경로구조이론으로 가장 옳은 것은?","opts":{"1":"대리인(agency)이론","2":"게임(game)이론","3":"거래비용(transaction cost)이론","4":"기능위양(functional spinoff)이론","5":"연기-투기(postponement-speculation)이론"},"ans":4},{"year":"2023년 3회","num":2,"subj":"유통물류일반","q":"아래 글상자의 자료를 토대로 계산한 경제적주문량(EOQ)이 200이라면 연간 단위당 재고유지 비용으로 옳은 것은?","opts":{"1":"100 ② 200","2":"","3":"300 ④ 400","4":"","5":"500"},"ans":1,"img":["boxes/2023_3_2.png"]},{"year":"2023년 3회","num":3,"subj":"유통물류일반","q":"운송과 관련한 설명 중 가장 옳지 않은 것은?","opts":{"1":"해상운송의 경우 최종목적지까지의 운송에는 한계가 있기 에 피시백(fishy back) 복합운송서비스를 제공한다.","2":"트럭운송은 혼적화물운송(LTL: less than truckload) 상태 의 화물도 긴급 수송이 가능하고 단거리 운송에도 경제적 이다.","3":"다른 수송형태에 비해 철도운송은 상대적으로 도착시간을 보증할 수 있다.","4":"항공운송은 고객이 원하는 지점까지의 운송을 위해 피기 백(piggy back) 복합운송서비스를 활용한다.","5":"COFC는 철도의 무개화차 위에 컨테이너를 싣고 수송하 는 방식이다."},"ans":4},{"year":"2023년 3회","num":5,"subj":"유통물류일반","q":"기업이 e-공급망 관리(e-SCM)를 통해 얻을 수 있는 효과로 가장 옳지 않은 것은?","opts":{"1":"고객의 욕구변화에 더욱 신속하게 대응하게 되고 고객만 족도가 증가한다.","2":"공급자와 구매자 간의 정보 공유로 필요한 물량을 자동으 로 보충해서 재고 감축이 가능하다.","3":"거래 및 투자비용을 절감할 수 있다.","4":"공급망 자동화를 통해 전체 주문 이행 사이클 타임의 단 축이 가능하다.","5":"구매자의 데이터를 분석하여 그들의 개별니즈를 충족시킬 수 있는 표준화된 서비스 제공이 가능해졌다."},"ans":5},{"year":"2023년 3회","num":7,"subj":"유통물류일반","q":"아래 글상자에서 설명하는 개념으로 옳은 것은?","opts":{"1":"블랙 스완 효과(black swan effect)","2":"밴드 왜건 효과(band wagon effect)","3":"채찍 효과(bullwhip effect)","4":"베블렌 효과(Veblen effect)","5":"디드로 효과(Diderot effect)"},"ans":3,"img":["boxes/2023_3_7.png"]},{"year":"2023년 3회","num":8,"subj":"유통물류일반","q":"제품/시장 확장그리드(product/market expansion grid)에서 기존제품을 가지고 새로운 세분시장을 파악해서 진출하는 방 식의 기업성장전략으로 가장 옳은 것은?","opts":{"1":"시장침투전략(market penetration strategy)","2":"시장개발전략(market development strategy)","3":"제품개발전략(product development strategy)","4":"다각화전략(diversification strategy)","5":"수평적 다각화전략(horizontal diversification strategy)"},"ans":2},{"year":"2023년 3회","num":9,"subj":"유통물류일반","q":"유통경로에서 발생하는 각종 힘(power)에 관한 설명으로 가 장 옳지 않은 것은?","opts":{"1":"합법력은 법률이나 계약과 같이 정당한 권리에 의해 발생 하거나 조직 내의 공식적인 지위에서 발생한다.","2":"강제력의 강도는 처벌이 지닌 부정적 효과의 크기에 반비 례한다.","3":"정보력은 공급업자가 중요한 정보를 가지고 있다는 인식 을 할 경우 발생한다.","4":"준거력은 공급업자에 대해 일체감을 갖는 경우에 발생한 다.","5":"보상력은 재판매업자가 자신의 보상을 조정할 수 있는 능 력을 가지고 있다고 인식할수록 증가한다."},"ans":2},{"year":"2023년 3회","num":12,"subj":"유통물류일반","q":"유통산업이 합리화되는 경우에 나타나는 현상으로 가장 옳 지 않은 것은?","opts":{"1":"업무 효율화를 통해 유통업체의 규모가 작아진다.","2":"유통 경로상 제조업의 협상력이 축소된다.","3":"법률이나 정부의 규제가 늘어난다.","4":"생산지의 가격과 소비자의 구매가격의 차이가 줄어든다.","5":"유통경로가 단축되어 유통비용이 절감된다."},"ans":3},{"year":"2023년 3회","num":13,"subj":"유통물류일반","q":"직무기술서와 직무명세서를 비교할 때 직무기술서에 해당되 는 내용으로 가장 옳은 것은?","opts":{"1":"작업자의 특성을 평가하여 조직 전략을 효율적으로 달성 하기 위한 것이다.","2":"속직적 기준으로 직무의 내용을 요약하고 수행에 필요한 정보를 포함한다.","3":"직무명칭, 직무개요, 직무내용 등의 인적 요건을 포함한 다.","4":"직무내용보다는 인적요건을 중심으로 정리한다.","5":"작업자의 지식, 기능, 능력 등의 요소를 포함한다. 최강 자격"},"ans":2},{"year":"2023년 3회","num":14,"subj":"유통물류일반","q":"유통경영전략의 수립단계를 순서대로 나열한 것으로 가장 옳은 것은?","opts":{"1":"사업포트폴리오분석 - 기업의 사명 정의 - 기업의 목표 설정 - 성장전략의 수립","2":"기업의 목표 설정 - 사업포트폴리오분석 – 성장전략의 수립 - 기업의 사명 정의","3":"사업포트폴리오분석 - 기업의 목표 설정 - 기업의 사명 정의 - 성장전략의 수립","4":"기업의 사명 정의 - 기업의 목표 설정 – 사업포트폴리오 분석 - 성장전략의 수립","5":"성장전략의 수립 - 기업의 목표 설정 - 사업포트폴리오 분석 - 기업의 사명 정의"},"ans":4},{"year":"2023년 3회","num":15,"subj":"유통물류일반","q":"보관을 위한 각종 창고의 유형에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"자가 창고의 경우 기업이 자신의 목적에 맞게 맞춤형 창 고 설계가 가능하다.","2":"영업 창고 요금은 창고 이용에 따른 보관료를 기본으로 하며 하역료를 제외한다.","3":"임대 창고는 영업창고업자가 아닌 개인이나 법인 등이 소유하고 있는 창고를 임대료를 받고 제공하는 것이다.","4":"공공 창고는 공익을 목적으로 건설한 창고로 공립창고가 한 예이다.","5":"관설상옥은 정부나 지방자치단체가 해상과 육상 연결용 화물 판매용도로 제공하는 창고이다."},"ans":2},{"year":"2023년 3회","num":16,"subj":"유통물류일반","q":"아웃소싱을 실시하는 기업이 얻을 수 있는 장점으로 가장 옳지 않은 것은?","opts":{"1":"다른 채널의 파트너로부터 규모의 경제 효과를 얻을 수 있다.","2":"분업의 원리를 통해 이익을 얻을 수 있다.","3":"고정비용은 늘어나지만 변동비용을 줄여서 비용 절감효 과를 얻을 수 있다.","4":"아웃소싱 파트너의 혁신적인 혜택을 누릴 수 있다.","5":"자사의 기술보다 우월한 기술을 누릴 수 있다."},"ans":3},{"year":"2023년 3회","num":17,"subj":"유통물류일반","q":"아래 글상자가 설명하는 합작투자 유형으로 옳은 것은?","opts":{"1":"계약생산(contract manufacturing)","2":"관리계약(management contracting)","3":"라이센싱(licensing)","4":"공동소유(joint ownership)","5":"간접수출(indirect exporting)"},"ans":3,"img":["boxes/2023_3_17.png"]},{"year":"2023년 3회","num":19,"subj":"유통물류일반","q":"제품에 대한 소유권을 갖고 제조업자로부터 제품을 취득하 여 소매상에게 바로 운송하는 한정기능도매상으로 옳은 것 은?","opts":{"1":"우편주문도매상(mail-order wholesaler)","2":"진열도매상(rack jobber)","3":"트럭도매상(truck wholesaler)","4":"직송도매상(drop shipper)","5":"현금무배달도매상(cash-and-carry wholesaler)"},"ans":4},{"year":"2023년 3회","num":20,"subj":"유통물류일반","q":"대리도매상 중 판매대리인(selling agent)과 제조업자의 대 리인(manufacture's agent)의 차이로 옳지 않은 것은?","opts":{"1":"판매대리인은 모든 제품을 취급하지만 제조업자의 대리 인은 일부 제품만을 취급한다.","2":"판매대리인은 제조업자의 대리인보다 활동범위가 넓고 비교적 자율적인 의사결정이 가능하다.","3":"판매대리인은 제조업자의 시장지배력이 약한 지역에서만 활동하지만 제조업자의 대리인은 모든 지역에서 판매를 한다.","4":"판매대리인은 신용을 제공하지만 제조업자의 대리인은 신용을 제공하지 못한다.","5":"판매대리인은 기업의 마케팅 부서와 같은 기능을 수행하 는 도매상인 반면 제조업자의 대리인은 장기적인 계약을 통해 제조업자의 제품을 특정 지역에서 판매대행을 하는 도매상을 말한다."},"ans":3},{"year":"2023년 3회","num":21,"subj":"유통물류일반","q":"불공정 거래행위에 해당되지 않는 것은?","opts":{"1":"기존재고상품을 다른 상품으로 교환하면서 기존의 재고 상품을 특정매입상품으로 취급하여 반품하는 행위","2":"직매입을 특정매입계약으로 전환하면서 기존 재고상품을 특정매입상품으로 취급하여 반품하는 행위","3":"대규모 유통업자가 부당하게 납품업자 등에게 배타적 거 래를 하도록 강요하는 경우","4":"정상가격으로 매입한 주문제조상품을 할인행사를 이유로 서류상의 매입가를 낮춰 재매입하고 낮춘 매입원가로 납 품대금을 주는 경우","5":"직매입 납품업체의 납품과정에서 상품에 훼손이나 하자 가 발생한 경우 상품대금을 감액하는 경우"},"ans":5},{"year":"2023년 3회","num":22,"subj":"유통물류일반","q":"샤인(Schein)이 제시한 조직 문화의 세 가지 수준에서 인식 적 수준에 해당되는 것으로 가장 옳은 것은?","opts":{"1":"인지가치와 행위가치로 구분할 수 있는 가치관","2":"개개인의 행동이나 관습","3":"인간성","4":"인간관계 최강 자격","5":""},"ans":1},{"year":"2023년 3회","num":23,"subj":"유통물류일반","q":"공급업자 평가방법 중 각 평가 기준의 중요성을 정확하게 판단할 수 없는 경우에 유용한 평가방법은?","opts":{"1":"가중치 평가방법 ② 단일기준 평가방법","2":"","3":"최소기준 평가방법 ④ 주요기준 평가방법","4":"","5":"평균지수 평가방법"},"ans":3},{"year":"2023년 3회","num":24,"subj":"유통물류일반","q":"소비자기본법(법률 제17799호, 2020.12.29., 타법개정)에 따라 국가가 광고의 내용이나 방법에 대한 기준을 제한할 수 있는 항목으로 옳지 않은 것은?","opts":{"1":"용도, 성분, 성능","2":"소비자가 오해할 우려가 있는 특정용어나 특정 표현","3":"광고의 매체","4":"광고 시간대","5":"광고 비용"},"ans":5},{"year":"2023년 3회","num":26,"subj":"상권분석","q":"지리정보시스템(GIS)을 이용한 상권분석과 관련한 내용 으 로 옳지 않은 것은?","opts":{"1":"각 동(洞)별 인구, 토지 용도, 평균지가 등을 겹쳐서 상 권의 중첩을 표현할 수 있다.","2":"주제도란 GIS소프트웨어를 사용하여 데이터베이스 조회 후 속성정보를 요약해 표현한 지도이다.","3":"버퍼는 점이나 선 또는 면으로부터 특정 거리 이내에 포 함되는 영역을 의미한다.","4":"교차는 동일한 경계선을 가진 두 지도레이어를 겹쳐서 형상과 속성을 비교하는 기능이다.","5":"위상이란 지리적인 형상을 표현한 지도상의 상대적 위치 를 알 수 있는 기능을 부여하는 역할을 한다."},"ans":4},{"year":"2023년 3회","num":27,"subj":"상권분석","q":"구조적 특성에 의해 상권을 분류할 때 포켓상권에 해당하는 것으로 옳은 것은?","opts":{"1":"상가의 입구를 중심으로 형성된 상권","2":"고속도로나 간선도로에 인접한 상권","3":"대형소매점과 인접한 상권","4":"소형소매점들로 구성된 상권","5":"도로나 산, 강 등에 둘러싸인 상권"},"ans":5},{"year":"2023년 3회","num":28,"subj":"상권분석","q":"중심지체계나 주변환경 등에 의해 분류할 수 있는 상권의 유형에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"도심상권은 중심업무지구(CBD)를 포함하며 상권의 범위 가 넓고 소비자들의 평균 체류시간이 길다.","2":"근린상권은 점포인근 거주자들이 주요 소비자로 생활밀 착형 업종의 점포들이 입지하는 경향이 있다.","3":"부도심상권은 간선도로의 결절점이나 역세권을 중심으로 형성되는 경우가 많으며 도시 전체의 소비자를 유인한 다.","4":"역세권상권은 지하철이나 철도역을 중심으로 형성되며 지상과 지하의 입체적 상권으로 고밀도 개발이 이루어지 격증 기출문제 전자문제집 CBT : www.comcbt.com","5":""},"ans":3},{"year":"2023년 3회","num":29,"subj":"상권분석","q":"소매점포의 상권범위나 상권형태는 소매점포를 이용하는 소 비자의 공간적 분포를 나타낸다. 이에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"소매점포의 면적이 비슷하더라도 업종이나 업태에 따라 개별점포의 상권범위는 차이가 날 수 있다.","2":"동일 점포라도 소매전략에 따른 판촉활동 등의 차이에 따라 시기별로 점포의 상권범위는 변화한다.","3":"상권의 형태는 점포를 중심으로 일정한 거리 간격의 동 심원 형태로 나타난다.","4":"동일한 지역에 인접하여 입지한 경우에도 점포 규모에 따라 개별점포의 상권범위는 차이가 날 수 있다.","5":"동일한 위치에서 입지조건의 변화가 없고 점포의 전략적 변화가 없어도 상권의 범위는 유동적으로 변화하기 마련 이다."},"ans":3},{"year":"2023년 3회","num":30,"subj":"상권분석","q":"상권 내의 경쟁점포 분석에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"초점이 되는 조사문제를 중심으로 실시한다.","2":"조사목적에 맞는 세부조사항목을 구체적으로 정해서 실 시한다.","3":"상품구성분석은 상품구성기본정책, 상품계열구성, 품목구 성을 포함한다.","4":"가격은 조사당시 주력상품 특매상황이라도 실제 판매가 격을 분석한다.","5":"자사점포의 현황과 비교하여 조사결과를 분석한다."},"ans":4},{"year":"2023년 3회","num":31,"subj":"상권분석","q":"크리스탈러(Christaller, W.)의 중심지이론에서 말하는 중심 지 기능의 최대 도달거리(the range of goods and services)가 의미하는 것으로 가장 옳은 것은?","opts":{"1":"중심지의 유통서비스 기능이 지역거주자에게 제공될 수 있는 한계거리","2":"소비자가 도보로 접근할 수 있는 중심지까지의 최대도달 거리","3":"전문품 상권과 편의품 상권의 지리적 최대 차이","4":"상위 중심지와 하위 중심지 사이의 거리","5":"상업중심지의 정상이윤 확보에 필요한 수요를 충족시키 는 상권범위"},"ans":1},{"year":"2023년 3회","num":32,"subj":"상권분석","q":"상권 내 소비자의 소비패턴이나 공간이용실태 등을 조사하 기 위해 표본조사를 실시할 때 사용할 수 있는 비확률표본 추출 방법에 해당하는 것으로 가장 옳은 것은?","opts":{"1":"층화표본추출법(stratified random sampling)","2":"체계적표본추출법(systematic sampling)","3":"단순무작위표본추출법(simple random sampling)","4":"할당표본추출법(quota sampling)","5":"군집표본추출법(cluster sampling)"},"ans":4},{"year":"2023년 3회","num":34,"subj":"상권분석","q":"도심으로부터 새로운 교통로가 발달하면 교통로를 축으로 도매, 경공업 지구가 부채꼴 모양으로 확대된다는 공간구조 이론으로 가장 옳은 것은?","opts":{"1":"버제스(E.W. Burgess)의 동심원지대이론(concentric zone theory)","2":"해리스(C.D. Harris)의 다핵심이론(multiple nuclei theory)","3":"호이트(H. Hoyt)의 선형이론(sector theory)","4":"리카도(D. Ricardo)의 차액지대설(differential rent theory)","5":"마르크스(K.H. Marx)의 절대지대설(absolute rent theory)"},"ans":3},{"year":"2023년 3회","num":35,"subj":"상권분석","q":"인구 9만명인 도시 A와 인구 1만명인 도시 B 사이의 거리 는 20Km이다. 컨버스의 공식을 적용할 때 도시 B로부터 두 도시(A, B) 간 상권분기점까지의 거리로 옳은 것은?","opts":{"1":"5Km ② 10Km","2":"","3":"15Km ④ 20Km","4":"","5":"25km"},"ans":1},{"year":"2023년 3회","num":36,"subj":"상권분석","q":"신규점포의 입지를 결정하는 과정에서 후보입지의 매력도 평가에 활용할 수 있는 회귀분석모형에 관한 설명으로 가장 옳지 않은 것은?","opts":{"1":"종속변수는 독립변수의 영향을 받는 관계이므로 종속변 수와 상관관계가 있는 독립변수를 포함시켜야 한다.","2":"회귀분석모형에 포함되는 독립변수들은 서로 상관관계가 높지 않고 독립적이어야 한다.","3":"성과에 영향을 미치는 독립변수로는 점포 자체의 입지적 특성과 상권 내 경쟁수준 등을 포함시킬 수 있다.","4":"인구수, 소득수준, 성별, 연령 등 단이나 시장의 특성에 관한 자료를 수집·분석하고 결과를 기술하는 조사이다.","2":"2차 자료는 당면한 조사목적이 아닌 다른 목적을 위해 과거에 수집되어 이미 존재하는 자료이다.","3":"1차 자료는 당면한 조사목적을 달성하기 위하여 조사자 가 직접 수집한 자료이다.","4":"마케팅조사에는 정성조사와 정량조사 모두 필수적으로 제시되어야 한다.","5":"탐색조사는 조사문제가 불명확할 때 기본적인 통찰과 아 이디어를 얻기 위해 실시하는 조사이다."},"ans":4},{"year":"2023년 3회","num":69,"subj":"유통마케팅","q":"점포의 비주얼 머천다이징 요소로서 가장 옳지 않은 것은?","opts":{"1":"점두, 출입구, 건물 외벽 등의 점포 외장","2":"매장 및 후방, 고객 동선, 상품배치 등의 레이아웃","3":"매장 인테리어, 조명, 현수막 등의 점포 내부","4":"진열 집기, 트레이, 카운터 등 각종 집기","5":"종업원의 복장, 머리카락, 청결 상태 등의 위생 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":2},{"year":"2023년 3회","num":70,"subj":"유통마케팅","q":"상품진열에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"고객의 오감을 즐겁게 하면서도 찾기 쉽고 선택을 용이 하게 하는 진열을 한다.","2":"매장 입구에는 구매빈도가 높은 상품위주로 진열한다.","3":"오픈진열을 할 경우 경품 및 행사상품, 고회전상품, 저회 전상품 순으로 진열한다.","4":"셀프서비스 판매방식 소매점에서는 소비자가 직접 상품 을 선택할 수 있도록 곤돌라 또는 쇼케이스를 이용한 진 열방식의 활용이 일반적이다.","5":"엔드진열은 신상품, 행사상품의 효율적 소구를 위해 매 장의 빈 공간에 독립적으로 진열하는 방식이다."},"ans":5},{"year":"2023년 3회","num":71,"subj":"유통마케팅","q":"아래 글상자의 괄호 안에 들어갈 용어를 순서대로 바르게 나열한 것으로 가장 옳은 것은?","opts":{"1":"㉠ 지도학습, ㉡ 비지도학습","2":"㉠ 지도학습, ㉡ 준지도학습","3":"㉠ 지도학습, ㉡ 강화학습","4":"㉠ 강화학습, ㉡ 지도학습","5":"㉠ 강화학습, ㉡ 준지도학습"},"ans":3,"img":["boxes/2023_3_71.png"]},{"year":"2023년 3회","num":72,"subj":"유통마케팅","q":"드론의 구성요인에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"드론의 항법센서로는 전자광학센서, 초분광센서, 적외선 센서 등이 있다.","2":"드론 탑재 컴퓨터는 드론을 운영하는 브레인 역할을 하 며 드론의 위치, 모터, 배터리 상태 등을 확인할 수 있게 한다.","3":"드론 모터는 드론의 움직임이 가능하도록 지원하고, 배 터리는 모터에 에너지를 제공한다.","4":"드론 임무장비는 드론이 비행을 하면서 특정한 임무를 하도록 장착된 관련 장비를 의미한다.","5":"드론 프로펠러 및 프레임은 드론이 비행하도록 프레임워 크를 제공한다."},"ans":1},{"year":"2023년 3회","num":74,"subj":"유통마케팅","q":"공급사슬의 성과지표들 중 고객서비스의 신뢰성 지표로 가 장 옳은 것은?","opts":{"1":"평균 재고 회전율","2":"약속 기일 충족률","3":"신제품 및 신서비스 출시 숫자","4":"특별 및 긴급 주문을 처리하는데 걸리는 시간","5":"납기를 맞추기 위해 요구되는 긴급주문의 횟수"},"ans":2},{"year":"2023년 3회","num":75,"subj":"유통마케팅","q":"지식경영에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"피터 드러커(Peter Drucker,1954)는 재무 지식 뿐만 아 니라 비재무 지식을 활용해 경영성과를 측정하는 균형성 과표를 제시하였다.","2":"위그(Wigg,1986)는 지식경영을 지식 및 지식관련수익을 극대화시키는 경영활동이라고 정의하였다.","3":"노나카(Nonaka,1991)는 지식경영을 형식지와 암묵지의 순환과정을 통해 경쟁력을 확보하는 경영활동이라고 정 의하였다.","4":"베크만(Bechman,1997)은 지식경영을 조직의 역량, 업무 성과 및 고객가치를 제고하는 경영활동이라고 정의하였 다.","5":"스베이비(Sveiby,1998)는 지식경영을 무형자산을 통해 가치를 창출하는 경영활동이라고 정의하였다."},"ans":1},{"year":"2023년 3회","num":76,"subj":"유통정보","q":"웹 2.0을 가능하게 하고 지원하는 기술에 대한 설명으로 가 장 옳지 않은 것은?","opts":{"1":"폭소노미(folksonomy)란 자유롭게 선택된 일종의 태그인 키워드를 사용해 구성원들이 함께 정보를 체계화하는 방 식이다.","2":"UCC(user created contents)는 사용자들이 웹 콘텐츠의 생산자인 동시에 소비자로서의 역할을 가능하게 하여 참 여와 공유를 지원한다.","3":"매시업(mashup)은 웹 콘텐츠를 소프트웨어가 자동적으 로 이해하고 처리할 수 있도록 지원하여 정보와 지식의 공유 및 협력을 촉진한다.","4":"API(application programming interface)는 응용 프로그 램에서 사용할 수 있도록 컴퓨터 운영체제나 프로그래밍 언어가 제공하는 기능을 제어할 수 있도록 만든 인터페 이스이다.","5":"RSS(rich site summary)란 웹 공간에서 콘텐츠 공유를 촉진하며, 특정 사이트에서 새로운 정보가 있을 때 자동 적으로 받아볼 수 있는 콘텐츠 배급방식이다."},"ans":3},{"year":"2023년 3회","num":77,"subj":"유통정보","q":"스튜워트(W. M. Stewart)가 주장하는 물류의 중요성이 강조 되는 이유로 가장 옳지 않은 것은?","opts":{"1":"재고비용절감을 위해서는 증가된 주문 횟수를 처리할 새 로운 시스템의 도입이 필요하다.","2":"소비자의 제품가격 인하 요구는 능률적이며 간접적인 제 품 분배경로를 필요로 하게 되었다.","3":"기업은 물류 서비스 개선 및 물류비 절감을 통해 고객에 대한 서비스 수준을 높일 수 있으며, 이는 기업에게 새 로운 수요 창출의 기회가 된다.","4":"소비자의 제품에 대한 다양한 요구는 재고 저장단위수의 증대를 필요로 하며, 이는 다목적 창고 재고유지, 재고 불균형 등의 문제를 발생시킨다.","5":"가격결정에 있어 신축성을 부여하기 위해서는 개별시장 으로의 운송에 소요되는 실제 분배비용에 의존하기 보다 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":5},{"year":"2023년 3회","num":78,"subj":"유통정보","q":"POS(point of sale)시스템 도입에 따른 장점으로 가장 옳지 않은 것은?","opts":{"1":"매상등록시간이 단축되어 고객 대기시간이 줄며 계산대 의 수를 줄일 수 있다.","2":"단품관리에 의해 잘 팔리는 상품과 잘 팔리지 않는 상품 을 즉각 찾아낼 수 있다.","3":"적정 재고수준의 유지, 물류관리의 합리화, 판촉전략의 과학화 등의 효과를 가져올 수 있다.","4":"POS터미널의 도입에 의해 판매원 교육 및 훈련시간이 짧아지고 입력오류를 방지할 수 있다.","5":"CPFR(collaborative planning, forecasting and replenishment)과 연계하여 신속하고 적절한 구매를 할 수 있다."},"ans":5},{"year":"2023년 3회","num":79,"subj":"유통정보","q":"빅데이터 분석 기술들 중 아래 글상자에서 설명하는 용어로 가장 옳은 것은?","opts":{"1":"감성분석","2":"기계학습","3":"회귀분석","4":"텍스트 마이닝(text mining)","5":"오피니언 마이닝(opinion mining)"},"ans":3,"img":["boxes/2023_3_79.png"]},{"year":"2023년 3회","num":80,"subj":"유통정보","q":"EDI(electronic data interchange)에 대한 설명으로 가장 옳 지 않은 것은?","opts":{"1":"EDI는 기업 간에 교환되는 거래서식을 컴퓨터로 작성하 고 통신망을 이용하여 직접 전송하는 정보교환방식을 의 미한다.","2":"EDI가 이루어지기 위해서는 거래업체들 간에 서로 교환 할 데이터의 형태와 그 데이터를 어떻게 표현할 것인가 에 대한 상호합의가 필요하다.","3":"EDI를 이용하면 지금까지 종이형태의 문서에 기록하고 서명한 다음, 우편을 통해 전달되던 각종 주문서, 송장, 지불명세서 등이 데이터통신망을 통해 전자적으로 전송 되고 처리된다.","4":"EDI는 교환되는 거래문서에 대해 통용될 수 있는 표준양 식이 정해져야 하며, 이를 통해 전달되는 데이터의 형식 이 통일된 후, 이러한 데이터가 일정한 통신표준에 입각 해서 상호 간에 교환될 수 있어야 한다.","5":"전자문서의 사설표준은 특정 산업분야에서 채택되어 사 용되는 표준을 말하며, 사설표준의 대표적인 것에는 국 제상품 코드관리기관인 EAN(국내의 경우: KAN)이 개발· 보급하고 있는 유통부문의 전자문서 국제표준인 EANCOM이 있다."},"ans":5},{"year":"2023년 3회","num":82,"subj":"유통정보","q":"유통정보시스템의 개념에 대한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"물류비용과 재고비용을 감축하여 채널단계에 참여하는 모두가 이익을 얻을 수 있게 한다.","2":"유통정보와 프로세스의 흐름을 확보해 시간차로 발생하 는 가시성 문제를 최소화하여 시장수요와 공급을 조절해 주고 각 개인이 원하는 제품과 서비스 공급이 원활하도 록 지원한다.","3":"유통정보시스템은 경영자가 유통과 관련된 기업의 목표 를 달성하기 위한 효율적이고 효과적인 의사결정을 하는 데 필요한 정보제공을 위해 설계되어야 한다.","4":"유통거래를 지원하는 정보시스템으로 관련된 기존 시스 템의 정보를 추출, 변환, 저장하는 과정을 거쳐 업무담당 자 목적에 맞는 정보만을 모아 관리할 수 있도록 지원해 준다.","5":"유통정보시스템은 기업의 유통활동 수행에 필요한 정보 의 흐름을 통합하여 전사적 유통을 가능하게 하고 유통 계획, 관리, 거래처리 등에 필요한 데이터를 처리하여 유 통관련 의사결정에 필요한 정보를 적시에 제공하기 위한 절차, 설비, 인력을 뜻한다."},"ans":4},{"year":"2023년 3회","num":83,"subj":"유통정보","q":"지식관리시스템에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"기업은 고객에게 지속적이고 일관성 있는 정보를 제공하 기 위해서 지식관리시스템을 활용한다.","2":"기업은 지식네트워킹을 통해서 새로운 제품을 출시할 수 있고 고객에게 양질의 서비스를 제공할 수 있다.","3":"지식을 보유·활용함으로써 제품 및 서비스 가치를 향상 시키고 기업의 지속적인 성장에 기여할 수 있다.","4":"기업들은 동종 산업에 있는 조직들의 우수사례(best practice)를 그들 조직에 활용하여 많은 시간을 절약할 수 있다.","5":"지식관리시스템은 지식관리 플랫폼으로 고객지원센터 등 기업 내부 지원을 위해 활용되고 있으며, 챗봇, 디지털 어시스트 등 고객서비스와는 거리가 멀다."},"ans":5},{"year":"2023년 3회","num":84,"subj":"유통정보","q":"아래 글상자의 괄호 안에 들어갈 용어가 순서대로 바르게 나열된 것은?","opts":{"1":"㉠ 식별 AI(discriminative AI), ㉡ 생성 AI(generative AI)","2":"㉠ 강한 AI(strong AI), ㉡ 약한 AI(weak AI)","3":"㉠ 생성 AI(generative AI), ㉡ 식별 AI(discriminative AI)","4":"㉠ 약한 AI(weak AI), ㉡ 강한 AI(strong AI)","5":"㉠ 논리적 AI(logical AI), ㉡ 물리적 AI(physical AI) 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":3,"img":["boxes/2023_3_84.png"]},{"year":"2023년 3회","num":85,"subj":"유통정보","q":"바코드와 관련된 용어에 대한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"ITF-14 바코드는 GS1이 개발한 국제표준바코드로, 물류 단위에 부여된 식별코드를 기계가 읽을 수 있도록 막대 모양으로 표현한 것이다.","2":"GS1 DataMatrix는 우리나라 의약품 및 의료기기에 사용 되는 유일한 의약품표준바코드로, 다양한 추가정보를 입 력하면서도 작은 크기로 인쇄가 가능하다.","3":"GS1 응용식별자는 바코드에 입력되는 특수 식별자로 바 로 다음에 나오는 데이터의 종류, 예를 들어 GTIN, 일련 번호, 유통기한 등을 나타내는 지시자를 의미한다.","4":"내부관리자코드는 GS1 식별코드 중 하나로 특정 목적을 위해 내부(국가, 기업, 산업)용으로 사용되는 코드로 주 로 가변규격상품이나 쿠폰의 식별을 위해 사용된다.","5":"국제거래단품식별코드는 국제적으로 거래되는 단품을 식 별하기 위해 GS1이 만든 코드로 여기서 거래단품(trade item)이란 공급망 상에서 가격이 매겨지거나 주문 단위 가 되는 상품을 지칭한다."},"ans":2},{"year":"2023년 3회","num":86,"subj":"유통정보","q":"IoT(Internet of Things)에 대한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"오늘날 5G 및 기타 유형의 네트워크 플랫폼이 거의 모 든 곳에서 빠르고 안정적으로 대량의 데이터 세트를 처 리해 주어 IoT 연결성을 높여 주고 있다.","2":"연결상태는 24시간 always-on 방식이다.","3":"IoT는 보안 및 개인정보보호 위험, 기술 간 상호운영성, 데이터 과부하, 비용 및 복잡성 등의 이슈가 관리되어야 한다.","4":"서비스 방식은 빠르고 쉽게 찾는 Pull 방식이다.","5":"ICT 기반으로 주위의 모든 사물에 유무선 네트워크로 연 결하여 사람과 사물, 사물과 사물 간에 정보를 교류하고 상호 소통하는 지능적 환경으로 진화하고 있다."},"ans":4},{"year":"2023년 3회","num":89,"subj":"유통정보","q":"빅데이터는 다양한 유형으로 존재하는 모든 데이터가 대상 이 된다. 데이터 유형과 데이터 종류, 그에 따른 수집 기술 의 연결이 가장 옳지 않은 것은?","opts":{"1":"정형데이터 - RDB - ETL","2":"정형데이터 - RDB - Open API","3":"반정형데이터 - 비디오 - Open API","4":"비정형데이터 - 이미지 - Crawling","5":"비정형데이터 - 소셜데이터 – Crawling"},"ans":3},{"year":"2023년 3회","num":90,"subj":"유통정보","q":"정부는 수산물의 건강한 유통을 위해 수산물 이력제를 시행 하고 있다. 이에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"수산물을 수확하는 어장에서 시작하여 소비자의 식탁에 이르기까지 수산물의 유통 과정에 대한 정보를 관리하고 공개해서 소비자들이 안전하게 수산물을 선택할 수 있도 록 도와주는 제도이다.","2":"수산물 이력제의 등록표시는 표준화와 일관성을 위해 바 코드로 된 이력추적관리번호만 사용한다.","3":"식품안전사고를 대비하기위해 소비자가 구매한 수산물의 유통과정이 투명하게 공개되도록 관리하여 신속한 사고 발생 단계 파악 및 조속한 조치가 가능하다.","4":"생산자는 수산물에 대한 품질 및 위생정보를 효과적으로 관리할 수 있고 축적된 정보로 소비패턴 및 니즈파악이 가능하다.","5":"수산물 이력제의 활용은 위생 부분의 국제기준을 준수하 여 수산물 관리의 국제 경쟁력을 높여 주는 효과가 있 다. 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":2},{"year":"2024년 1회","num":1,"subj":"유통물류일반","q":"도매상에 대한 설명으로 가장 옳은 것은?","opts":{"1":"소매상을 대신해서 고객에게 제품 설치, 제품 교환 등의 기술지원서비스를 제공한다.","2":"소매상에 비해 좁은 상권을 관리하기에 거래 규모가 작 다.","3":"제조업체를 대신해서 재고를 보유해 주는 기능을 한다.","4":"제조업체를 위해 신용 및 금융기능을 제공한다.","5":"소매상을 위해 시장 확대 기능을 수행한다."},"ans":3},{"year":"2024년 1회","num":2,"subj":"유통물류일반","q":"유통경로(distribution channel)의 일반적 특성 설명으로 옳지 않은 것은?","opts":{"1":"유통경로는 생산물이 최초의 생산자로부터 최종 소비자에 게 이동되는 과정에 참여하는 개인 및 조직의 집합체를 의미한다.","2":"유통경로에는 제조업체, 도∙소매상 등과 같은 많은 조직이 참여하고 있으며 이들은 상호 의존 관계에 있다.","3":"유통경로는 제품이나 서비스를 고객이 사용 또는 소비하 기 위해 필요한 것이다.","4":"유통경로는 구매자의 수요를 충족시키기 위해 판매자가 보유한 제품과 서비스를 공급하는 과정에서 필요한 하나 의 연결고리로 이해할 수 있다.","5":"유통경로는 개별기업이 자사의 상품을 시장에 공급하기 위해 사용하는 경로라는 점에서 모든 기업이 이용할 수 있는 각각의 판매경로의 종합체라 할 수 있으며 사회적으 로 상품을 유통시키는 유통기관과 동일시된다."},"ans":5},{"year":"2024년 1회","num":3,"subj":"유통물류일반","q":"소매업태의 유형에 대한 설명으로 옳지 않은 것은?","opts":{"1":"복합쇼핑몰은 쇼핑을 하면서 여가도 즐길 수 있게 구성된 대규모 상업시설이다.","2":"팩토리 아울렛은 제조업체가 직영체제로 운영하는 상설 할인 매장이다.","3":"편의점은 고객의 접근성이 높은 지역에 위치하며 고마진, 저회전율을 특징으로 한다.","4":"창고형할인점은 고객서비스 수준은 최소로 제공하지만 넓 은 매장에서 저렴한 가격으로 상품을 제공한다.","5":"전문할인점은 특정상품계열에 대해 깊이 있는 상품구색을 갖추고 있다."},"ans":3},{"year":"2024년 1회","num":4,"subj":"유통물류일반","q":"경로성과를 측정하는 차원 중 투입 대비 산출의 비율로 측정 되며, 일정한 산출을 얻기 위해 얼마나 많은 비용이 투입되었 는가를 말해줄 수 있는 척도로 옳은 것은?","opts":{"1":"효과성 ② 형평성","2":"","3":"잠재수요자극 ④ 유동성","4":"","5":"효율성"},"ans":5},{"year":"2024년 1회","num":5,"subj":"유통물류일반","q":"기업이 소비자에게 제품을 직접 판매하는 직접유통이 발생하 게 된 이유로 가장 옳지 않은 것은?","opts":{"1":"도매상이 부당한 이윤을 얻고 있다는 생산자의 불만 때문 이다.","2":"유통 관련 시설이 발달하여 제조업자와 구매자가 쉽게 만 날 수 있기 때문이다.","3":"대형할인점처럼 자본력이 크고 보관시설도 충분히 갖춘 파워리테일러의 성장 때문이다.","4":"시간과 장소의 제약을 극복할 수 있는 온라인 쇼핑이 증 가했기 때문이다.","5":"유통기관의 비용은 제조업과 달리 고정비가 크고 변동비 최강 자격"},"ans":5},{"year":"2024년 1회","num":6,"subj":"유통물류일반","q":"우리나라 유통업체의 영향력과 역할 변화에 대한 설명으로 옳지 않은 것은?","opts":{"1":"유통업체 영향력 증가의 가장 중요한 요인 중 하나는 유 통업계의 대형화와 집중화 현상을 들 수 있다.","2":"소비자 행동이 대형매장을 찾아 원스톱 쇼핑(one-stop shopping)을 추구하는 것처럼 우리나라 유통업체의 영향 력과 역할 변화는 대형 유통업체에 유리한 방향으로 발전 해왔다.","3":"유통채널의 전통적 구조가 무너지면서 제조업체, 도매업 체, 소매업체들은 원래 그들이 가지고 있던 고유 :"보충가능성의 원칙(principle of compatibility)","5":"점포밀집의 원칙(principle of store congestion)"},"ans":3,"img":["boxes/2024_1_33.png"]},{"year":"2024년 1회","num":34,"subj":"상권분석","q":"신규점포를 개설할 때 시행하는 점포의 입지조건 평가와 관 련한 내용들로 가장 옳지 않은 것은?","opts":{"1":"중앙분리대가 있는 경우 건너편 소비자의 접근성이 떨어 지므로 불리하다.","2":"점포의 면적이 같다면 일반적으로 정사각형의 점포보다 도로의 접면의 길이가 깊이보다 긴 장방형 형태의 점포 가 유리하다.","3":"차량이 운행하는 도로가 직선이 아니고 굽은 곡선형 도 로에서는 커브 안쪽보다는 커브 바깥쪽 입지가 불리하 다.","4":"간선도로와 주거지를 연결하는 도로에서 출퇴근 동선이 다른 경우 퇴근 방향의 동선에 인접하는 입지가 유리하 다.","5":"부지가 접하는 도로의 폭, 보도와 차도의 구별, 일방통행 여부 등 도로의 특성과 구조를 검토해야 한다. 최강 자격"},"ans":3},{"year":"2024년 1회","num":35,"subj":"상권분석","q":"폐업 시 반드시 지켜야 할 절차로 옳지 않은 것은?","opts":{"1":"직원 4대보험 상실 신고","2":"폐업 후 부가가치세 신고","3":"지급명세서 제출","4":"폐업 후 소득세 신고","5":"점포임대차계약 종료증명서 제출"},"ans":5},{"year":"2024년 1회","num":36,"subj":"상권분석","q":"지역시장의 매력도를 평가하기 위해 활용하는 소매포화지수 (RSI: retail saturation index)와 시장성장잠재력지수(MEP: market expansion potential)에 대한 설명으로 옳은 것은?","opts":{"1":"시장성장잠재력지수에는 소매포화지수의 내용이 어느 정 도 내포되어 있다.","2":"소매포화지수에 시장성장잠재력이 어느 정도는 반영되어 있다고 볼 수 있다.","3":"소매포화지수와 시장성장잠재력지수가 모두 높은 경우에 는 좋은 신규출점후보지로 볼 수 없다.","4":"시장성장잠재력지수는 특정 지역시장 거주자들이 지역시 장 이외의 타 지역에서 구매하는 지출액을 추정하여 계 산한다.","5":"소매포화지수는 낮은데 시장성장잠재력지수가 높은 경우 가 가장 이상적인 소매입지이다."},"ans":4},{"year":"2024년 1회","num":37,"subj":"상권분석","q":"상권분석에 관한 주요 이론들에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"라일리(Reilly)의 소매인력이론은 두 대도시 사이에 위치 한 한 도시의 수요가 두 도시 각각에 유출되는 정도는 두 대도시의 상대적 규모에 비례하고 두 대도시까지의 상대적 거리의 제곱에 반비례한다고 설명한다.","2":"컨버스(Converse)는 라일리(Reilly)의 소매인력이론을 수 정하여 두 도시 간의 상권분기점을 설명한다.","3":"허프(Huff)의 소매인력이론은 도시 간의 상권경계를 확률 적으로 분석한다.","4":"루스(Luce)의 확률적 점포선택모델은 특정 점포에 대한 소비자의 접근가능성과 매력성 평가라는 소비자행동요소 를 포함하여 점포선택 행동을 설명한다.","5":"크리스탈러(Christaller)의 중심지이론은 소비자들이 유사 점포들 가운데 가장 가까운 점포를 선택한다고 가정한 다."},"ans":3},{"year":"2024년 1회","num":38,"subj":"상권분석","q":"소상공인시장진흥공단은 소상공인 및 소규모 창업자를 위하 여 빅데이터를 활용한 상권정보시스템을 광범위하게 운영하 고 있다. 이 상권정보시스템을 통하여 제공되는 정보로 옳 지 않은 것은?","opts":{"1":"지역 내 소득 및 소비 분석","2":"유동 인구 및 경쟁 상황","3":"지역 내 부동산 정보","4":"지역 내 소비자의 라이프스타일 및 브랜드 선호도 분석","5":"매출 분석"},
