<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유통관리사 2급 기출 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.wrap{max-width:780px;margin:0 auto;padding:12px}

/* ── 헤더 ── */
.header{background:linear-gradient(135deg,#1e3a5f,#2d6a9f);color:#fff;padding:18px 20px;border-radius:12px;margin-bottom:16px;text-align:center}
.header h1{font-size:1.4rem;font-weight:700;margin-bottom:4px}
.header p{font-size:.85rem;opacity:.85}

/* ── 홈 화면 ── */
#home .card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
#home .card h2{font-size:1rem;color:#2d6a9f;margin-bottom:12px;font-weight:700;border-left:3px solid #2d6a9f;padding-left:8px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.filter-btn{padding:10px 8px;border:2px solid #d1d9e0;border-radius:8px;background:#fff;cursor:pointer;font-size:.85rem;text-align:center;transition:.15s;font-family:inherit}
.filter-btn:hover,.filter-btn.active{border-color:#2d6a9f;background:#e8f0fb;color:#1e3a5f;font-weight:600}
.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1e3a5f,#2d6a9f);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;letter-spacing:.5px;transition:.2s}
.start-btn:hover{opacity:.9;transform:translateY(-1px)}
.count-select{width:100%;padding:10px;border:2px solid #d1d9e0;border-radius:8px;font-size:.9rem;font-family:inherit;background:#fff;cursor:pointer;color:#1a202c}
.count-select:focus{outline:none;border-color:#2d6a9f}
.stat-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.stat-chip{background:#e8f0fb;color:#1e3a5f;padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:600}

/* ── 퀴즈 화면 ── */
#quiz{display:none}
.progress-area{margin-bottom:12px}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:.85rem}
.score-badge{background:#1e3a5f;color:#fff;padding:3px 10px;border-radius:20px;font-weight:700;font-size:.8rem}
.progress-bar{height:6px;background:#d1d9e0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2d6a9f,#4a9fd8);border-radius:3px;transition:width .3s}

.q-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px}
.q-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.badge{padding:3px 9px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-subj{background:#dbeafe;color:#1e40af}
.badge-year{background:#dcfce7;color:#166534}
.badge-num{background:#fef3c7;color:#92400e}
.q-text{font-size:.95rem;line-height:1.65;color:#1a202c;font-weight:500}
.q-box{margin-top:12px}
.q-box-img{display:block;max-width:100%;height:auto;border:1px solid #d1d9e0;border-radius:8px;margin:8px 0;background:#fff}
.review-box-img{display:block;max-width:100%;height:auto;border:1px solid #e2e8f0;border-radius:6px;margin:6px 0}

.options{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.opt-btn{width:100%;text-align:left;padding:12px 14px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:.88rem;line-height:1.5;transition:.15s;font-family:inherit;color:#1a202c;display:flex;align-items:flex-start;gap:8px}
.opt-btn:hover:not(.answered){border-color:#2d6a9f;background:#f0f7ff}
.opt-btn .opt-num{font-weight:700;color:#2d6a9f;min-width:18px;flex-shrink:0;font-size:.95rem}
.opt-btn.correct{border-color:#16a34a;background:#f0fdf4;color:#14532d}
.opt-btn.correct .opt-num{color:#16a34a}
.opt-btn.wrong{border-color:#dc2626;background:#fff0f0;color:#7f1d1d}
.opt-btn.wrong .opt-num{color:#dc2626}
.opt-btn.show-correct{border-color:#16a34a;background:#f0fdf4;color:#14532d}
.opt-btn.show-correct .opt-num{color:#16a34a}
.opt-btn.answered{cursor:default}

.result-msg{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:.88rem;font-weight:600;display:none}
.result-msg.correct{background:#f0fdf4;color:#166534;border:1px solid #86efac}
.result-msg.wrong{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}

.nav-btns{display:flex;gap:8px;margin-top:4px}
.nav-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.btn-next{background:linear-gradient(135deg,#1e3a5f,#2d6a9f);color:#fff}
.btn-next:hover{opacity:.9}
.btn-finish{background:#16a34a;color:#fff}
.btn-finish:hover{opacity:.9}
.btn-home{background:#e2e8f0;color:#475569}
.btn-home:hover{background:#cbd5e1}

/* ── 결과 화면 ── */
#result{display:none}
.result-card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.08);text-align:center;margin-bottom:12px}
.score-circle{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#2d6a9f);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px}
.score-circle .big{font-size:2rem;font-weight:800;line-height:1}
.score-circle .small{font-size:.75rem;opacity:.85}
.result-stats{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.rstat{text-align:center}
.rstat .rv{font-size:1.4rem;font-weight:700}
.rstat .rl{font-size:.75rem;color:#64748b}
.rv.c{color:#16a34a}.rv.w{color:#dc2626}.rv.s{color:#2d6a9f}
.grade-msg{font-size:1rem;font-weight:600;margin-bottom:8px;color:#1e3a5f}
.result-btns{display:flex;gap:8px;flex-wrap:wrap}
.result-btns .nav-btn{flex:1;min-width:120px;padding:12px 8px}

.review-section{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.review-section h3{font-size:.95rem;font-weight:700;color:#1e3a5f;margin-bottom:12px;border-left:3px solid #dc2626;padding-left:8px}
.review-item{padding:12px;border-bottom:1px solid #f0f4f8;font-size:.85rem}
.review-item:last-child{border-bottom:none}
.review-q{font-weight:600;margin-bottom:6px;line-height:1.5}
.review-opts{display:flex;flex-direction:column;gap:4px}
.review-opt{padding:5px 8px;border-radius:6px;font-size:.82rem}
.review-opt.rc{background:#f0fdf4;color:#166534;font-weight:600}
.review-opt.rw{background:#fef2f2;color:#991b1b;font-weight:600}
.review-opt.rn{color:#64748b}

/* ── 반응형 ── */
@media(max-width:480px){
  .filter-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
  <h1>📚 유통관리사 2급 기출 퀴즈</h1>
  <p>2020~2025년 17회차 기출문제 · 총 1,105문제</p>
</div>

<!-- ════ HOME ════ -->
<div id="home">
  <div class="card">
    <h2>📋 과목 선택</h2>
    <div class="filter-grid" id="subj-filter">
      <button class="filter-btn active" data-val="">전체 과목</button>
      <button class="filter-btn" data-val="유통물류일반">1과목 · 유통물류일반</button>
      <button class="filter-btn" data-val="상권분석">2과목 · 상권분석</button>
      <button class="filter-btn" data-val="유통마케팅">3과목 · 유통마케팅</button>
      <button class="filter-btn" data-val="유통정보">4과목 · 유통정보</button>
    </div>
  </div>

  <div class="card">
    <h2>📅 연도/회차 선택</h2>
    <div class="filter-grid" id="year-filter">
      <button class="filter-btn active" data-val="">전체 연도</button>
      <button class="filter-btn" data-val="2020">2020년</button>
      <button class="filter-btn" data-val="2021">2021년</button>
      <button class="filter-btn" data-val="2022">2022년</button>
      <button class="filter-btn" data-val="2023">2023년</button>
      <button class="filter-btn" data-val="2024">2024년</button>
      <button class="filter-btn" data-val="2025">2025년</button>
    </div>
  </div>

  <div class="card">
    <h2>🎯 문제 수 선택</h2>
    <select class="count-select" id="count-sel">
      <option value="10">10문제 (빠른 모드)</option>
      <option value="20">20문제</option>
      <option value="30" selected>30문제 (권장)</option>
      <option value="50">50문제</option>
      <option value="90">90문제 (모의고사)</option>
      <option value="9999">전체 문제</option>
    </select>
    <div class="stat-bar" style="margin-top:10px" id="stat-bar">
      <span class="stat-chip" id="stat-total">전체 1,105문제</span>
    </div>
  </div>

  <div class="card" id="note-card">
    <h2>📌 내 오답 노트</h2>
    <p style="font-size:.85rem;color:#64748b;margin-bottom:10px" id="note-count">저장된 오답 0문제</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="nav-btn btn-finish" style="flex:1;min-width:150px" onclick="sendWrongsTelegram()">✈️ 텔레그램으로 오답 보내기</button>
      <button class="nav-btn btn-home" style="flex:1;min-width:110px" onclick="clearWrongs()">🗑️ 기록 비우기</button>
    </div>
    <p style="font-size:.72rem;color:#94a3b8;margin-top:8px">틀린 문제는 자동 저장됩니다. 전송 시 텔레그램에서 <b>Saved Messages(나와의 채팅)</b>를 선택하면 본인에게 받을 수 있어요. (봇·로그인 불필요)</p>
  </div>

  <button class="start-btn" onclick="startQuiz()">🚀 퀴즈 시작</button>
</div>

<!-- ════ QUIZ ════ -->
<div id="quiz">
  <div class="progress-area">
    <div class="progress-info">
      <span id="prog-text">1 / 30</span>
      <span class="score-badge" id="score-badge">맞춤: 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="q-card">
    <div class="q-meta" id="q-meta"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-box" id="q-box"></div>
  </div>

  <div class="options" id="options"></div>
  <div class="result-msg" id="result-msg"></div>

  <div class="nav-btns" style="margin-top:12px">
    <button class="nav-btn btn-home" onclick="goHome()">🏠 홈</button>
    <button class="nav-btn btn-next" id="btn-next" onclick="nextQ()" style="display:none">다음 문제 →</button>
    <button class="nav-btn btn-finish" id="btn-finish" onclick="showResult()" style="display:none">결과 보기 ✓</button>
  </div>
</div>

<!-- ════ RESULT ════ -->
<div id="result">
  <div class="result-card">
    <div class="score-circle">
      <span class="big" id="res-pct">0%</span>
      <span class="small">점수</span>
    </div>
    <div class="result-stats">
      <div class="rstat"><div class="rv s" id="res-total">0</div><div class="rl">총 문제</div></div>
      <div class="rstat"><div class="rv c" id="res-correct">0</div><div class="rl">정답</div></div>
      <div class="rstat"><div class="rv w" id="res-wrong">0</div><div class="rl">오답</div></div>
    </div>
    <div class="grade-msg" id="grade-msg"></div>
    <div class="result-btns">
      <button class="nav-btn btn-home" onclick="goHome()">🏠 홈으로</button>
      <button class="nav-btn btn-next" onclick="startQuiz()">🔄 다시 풀기</button>
      <button class="nav-btn btn-finish" onclick="toggleReview()">📝 오답 확인</button>
    </div>
  </div>
  <div class="review-section" id="review-section" style="display:none">
    <h3>✏️ 오답 노트</h3>
    <div id="review-list"></div>
  </div>
</div>

</div><!-- /wrap -->

<script>
const QUIZ_DATA = [{"year":"2020년 1회","num":1,"subj":"유통물류일반","q":"물류관리를 위한 정보기술에 대한 내용으로 옳지 않은 것은?","opts":{"1":"기업내 부서 간 정보전달을 통한 전사적정보관리를 위해 EDI기술이 보편적으로 사용된다.","2":"바코드기술의 상품에 대한 표현능력의 한계, 일괄인식의 어려움, 물류량 급증 시 대처능력의 저하 등 문제점을 해 결할 수 있는 기술이 RFID이다.","3":"DPS는 표시장치와 응답을 일체화시킨 시스템으로, 창고, 배송센터, 공장 등의 현장에서 작업지원시스템으로 활용 되고 있다.","4":"OCR은 광학문자인식으로 팩스를 통해 정보를 보낸 경우 이를 컴퓨터의 스캐닝이 문자를 인식하여 이것을 컴퓨터 에 입력하는 기술로 활용될 수 있다.","5":"사전에 가격표찰에 상품의 종류, 가격 등을 기호로 표시 해두고, 리더 등으로 그것을 읽어 판매정보를 집계하는데 사용되는 기술은 POS이다."},"ans":1},{"year":"2020년 1회","num":2,"subj":"유통물류일반","q":"물류아웃소싱 성공전략에 대한 설명으로 옳지 않은 것은?","opts":{"1":"물류아웃소싱이 성공하려면 반드시 최고경영자의 관심과 지원이 필요하다.","2":"지출되는 물류비용을 정확히 파악하여 아웃소싱 시비용절 감효과를 측정해야 한다.","3":"물류아웃소싱의 궁극적인 목표는 현재와 미래의 고객만족 에 있음을 잊지 말아야 한다.","4":"물류아웃소싱의 기본 목표는 물류비용절감을 통한 효율성 의 향상에만 있으므로 전체 물류시스템을 효율성 위주로 개편할 필요가 있다.","5":"물류아웃소싱의 목적은 기업 전체의 전략과 조화로워야한 다."},"ans":4},{"year":"2020년 1회","num":3,"subj":"유통물류일반","q":"정량주문법과 정기주문법의 비교 설명으로 옳지 않은 것은?","opts":{"1":"㉠ ② ㉡","2":"","3":"㉢ ④ ㉣","4":"","5":"㉤"},"ans":5,"img":["boxes/2020_1_3.png"]},{"year":"2020년 1회","num":6,"subj":"유통물류일반","q":"식스시그마의 실행단계를 순서대로 나타낸 것으로 가장 옳은 것은?","opts":{"1":"정의 - 분석 - 개선 - 통제 - 측정","2":"정의 - 측정 - 분석 - 개선 - 통제","3":"측정 - 분석 - 정의 - 통제 - 개선","4":"측정 - 정의 - 통제 - 분석 - 개선","5":"분석 - 정의 - 측정 - 통제 - 개선"},"ans":2},{"year":"2020년 1회","num":8,"subj":"유통물류일반","q":"아래 글상자에서 경영전략 수립을 위한 환경분석 중 전략과 제의 도출 순서가 옳게 나열된 것은?","opts":{"1":"㉤ - ㉥ - ㉠ - ㉡ - ㉢ - ㉣","2":"㉥ - ㉠ - ㉡ - ㉢ - ㉣ - ㉤","3":"㉠ - ㉡ - ㉢ - ㉣ - ㉤ - ㉥","4":"㉡ - ㉢ - ㉣ - ㉤ - ㉥ - ㉠","5":"㉢ - ㉣ - ㉤ - ㉥ - ㉠ - ㉡"},"ans":3,"img":["boxes/2020_1_8.png"]},{"year":"2020년 1회","num":9,"subj":"유통물류일반","q":"권력의 원천과 그 내용에 대한 설명 중 가장 옳지 않은 것 은?","opts":{"1":"강압적 권력은 권력행사자가 권력수용자를 처벌할 수 있 다고 생각한다.","2":"합법적 권력은 일반적으로 비공식적 지위에서 나온다고 볼 수 있다.","3":"보상적 권력은 급여인상, 승진처럼 조직이 제공하는 보상 에 의해 권력을 가지게 된다.","4":"전문적 권력은 특정 분야나 상황에 대한 높은 지식이 있 을 때 발생한다. 격증 기출문제 전자문제집 CBT : www.comcbt.com","5":""},"ans":2},{"year":"2020년 1회","num":10,"subj":"유통물류일반","q":"프랜차이즈 유통사업시스템에 대한 내용으로 옳지 않은 것 은?" t of Sale) System 도입에 따른 제조업체의 효과 에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"경쟁상품과의 판매경향 비교","2":"판매가격과 판매량의 상관관계","3":"기후변동에 따른 판매동향 분석","4":"신제품·판촉상품의 판매경향 파악","5":"상품구색의 적정화에 따른 매출증대"},"ans":5},{"year":"2020년 1회","num":80,"subj":"유통정보","q":"전자상거래 판매시스템에 대한 설명으로 가장 옳은 것은?","opts":{"1":"상향판매(up selling)는 고객들이 구매하고자 하는 제품 에 대해, 보다 저렴한 상품을 고객들에게 제시해 주는 마케팅 기법이다.","2":"역쇼루밍(reverse-showrooming)은 고객들이 특정 제품 을 구매하고자 할 때, 보다 다양한 마케팅 정보를 제공 해주는 마케팅 기법이다.","3":"교차판매(cross selling)는 고객들이 저렴한 제품을 구매 하는데 도움을 제공한다.","4":"옴니채널(omni-channel)은 온라인과 오프라인 채널을 통합함으로써 보다 개선된 쇼핑환경을 고객들에게 제공 해준다.","5":"프로슈머(prosumer)는 전문적인 쇼핑을 하는 소비자를 의미한다."},"ans":4},{"year":"2020년 1회","num":81,"subj":"유통정보","q":"바코드(Bar code)에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"바코드는 바와 스페이스로 구성된다.","2":"바코드는 상하좌우로 4곳에 코너 마크가 표시되어 있다.","3":"바코드는 판독기를 통해 바코드를 읽기 위해서는 바코드 의 시작과 종료를 알려주기 위해 일정 공간의 여백을 둔 다.","4":"바코드 시스템은 체계적인 재고관리를 지원해준다.","5":"바코드 시스템 구축은 RFID 시스템 구축과 비교해, 구축 비용이 많이 발생한다."},"ans":5},{"year":"2020년 1회","num":83,"subj":"유통정보","q":"지식의 창조는 암묵지를 어떻게 활성화, 형식지화 하여 활 용할 것인가의 문제라고 볼 수 있다. 암묵지와 형식지를 활 용한 지식창조 프로세스 순서대로 나타낸 것으로 가장 옳은 것은?","opts":{"1":"표출화 - 내면화 - 공동화 - 연결화","2":"표출화 - 연결화 - 공동화 - 내면화","3":"연결화 - 공동화 - 내면화 - 표출화","4":"공동화 - 표출화 - 연결화 - 내면화","5":"내면화 - 공동화 - 연결화 - 표출화"},"ans":4},{"year":"2020년 1회","num":84,"subj":"유통정보","q":"인스토어마킹(instore marking)과 소스마킹(source marking) 에 대한 설명으로 가장 옳은 것은?","opts":{"1":"인스토어마킹은 부패하기 쉬운 농산물에 적용할 수 있 다.","2":"인스토어마킹을 통해 바코드를 붙이는데 있어, 바코드에 는 국가식별코드, 제조업체코드, 상품품목코드, 체크 디 지트로 정형화되어 있어, 유통업체가 자유롭게 설정 할 수 없기에 최근 인스토어마킹은 거의 이용되지 않고 있 다.","3":"제조업체의 경우 인스토어마킹에 있어, 국제표준화 기구 에서 정의한 공통표준코드를 이용한다.","4":"소스마킹은 유통업체 내의 가공센터에서 마킹할 수 있 다.","5":"소스마킹은 상점 내에서 바코드 프린트를 이용해 바코드 라벨을 출력하기 때문에 추가적인 비용이 발생한다."},"ans":1},{"year":"2020년 1회","num":85,"subj":"유통정보","q":"지식 포착 기법에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"인터뷰 - 개인의 암묵적 지식을 형식적 지식으로 전환하 는데 사용하는 기법이다.","2":"현장관찰 - 관찰대상자가 문제를 해결하는 행동을 할 때 관찰, 해석, 기록하는 프로세스이다.","3":"스캠퍼 - 비판을 허용하지 않는다는 가정으로 둘 이상의 구성원들이 자유롭게 아이디어를 생산하는 비구조적 접 근방법이다.","4":"스토리 - 차이점에 대한 설명으로 옳지 않은 것은?","opts":{"1":"JIT는 부품과 원자재를 원활히 공급받는데 초점을 두고, JITⅡ는 부품, 원부자재, 설비공구, 일반자재 등 모든 분 야를 대상으로 한다.","2":"JIT는 개별적인 생산현장(plant floor)을 연결한 것이 라 면, JITⅡ는 공급체인(supply chain)상의 파트너의 연결과 그 프로세스를 변화시키는 시스템이다.","3":"JIT는 기업 간의 중복업무와 가치없는 활동을 감소∙제거하 는데 주력하는 반면, JITⅡ는 자사 공장 내의 가치없는 활 동을 감소∙제거하는데 주력한다.","4":"JIT는 푸시(push)형인 MRP와 대비되는 풀(pull)형의 생산 방식인데 비해, JITⅡ는 JIT와 MRP를 동시에 수용할 수 있는 기업 간의 운영체제를 의미한다.","5":"JIT가 물동량의 흐름을 주된 개선대상으로 삼는데 비해, JITⅡ는 기술, 영업, 개발을 동시화(synchronization)하여 물동량의 흐름을 강력히 통제한다."},"ans":3},{"year":"2020년 2회","num":4,"subj":"유통물류일반","q":"아래 글상자에서 설명하는 한정서비스 도매상의 종류로 옳은 것은?","opts":{"1":"현금거래도매상(cash-and-carry wholesalers)","2":"트럭도매상(truck jobbers)","3":"직송도매상(drop shipper)","4":"진열도매상(rack jobber)","5":"판매대리인(sales agent)"},"ans":3,"img":["boxes/2020_2_4.png"]},{"year":"2020년 2회","num":6,"subj":"유통물류일반","q":"아래 글상자의 내용은 기사를 발췌한 것이다. ( )안에 공통적 으로 들어갈 용어로 가장 옳은 것은?","opts":{"1":"리쇼링(re-shoring)","2":"오프쇼링(off-shoring)","3":"지연(postponement) 전략","4":"기민성(agility) 생산방식","5":"린(lean) 생산방식"},"ans":2,"img":["boxes/2020_2_6.png"]},{"year":"2020년 2회","num":7,"subj":"유통물류일반","q":"아래 글상자에서 설명하는 조직구성원에 대한 성과평가방법 으로 옳은 것은?","opts":{"1":"단순서열법(simply ranking)","2":"강제배분법(forced distribution method)","3":"쌍대비교법(paired-comparison method)","4":"행위기준고과법(BARS: behaviorally anchored rating scale)","5":"행동관찰척도법(BOS: behavioral observation scale)"},"ans":2,"img":["boxes/2020_2_7.png"]},{"year":"2020년 2회","num":9,"subj":"유통물류일반","q":"아래 글상자에서 설명하는 조직구조로 옳은 것은?","opts":{"1":"라인조직 ② 라인-스태프 조직","2":"","3":"프로젝트 조직 ④ 매트릭스 조직","4":"","5":"네트워크 조직"},"ans":1,"img":["boxes/2020_2_9.png"]},{"year":"2020년 2회","num":11,"subj":"유통물류일반","q":"기업 수준의 성장전략에 관한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"기존시장에서 경쟁자의 시장점유율을 빼앗아 오려는 것 은 다각화전략이다.","2":"신제품을 개발하여 기존시장에 진입하는 것은 제품개발 전략이다.","3":"기존제품으로 새로운 시장에 진입하여 시장을 확대하는 것은 시장개발전략이다.","4":"기존시장에 제품계열을 확장하여 진입하는 것은 제품개 발전략이다.","5":"기존제품으로 제품가격을 내려 기존시장에서 매출을높이 는 것은 시장침투전략이다."},"ans":1},{"year":"2020년 2회","num":13,"subj":"유통물류일반","q":"손익계산서 상의 비용 점포의 판매예측에도 활용할 수 있다.","4":"유사점포는 신규점포와 동일한 상권안에서 영업하고 있 는 점포 중에서만 선택해야 한다.","5":"CST(customer spotting technique)지도를 활용하여 신 규점포의 상권규모를 예측한다."},"ans":4},{"year":"2020년 3회","num":31,"subj":"상권분석","q":"소매입지를 선택할 때는 상권의 소매포화지수(RSI)와 시장 확장잠재력(MEP)을 함께 고려하기도 한다. 다음 중 가장 매 력적이지 않은 소매상권의 특성으로 옳은 것은?","opts":{"1":"높은 소매포화지수(RSI)와 높은 시장확장잠재력(MEP)","2":"낮은 소매포화지수(RSI)와 낮은 시장확장잠재력(MEP)","3":"높은 소매포화지수(RSI)와 낮은 시장확장잠재력(MEP)","4":"낮은 소매포화지수(RSI)와 높은 시장확장잠재력(MEP)","5":"중간 소매포화지수(RSI)와 중간 시장확장잠재력(MEP)"},"ans":2},{"year":"2020년 3회","num":33,"subj":"상권분석","q":"점포 신축을 위한 부지매입 또는 점포 확장을 위한 증축 등 의 상황에서 반영해야 할 공간적 규제와 관련된 내용들 중 틀린 것은?","opts":{"1":"건폐율은 대지면적에 대한 건축연면적의 비율을 말한다.","2":"대지에 건축물이 둘 이상 있는 경우에는 이들 건축면적 의 합계로 건폐율을 계산한다.","3":"대지내 건축물의 바닥면적을 모두 합친 면적을 건축연면 적이라 한다.","4":"용적률 산정에서 지하층·부속용도에 한하는 지상 주차용 면적은 제외된다.","5":"건폐율은 각 건축물의 대지에 여유 공지를 확보하여 도 시의 평면적인 과밀화를 억제하려는 것이다. 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":1},{"year":"2020년 3회","num":34,"subj":"상권분석","q":"정보기술의 발달과 각종 데이터의 이용가능성이 확대되면서 지도작성체계와 데이터베이스관리체계의 결합체인 지리정보 시스템(GIS)을 상권분석에 적극 활용할 수 있는 환경이 조 성되고 있다. 아래 글상자의 괄호안에 적합한 GIS 관련용어 로 가장 옳은 것은?","opts":{"1":"버퍼(buffer) ② 레이어(layer)","2":"","3":"중첩(overlay) ④ 기재단위(entry)","4":"","5":"위상(topology)"},"ans":5,"img":["boxes/2020_3_34.png"]},{"year":"2020년 3회","num":35,"subj":"상권분석","q":"아래 글상자의 내용 가운데 상권 내 경쟁관계를 분석할 때 포함해야 할 내용만을 모두 고른 것으로 옳은 것은?","opts":{"1":"㉠ ② ㉠, ㉡","2":"","3":"㉠, ㉡, ㉢ ④ ㉠, ㉡, ㉢, ㉣","4":"","5":"㉠, ㉡, ㉢, ㉣, ㉤"},"ans":5,"img":["boxes/2020_3_35.png"]},{"year":"2020년 3회","num":36,"subj":"상권분석","q":"넬슨(Nelson)은 소매점포가 최대 이익을 확보할 수 있는 입 지의 선정과 관련하여 8가지 소매입지 선정원칙을 제시했 다. 다음 중 그 연결이 옳지 않은 것은?","opts":{"1":"경합의 최소성 - 해당 점포와 경쟁관계에 있는 점포의 수가 가장 적은 장소를 선택하는 것이 유리함","2":"상권의 잠재력 - 판매하려는 상품이 차지할 시장점유율 을 예측하고 점포개설 비용을 파악하여 분석한 종합적 수익성이 높은 곳이 유리함","3":"양립성 - 업종이 같은 점포가 인접해서 상호보완관계를 통해 매출을 향상시킬 수 있음","4":"고객의 중간유인 가능성 - 고객이 상업지역에 들어가는 동선의 중간에 위치하여 고객을 중간에서 차단할 수 있 는 입지가 유리함","5":"집적 흡인력 - 집재성 점포의 경우 유사한 업종이 서로 한 곳에 입지하여 고객흡인력을 공유하는 것이 유리함"},"ans":3},{"year":"2020년 3회","num":38,"subj":"상권분석","q":"점포가 위치하게 될 건축용지를 나눌 때 한 단위가 되는 땅 의 형상이나 가로(街路)와의 관계를 설명한 내용 중 옳은 것 은?","opts":{"1":"각지 - 3개 이상의 가로각(街路角)에 해당하는 부분에 접하는 토지로 3면각지, 4면각지 등으로 설명함","2":"획지 - 여러 가로에 접해 일조와 통풍이 양호하며 출입 이 편리하고 광고홍보효과가 높음","3":"순획지 - 획지에서도 계통이 서로 다른 도로에 면한 것 이 아니라 같은 계통의 도로에 면한 각지","4":"삼면가로각지 - 획지의 삼면에 계통이 다른 가로에 접하 여 있는 토지","5":"각지 - 건축용으로 구획정리를 할 때 단위가 되는 땅으 로 인위적, 행정적 조건에 의해 다른 토지와 구별되는 토지"},"ans":4},{"year":"2020년 3회","num":39,"subj":"상권분석","q":"임차한 건물에 점포를 개점하거나 폐점할 때는 임차권의 확 보가 매우 중요하다. “상가건물 임대차보호법”(법률 제 17490호, 2020. 9. 29., 일부개정)과 관련된 내용으로 옳지 않은 것은?","opts":{"1":"“상법”(법률 제17362호, 2020. 6. 9., 일부개정)의 특별 법이다.","2":"기간을 정하지 않은 임대차는 그 기간을 1년으로 본다.","3":"임차인이 신규임차인으로부터 권리금을 회수할 수 있는 권한을 일부 인정한다.","4":"법 규정에 위반한 약정으로 임차인에게 불리한 것은 그 효력이 없는 강행규정이다.","5":"상가건물 외에 임대차 목적물의 주된 부분을 영업용으로 사용하는 경우에도 적용된다."},"ans":1},{"year":"2020년 3회","num":40,"subj":"상권분석","q":"소매점포의 입지분석에 활용하는 회귀분석에 관한 설명으로 가장 옳지 않은 것은?","opts":{"1":"소매점포의 성과에 영향을 미치는 다양한 요소들의 상대 적 중요도를 파악할 수 있다.","2":"분석에 포함되는 여러 독립변수들끼리는 서로 관련성이 높을수록 좋다.","3":"점포성과에 영향을 미치는 영향변수에는 상권내 경쟁수 준이 포함될 수 있다.","4":"점포성과에 영향을 미치는 영향변수에는 점포의 입지특 성이 포함될 수 있다.","5":"표본이 되는 점포의 수가 충분하지 않으면 회귀분석결과 의 신뢰성이 낮아질 수 있다."},"ans":2},{"year":"2020년 3회","num":41,"subj":"상권분석","q":"소매점포의 입지조건을 평가할 때 점포의 건물구조 등 물리 적 요인과 관련한 일반적 설명으로 옳지 않은 것은?","opts":{"1":"점포 출입구에 단차를 만들어 사람과 물품의 출입을 용 이하게 하는 것이 좋다.","2":"건축선후퇴는 타 점포에 비하여 눈에 띄기 어렵게 하므 로 가시성에 부정적 영향을 미친다.","3":"점포의 형태가 직사각형에 가까우면 집기나 진열선반 등 을 효율적으로 배치하기 쉽고 데드스페이스가 발생하지 않는다. 격증 기출문제 전자문제집 CBT : www.comcbt.com","4":"","5":""},"ans":1},{"year":"2020년 3회","num":42,"subj":"상권분석","q":"입지의 분석에 사용되는 주요 기준에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"신뢰성 - 입지분석의 결과를 믿을 수 있는 정도를 의미 한다.","2":"접근성 - 고객이 점포에 쉽게 접근할 수 있는 정도를 의 미한다.","3":"인지성 - 고객에게 점포의 위치를 쉽게 설명할 수 있는 정도를 의미한다.","4":"가시성 - 점포를 쉽게 발견할 수 있는 정도를 의미한다.","5":"호환성 - 해당점포가 다른 업종으로 쉽게 전환할 수 있 는 정도를 의미한다."},"ans":1},{"year":"2020년 3회","num":43,"subj":"상권분석","q":"일반적인 권리금에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"시설권리금은 실내 인테리어 및 장비 및 기물에 대한 권 리금액을 말한다.","2":"단골고객을 확보하여 상권의 형성 과정에 지대한 공헌을 한 대가는 영업권리금에 해당된다.","3":"시설권리금의 경우 시설에 대한 감가상각은 통상적으로 3년을 기준으로 한다.","4":"영업권리금의 경우 평균적인 순수익을 고려하여 계산하 기도 한다.","5":"영업권리금의 경우 지역 또는 자리권리금이라고도 한다."},"ans":5},{"year":"2020년 3회","num":45,"subj":"상권분석","q":"특정 지점의 소비자가 어떤 점포를 이용할 확률을 추정할 때 활용하는 수정Huff모델에 관한 설명 중 옳지 않은 것은?","opts":{"1":"점포면적과 점포까지의 이동거리 등 두 변수만으로 소비 자들의 점포 선택확률을 추정한다.","2":"실무적 편의를 위해 점포면적과 이동거리에 대한 민감도 를 따로 추정하지 않는다.","3":"점포면적과 이동거리에 대한 소비자의 민감도는 '1'과 '-2'로 고정하여 추정한다.","4":"점포면적과 이동거리 두 변수 이외의 다른 변수들을 반 영할 수 없다는 점에서 Huff모델과 다르다.","5":"Huff모델 보다 정확도가 낮을 수 있지만 일반화하여 쉽 게 적용하고 대략적 계산이 가능하게 한 것이다."},"ans":4},{"year":"2020년 3회","num":47,"subj":"상권분석","q":"고객관리에 대한 설명으로 옳지 않은 것은?","opts":{"1":"일반적으로 새로운 고객을 획득하는 것 보다 기존고객을 유지하는데 드는 비용이 더 높다.","2":"고객과 지속적으로 좋은 관계를 유지하는 것은 기업경영 의 중요 성공요소 중 하나이다.","3":"경쟁자보다 더 큰 가치를 제공하여야 고객 획득률을 향 상시킬 수 있다.","4":"효과적인 애호도 증진 프로그램 등을 통해 고객 유지율 을 향상시킬 수 있다.","5":"제품과 서비스에 대한 고객 만족도를 높임으로써 고객유 지율을 향상 시킬 수 있다."},"ans":1},{"year":"2020년 3회","num":48,"subj":"상권분석","q":"고객에 대한 원활한 판매서비스를 위해 판매원이 보유해야 할 필수적 정보들로 옳지 않은 것은?","opts":{"1":"기업에 대한 정보","2":"제품에 대한 정보","3":"판매조직 구조에 대한 정보","4":"고객에 대한 정보","5":"시장과 판매기회에 대한 정보"},"ans":3},{"year":"2020년 3회","num":49,"subj":"상권분석","q":"가격에 관한 설명으로 가장 옳지 않은 것은?","opts":{"1":"마케팅 관점에서 가격은 특정제품이나 서비스의 소유 또 는 사용을 위한 대가로 교환되는 돈이나 기타 보상을 의 미한다.","2":"대부분의 제품이나 서비스는 돈으로 교환되고, 지불가격 은 항상 정가나 견적가치와 일치한다.","3":"기업관점에서 가격은 총수익을 변화시키므로 가격결정은 경영자가 직면한 중요하고 어려운 결정 중의 하나이다.","4":"소비자관점에서 가격은 품질, 내구성 등의 지각된 혜택 과 비교되어 순가치를 평가하는 기준으로 사용된다.","5":"가격결정 방법에는 크게 수요지향적 접근방법, 원가지향 적 접근방법, 경쟁지향적 접근방법 등이 있다."},"ans":2},{"year":"2020년 3회","num":50,"subj":"상권분석","q":"가격탄력성은 가격 변화에 따른 수요 변화의 탄력적인 정도 를 나타낸다. 가격탄력성에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"고려할 수 있는 대안의 수가 많을수록 가격탄력성이 높 다.","2":"대체재의 이용이 쉬울수록 가격탄력성이 높다.","3":"더 많은 보완적인 재화, 서비스가 존재할수록 가격탄력 성이 높다.","4":"가격변화에 적응하는데 시간이 적게드는 재화가 가격탄 력성이 높다.","5":"필수재보다 사치품의 성격을 갖는 경우가 가격탄력성이 높다."},"ans":3},{"year":"2020년 3회","num":52,"subj":"유통마케팅","q":"소매업체의 상품구색에 관한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"다양성은 상품구색의 넓이를 의미한다.","2":"다양성은 취급하는 상품 카테고리의 숫자가 많을수록 커 진다.","3":"전문성은 상품구색의 깊이를 의미한다.","4":"전문성은 각 상품 카테고리에 포함된 품목의 숫자가 많 을수록 커진다.","5":"상품가용성은 다양성에 반비례하고 전문성에 비례한다."},"ans":5},{"year":"2020년 3회","num":54,"subj":"유통마케팅","q":"아래 글상자에서 설명하고 있는 소매상의 변천과정과 경쟁 을 설명하는 가설이나 이론으로 옳은 것은?","opts":{"1":"소매수명주기 이론 ② 소매수레바퀴 이론","2":"","3":"소매아코디언 이론 ④ 자연도태 이론","4":"","5":"변증법적 이론"},"ans":5,"img":["boxes/2020_3_54.png"]},{"year":"2020년 3회","num":55,"subj":"유통마케팅","q":"상시저가전략(EDLP: everyday low price)과 비교했을 때 고 저가격전략(high-low pricing)이 가진 장점으로 옳지 않은 것은?","opts":{"1":"고객의 지각가치를 높이는 효과가 있다.","2":"일부 품목을 저가 미끼 상품으로 활용할 수 있어 고객을 매장으로 유인할 수 있다.","3":"광고 및 운영비를 절감하는 효과가 있다.","4":"고객의 가격민감도 차이를 이용하여 차별가격을 통한 수 익증대를 추구할 수 있다.","5":"다양한 고객층을 표적으로 할 수 있다. 최강 자격"},"ans":3},{"year":"2020년 3회","num":56,"subj":"유통마케팅","q":"아래 글상자는 유통구조에 변화를 일으키고 있는 현상에 대 한 설명이다. ( )안에 들어갈 단어로 옳은 것은?","opts":{"1":"웰빙(well-being) 추구","2":"1인 가구","3":"소비 양극화","4":"소비자 파워(consumer power)","5":"소비 트레이딩 업(trading up)"},"ans":2,"img":["boxes/2020_3_56.png"]},{"year":"2020년 3회","num":57,"subj":"유통마케팅","q":"소매점의 판매촉진의 긍정적 효과로 옳지 않은 것은?","opts":{"1":"즉시적인 구매를 촉진한다.","2":"흥미와 구경거리를 제공한다.","3":"준거가격을 변화시킬 수 있다.","4":"소비자의 상표전환 또는 이용점포전환이 가능하다.","5":"고객의 데이터베이스를 구축할 수 있다."},"ans":3},{"year":"2020년 3회","num":58,"subj":"유통마케팅","q":"유통마케팅 조사방법 중 대규모 집단을 대상으로 체계화된 설문을 통해 자료를 수집하는 대표적인 서베이 기법으로 옳 은 것은?","opts":{"1":"HUT(home usage test)","2":"CLT(central location test)","3":"A&U조사(attitude and usage research)","4":"패널조사(panel survey)","5":"참여관찰조사(participant observation)"},"ans":3},{"year":"2020년 3회","num":59,"subj":"유통마케팅","q":"광고의 효과를 측정하는 중요한 기준의 하나가 도달(reach) 이다. 인터넷 광고의 도달을 측정하는 기준으로 가장 옳은 것은?","opts":{"1":"해당광고를 통해 이루어진 주문의 숫자","2":"사람들이 해당 웹사이트에 접속한 총 횟수","3":"해당 웹사이트에 접속한 서로 다른 사람들의 숫자","4":"해당 웹사이트에 접속할 가능성이 있는 사람들의 숫자","5":"해당 웹사이트에 접속한 사람들이 해당 광고를 본 평균 횟수"},"ans":3},{"year":"2020년 3회","num":60,"subj":"유통마케팅","q":"유통경로 상에서 판촉(sales promotion)활동이 가지는 특성 에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"판촉활동은 경쟁기업에 의해 쉽게 모방되기에 지속적 경 쟁우위를 가져오기는 어렵다.","2":"판촉활동은 단기적으로 소비자에게는 편익을 가져다 주 지만, 기업에게는 시장유지비용을 증가시켜 이익을 감소 시키기도 한다.","3":"판촉활동은 장기적으로 기업의 이미지를 개선하는데 큰 도움이 된다.","4":"경쟁기업의 촉진활동을 유발하여 시장에서 소모적 가격 경쟁이 발생할 수 있다.","5":"단기적으로는 매출액 증대가 가능하나 장기적으로는 매 출에 부정적인 영향을 미칠 수 있다."},"ans":3},{"year":"2020년 3회","num":62,"subj":"유통마케팅","q":"고객관계관리(CRM) 프로그램에서 사용하는 고객유지방법에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"다빈도 구매자 프로그램: 마일리지 카드 등을 활용하여 반복구매행위를 자극하고 소매업체에 대한 충성도를 제 고할 목적으로 사용하는 방법","2":"특별 고객서비스: 수익성과 충성도가 높은 고객을 개발 하고 유지하기 위해서 높은 품질의 고객 서비스를 제공 하는 방법","3":"개인화: 개별 고객 수준의 정보 확보와 분석을 통해 맞 춤형 편익을 제공하는 방법","4":"커뮤니티: 인터넷 상에서 고객들이 게시판을 통해 의사 소통하고 소매업체와 깊은 관계를 형성하는 커뮤니티를 운영하는 방법","5":"쿠폰제공 이벤트: 신제품을 소개하거나 기존제품에 대한 새로운 자극을 만들기 위해 시험적으로 사용할 수 있는 양만큼의 제품을 제공하는 방법"},"ans":5},{"year":"2020년 3회","num":63,"subj":"유통마케팅","q":"소비자가 점포 내에서 걸어다니는 길 또는 괘적을 동선(動 線)이라고 한다. 이러한 동선은 점포의 판매전략수립에 매우 중요한 고려요소이다. 동선에 대한 일반적 설명으로 옳지 않은 것은?","opts":{"1":"소매점포는 고객동선을 가능한 한 길게 유지하여 상품의 노출기회를 확보하고자 한다.","2":"고객의 동선은 점포의 레이아웃에 크게 영향받는다.","3":"동선은 직선적 동선과 곡선적 동선으로 구분되는데, 백 화점은 주로 직선적 동선을 추구하는 레이아웃을 하고 있다.","4":"동선은 상품탐색에 용이해야 하고 각 통로에 단절이 없 어야 한다.","5":"동선은 상품을 보기 쉽고 사기 쉽게 해야하고 시선과 행 동에 막힘이 없게 해야 한다."},"ans":3},{"year":"2020년 3회","num":64,"subj":"유통마케팅","q":"소매점에서 사용하는 일반적인 상품분류기준으로 옳지 않은 것은?","opts":{"1":"소비패턴을 중심으로 한 분류","2":"TPO(time, place, occasion)를 중심으로 한 분류","3":"한국표준상품분류표를 중심으로 한 분류","4":"대상고객을 중심으로 한 분류","5":"상품의 용도를 중심으로 한 분류"},"ans":3},{"year":"2020년 3회","num":66,"subj":"유통마케팅","q":"제조업체의 촉진 전략 중 푸시(push)전략에 대한 설명으로 옳지 않은 것은?","opts":{"1":"최종소비자 대신 중간상들을 대상으로 하여 판매촉진활 동을 하는 것이다.","2":"소비자를 대상으로 촉진할 만큼 충분한 자원이 없는 소 규모 제조업체들이 활용할 수 있는 촉진 전략이다.","3":"제조업체가 중간상들의 자발적인 주문을 받기 위해 수행 하는 촉진 전략을 말한다.","4":"가격할인, 수량할인, 협동광고, 점포판매원 훈련프로그램 등을 활용한다.","5":"판매원의 영향이 큰 전문품의 경우에 효과적이다."},"ans":3},{"year":"2020년 3회","num":67,"subj":"유통마케팅","q":"소매점이 사용하는 원가지향 가격설정정책(cost-oriented pricing)의 장점으로 가장 옳은 것은?","opts":{"1":"마케팅콘셉트에 가장 잘 부합한다.","2":"이익을 극대화하는 가격을 설정한다.","3":"가격책정이 단순하고 소요시간이 짧다.","4":"시장 상황을 확인할 수 있는 근거자료를 활용한다.","5":"재고유지단위(SKU)마다 별도의 가격설정정책을 마련한 다."},"ans":3},{"year":"2020년 3회","num":68,"subj":"유통마케팅","q":"공급업체와 소매업체 간에 나타날 수 있는 비윤리적인 상업 거래와 관련된 설명으로 옳지 않은 것은?","opts":{"1":"회색시장: 외국에서 생산된 자국 브랜드 제품을 브랜드 소유자 허가 없이 자국으로 수입하여 판매하는 것","2":"역청구: 판매가 부진한 상품에 대해 소매업체가 공급업 체에게 반대로 매입을 요구하는 것","3":"독점거래 협정: 소매업체로 하여금 다른 공급업체의 상 품을 취급하지 못하도록 제한하는 것","4":"구속적 계약: 소매업체에게 구매를 원하는 상품을 구입 하려면 사고 싶지 않은 상품을 구입하도록 협정을 맺는 것","5":"거래거절: 거래하고 싶은 상대방과 거래하고 싶지 않은 상대방을 구분하는 경우에 발생"},"ans":2},{"year":"2020년 3회","num":71,"subj":"유통마케팅","q":"물류활동의 기본 기능 중에서 유통효용의 하나인 형태 효용 을 창출해 내는 것으로 가장 옳은 것은?","opts":{"1":"보관기능 ② 운송기능","2":"","3":"정보기능 ④ 수배송기능","4":"","5":"유통가공기능"},"ans":5},{"year":"2020년 3회","num":72,"subj":"유통마케팅","q":"아래 글상자의 내용을 근거로 암묵지에 대한 설명만을 모두 고른 것으로 가장 옳은 것은?","opts":{"1":"㉠, ㉢, ㉣ ② ㉠, ㉢, ㉤","2":"","3":"㉡, ㉣, ㉤ ④ ㉠, ㉢, ㉣, ㉤","4":"","5":"㉡, ㉢, ㉣, ㉤"},"ans":3,"img":["boxes/2020_3_72.png"]},{"year":"2020년 3회","num":74,"subj":"유통마케팅","q":"아래 글상자는 고객가치에 대한 개념과 구성하는 요소들을 보여주는 공식이다. 각 요소들에 대한 설명으로 옳지 않은 것은?","opts":{"1":"고객가치의 총소유비용은 구매의사결정에 중요한 영향을 미친다.","2":"고객가치의 구성요소로서 품질은 제안된 기능, 성능, 기 술명세 등이다.","3":"고객가치의 구성요소로서 서비스는 고객에게 제공되는 유용성, 지원, 몰입 등이다.","4":"고객가치의 구성요소로서 비용은 가격 및 수명주기 비용 을 포함한 고객의 거래비용이다.","5":"고객가치의 구성요소로서 시간은 고객이 제품을 지각하 고 구매를 결정하는데 까지 걸리는 시간이다."},"ans":5,"img":["boxes/2020_3_74.png"]},{"year":"2020년 3회","num":76,"subj":"유통정보","q":"아래 글상자 괄호에 들어갈 용어로 가장 옳은 것은?","opts":{"1":"패킹 슬립(packing slip)","2":"인보이스(invoice)","3":"송금통지서(remittance advice)","4":"선하증권(bill of lading)","5":"ATP(available to promise)"},"ans":1,"img":["boxes/2020_3_76.png"]},{"year":"2020년 3회","num":77,"subj":"유통정보","q":"아래 글상자의 내용은 인먼(W. H. Inmon)이 정의한 데이터 웨어하우징에 대한 개념이다. 괄호에 들어갈 수 있는 단어 로 옳지 않은 것은?","opts":{"1":"통합적(integrated)","2":"비휘발성(nonvolatile)","3":"주제 중심적(subject-oriented)","4":"일괄 분석처리(batch-analytical processing)","5":"시간에 따라 변화적(time-variant)"},"ans":4,"img":["boxes/2020_3_77.png"]},{"year":"2020년 3회","num":78,"subj":"유통정보","q":"상품 판매를 위한 애널리틱스에 대한 설명으로 옳지 않은 것은?","opts":{"1":"프로파일링(profiling)은 고객들의 나이, 지역, 소득, 라이 프스타일(lifestyle)에 대한 분석을 통해 고객군을 선정하 고, 차별화하는 기능이다.","2":"세분화(segmentation)란 유사한 제품과 서비스 또는 유 사한 고객군으로 분류하는 기능이다.","3":"개별화(personalization)란 인구통계학적 특성, 구매기록 등과 같은 데이터에 기반해 상품 판매를 위한 개인화된 시장을 만들어 판매를 지원하는 기능이다.","4":"가격결정(pricing)은 고객들의 구매 수준, 생산 비용 등을 고려해 상품 판매를 위한 적절한 가격을 결정하는 기능 이다.","5":"연관성(association)은 현재 상품 판매 데이터를 이용해 미래에 판매될 상품에 대하여 모델링하는 기능을 의미한 다."},"ans":5},{"year":"2020년 3회","num":79,"subj":"유통정보","q":"B2B의 대표적인 수행수단으로 활용되는 정보기술인 EDI에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"EDI 사용은 문서거래시간의 단축, 자료의 재입력 방지, 업무처리의 오류감소 등의 직접적 효과가 있다.","2":"EDI 표준전자문서를 컴퓨터와 컴퓨터간에 교환하는 전자 적 정보전달 방식이다.","3":"웹 EDI는 사용자가 특정문서의 구조를 만들어 사용할 수 있기 때문에 타 업무 프로그램과의 연계가 용이하다.","4":"웹 EDI는 복잡한 EDI 인프라 구축 없이도 활용 가능하 다.","5":"기존 EDI에 비해 웹 EDI의 단점은 전용선 서비스 기반이 라 구축 비용이 높다는 것이다. 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":5},{"year":"2020년 3회","num":80,"subj":"유통정보","q":"아래 글상자의 괄호에 들어갈 용어로 옳은 것은?","opts":{"1":"전자지불게이트웨이","2":"Ecash","3":"가상화폐대행서비스","4":"EBPP(Electronic Bill Presentment and Payment)","5":"전자화폐발행서비스"},"ans":1,"img":["boxes/2020_3_80.png"]},{"year":"2020년 3회","num":81,"subj":"유통정보","q":"공급사슬관리 성과측정을 위한 SCOR(supply chain operation reference) 모델은 아래 글상자의 내용과 같이 5 가지의 기본관리 프로세스로 구성되어 지는데 이 중 ㉠에 해당되는 내용으로 가장 옳은 것은?","opts":{"1":"제품 반송과 관련된 프로세스","2":"재화 및 용역을 조달하는 프로세스","3":"완성된 재화나 용역을 제공하는 프로세스","4":"조달된 재화 및 용역을 완성 단계로 변환하는 프로세스","5":"비즈니스 목표 달성을 위한 수요와 공급의 균형을 맞추 는 프로세스"},"ans":4,"img":["boxes/2020_3_81.png"]},{"year":"2020년 3회","num":82,"subj":"유통정보","q":"지식관리시스템은 지식이 시간의 흐름에 따라 역동적으로 개선되기 때문에 6단계의 사이클을 따르는데 이에 맞는 주 기 단계가 가장 옳은 것은?","opts":{"1":"지식 생성-정제-포착-관리-저장-유포","2":"지식 생성-정제-포착-저장-관리-유포","3":"지식 생성-정제-저장-관리-포착-유포","4":"지식 생성-포착-정제-저장-관리-유포","5":"지식 생성-포착-정제-관리-저장-유포"},"ans":4},{"year":"2020년 3회","num":84,"subj":"유통정보","q":"아래 글상자의 내용에 부합되는 용어로 가장 옳은 것은?","opts":{"1":"RFID ② ECR","2":"","3":"VMI ④ JIT","4":"","5":"QR"},"ans":5,"img":["boxes/2020_3_84.png"]},{"year":"2020년 3회","num":85,"subj":"유통정보","q":"노나카(Nonaka)의 지식변환 유형에 대한 설명으로 옳지 않 은 것은?","opts":{"1":"사회화 - 최초의 유형으로 개인 혹은 집단이 주로 경험 을 공유함으 화","2":"중간 유통단계의 증가 및 배송거점의 분산화","3":"메이커의 영업거점인 지점, 영업소 기능의 축소","4":"수직적 협업체제 강화 및 아웃소싱의 진전","5":"편의품 소비재 메이커의 상권 광역화"},"ans":2},{"year":"2021년 1회","num":30,"subj":"상권분석","q":"상권에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"재화의 이동에서 사람을 매개로 하는 소매상권은 재화의 종류에 따라 그 사람의 비용이나 시간사용이 달라지므로 상권의 크기가 달라진다.","2":"고가품, 고급품일수록 소비자들은 구매활동에 보다 많은 시간과 비용을 부담하려 하므로 상권범위가 확대된다.","3":"도매상권은 사람을 매개로 하지 않기에 시간인자의 제약 이 커져서 상권의 범위가 제한된다.","4":"보존성이 강한 제품은 그렇지 않은 제품에 비해 상권이 넓어진다.","5":"상권범위를 결정하는 비용인자(因子)에는 생산비, 운송 비, 판매비용 등이 포함되며 그 비용이 상대적으로 저렴 할수록 상권은 확대된다. 최강 자격"},"ans":3},{"year":"2021년 1회","num":33,"subj":"상권분석","q":"크리스탈러(W. Christaller)의 중심지이론은 판매자와 소비자 를 “경제인”으로 가정한다. 그 의미로서 가장 옳은 것은?","opts":{"1":"판매자와 소비자 모두 비용대비 이익의 최대화를 추구한 다.","2":"소비자는 거리와 상관없이 원하는 제품을 구매하러 이동 한다.","3":"판매자는 경쟁을 회피하려고 최선을 다한다.","4":"소비자는 구매여행의 즐거움을 추구한다.","5":"소비자는 가능한 한 상위계층 중심지에서 상품을 구매한 다."},"ans":1},{"year":"2021년 1회","num":34,"subj":"상권분석","q":"상권측정을 위한 '상권실사'에 관한 설명으로서 가장 옳지 않은 것은?","opts":{"1":"항상 지도를 휴대하여 고객이 유입되는 지역을 정확하게 파악하는 것이 바람직하다.","2":"요일별, 시간대별로 내점고객의 숫자나 특성이 달라질 수 있으므로, 상권실사에 이를 반영해야 한다.","3":"내점하는 고객의 범위를 파악하는 것이 목적이므로 상권 범위가 인접 도시의 경계보다 넓은 대형 교외점포에서는 도보고객을 조사할 필요가 없는 경우도 있다.","4":"주로 자동차를 이용하는 고객이 증가하고 있는바, 도보 보다는 자동차주행을 하면서 조사를 실시하는 것이 더 바람직하다.","5":"기존 점포의 고객을 잘 관찰하여 교통수단별 내점비율을 파악하는 것이 중요하다."},"ans":4},{"year":"2021년 1회","num":35,"subj":"상권분석","q":"허프(Huff)의 수정모델을 적용해서 추정할 때, 아래 글상자 속의 소비자 K가 A지역에 쇼핑을 하러 갈 확률로서 가장 옳 은 것은?","opts":{"1":"0.30 ② 0.40","2":"","3":"0.50 ④ 0.60","4":"","5":"0.70 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":3,"img":["boxes/2021_1_35.png"]},{"year":"2021년 1회","num":36,"subj":"상권분석","q":"매력적인 점포입지를 결정하기 위해서는 구체적인 입지조건 을 평가하는 과정을 거친다. 점포의 입지조건에 대한 일반 적 평가로서 그 내용이 가장 옳은 것은?","opts":{"1":"점포면적이 커지면 매출도 증가하는 경향이 있어 점포규 모가 클수록 좋다","2":"건축선 후퇴(setback)는 직접적으로 가시성에 긍정적인 영향을 미친다","3":"점포 출입구 부근에 단차가 없으면 사람과 물품의 출입 이 용이하여 좋다","4":"점포 부지와 점포의 형태는 정사각형에 가까울수록 소비 자 흡인에 좋다","5":"평면도로 볼 때 점포의 정면너비에 비해 깊이가 더 클수 록 바람직하다"},"ans":3},{"year":"2021년 1회","num":37,"subj":"상권분석","q":"여러 층으로 구성된 백화점의 매장 내 입지에 관한 설명으 로 가장 옳은 것은?","opts":{"1":"고객이 출입하는 층에서 멀리 떨어진 층일수록 매장공간 의 가치가 올라간다.","2":"대부분의 고객들이 왼쪽으로 돌기 때문에, 각 층 입구의 왼편이 좋은 입지이다.","3":"점포 입구, 주 통로, 에스컬레이터, 승강기 등에서 가까 울수록 유리한 입지이다.","4":"층별 매장의 안쪽으로 고객을 유인하는데 최적인 매장배 치 유형은 자유형배치이다.","5":"백화점 매장 내 입지들의 공간적 가치는 층별 매장구성 변경의 영향은 받지 않는다."},"ans":3},{"year":"2021년 1회","num":38,"subj":"상권분석","q":"소매점은 상권의 매력성을 고려하여 입지를 선정해야 한다. 상권의 매력성을 측정하는 소매포화지수(IRS: Index of Retail Saturation)와 시장성장잠재력지수(MEP: Market Expansion Potential)에 대한 설명으로 가장 옳은 것은?","opts":{"1":"IRS는 현재시점의 상권 내 경쟁 강도를 측정한다.","2":"MEP는 미래시점의 상권 내 경쟁 강도를 측정한다.","3":"상권 내 경쟁이 심할수록 IRS도 커진다.","4":"MEP가 클수록 입지의 상권 매력성은 낮아진다.","5":"MEP보다는 IRS가 더 중요한 상권 매력성지수이다."},"ans":1},{"year":"2021년 1회","num":41,"subj":"상권분석","q":"생산구조가 다수의 소량분산생산구조이고 소비구조 역시 다 수에 의한 소량분산소비구조일 때의 입지 특성을 설명한 것 으로 옳은 것은?","opts":{"1":"수집 기능의 수행이 용이하고 분산 기능 수행도 용이한 곳에 입지한다.","2":"분산 기능의 수행보다는 수집 기능의 수행이 용이한 곳 에 입지한다.","3":"수집 기능과 중개(仲介) 기능이 용이한 곳에 입지한다.","4":"수집 기능의 수행보다는 분산 기능의 수행이 용이한 곳 에 입지한다.","5":"수집 기능과 분산 기능보다는 중개 기능의 수행이 용이 한 곳에 입지한다."},"ans":1},{"year":"2021년 1회","num":42,"subj":"상권분석","q":"대형소매점을 개설하기 위해 대지면적이 1,000m2인 5층 상 가건물을 매입하는 상황이다. 해당 건물의 지상 1층과 2층 의 면적은 각각 600m2이고 3~5층 면적은 각각 400m2이다. 단, 주차장이 지하1층에 500m2, 1층 내부에 200m2, 건물외 부(건물부속)에 300m2 설치되어 있다. 건물 5층에는 100m2 의 주민공동시설이 설치되어 있다. 이 건물의 용적률로 가 장 옳은 것은?","opts":{"1":"210% ② 220%","2":"","3":"240% ④ 260%","4":"","5":"300%"},"ans":1},{"year":"2021년 1회","num":43,"subj":"상권분석","q":"상권 유형별로 개념과 일반적 특징을 설명한 내용으로서 가 장 옳은 것은?","opts":{"1":"부도심 상권의 주요 소비자는 점포 인근의 거주자들이어 서, 생활밀착형 업종의 점포들이 입지하는 경향이 있다.","2":"역세권상권은 지하철이나 철도역을 중심으로 형성되는 지상과 지하의 입체적 상권으로서, 저밀도 개발이 이루 어지는 경우가 많다.","3":"부도심상권은 보통 간선도로의 결절점이나 역세권을 중 심으로 형성되는바, 도시 전체의 소비자를 유인하지는 못하는 경우가 많다.","4":"도심상권은 중심업무지구(CBD)를 포함하며, 상권의 범위 가 넓지만 소비자들의 체류시간은 상대적으로 짧다.","5":"아파트상권은 고정고객의 비중이 높아 안정적인 수요확 보가 가능하고, 외부고객을 유치하기 쉬워서 상권 확대 가능성이 높다."},"ans":3},{"year":"2021년 1회","num":45,"subj":"상권분석","q":"아래 글상자의 상권분석방법들 모두에 해당되거나 모두를 적용할 수 있는 상황으로서 가장 옳은 것은?","opts":{"1":"개별 소비자의 위치 분석","2":"소 고객획득/유지 및 추가판매의 믹스 최적화"},"ans":1},{"year":"2021년 1회","num":54,"subj":"유통마케팅","q":"유명 브랜드 상품 등을 중심으로 가격을 대폭 인하하여 고 객을 유인한 다음, 방문한 고객에 대한 판매를 증진시키고 자 하는 가격결정 방식은?","opts":{"1":"묶음가격결정(price bundling)","2":"이분가격결정(two-part pricing)","3":"로스리더가격결정(loss leader pricing)","4":"포획가격결정(captive pricing)","5":"단수가격결정(odd pricing)"},"ans":3},{"year":"2021년 1회","num":58,"subj":"유통마케팅","q":"아래의 글상자 안 ㉠과 ㉡에 해당하는 소매업 변천이론으로 옳은 것은?","opts":{"1":"㉠ 자연도태설(진화론), ㉡ 소매아코디언 이론","2":"㉠ 소매아코디언 이론, ㉡ 변증법적 과정","3":"㉠ 소매수명주기 이론, ㉡ 소매아코디언 이론","4":"㉠ 소매아코디언 이론, ㉡ 소매업수레바퀴 이론","5":"㉠ 소매업수레바퀴 이론, ㉡ 변증법적 과정"},"ans":3,"img":["boxes/2021_1_58.png"]},{"year":"2021년 1회","num":60,"subj":"유통마케팅","q":"아래 글상자에서 설명하는 소매점의 포지셔닝 전략으로 옳 은 것은?","opts":{"1":"More for More 전략","2":"More for the Same 전략","3":"Same for Less 전략","4":"Same for the Same 전략","5":"More for Less 전략"},"ans":1,"img":["boxes/2021_1_60.png"]},{"year":"2021년 1회","num":62,"subj":"유통마케팅","q":"유통업체에 대한 판촉 유형 중 가격 할인에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"정해진 기간 동안에 일시적으로 유통업체에게 제품가격 을 할인해 주는 것이다.","2":"일정 기간 동안 유통업체가 구입한 모든 제품의 누적주 문량에 따라 할인해 준다.","3":"유통업체로 하여금 할인의 일부 또는 전부를 소비자가격 에 반영하도록 유도한다.","4":"정기적으로 일정 기간 동안 실시하며, 비정기적으로는 실시하지 않는 것이 보통이다.","5":"수요예측력이 있으며 재고 처리능력을 보유한 유통업체 에게 유리한 판촉유형이다."},"ans":2},{"year":"2021년 1회","num":63,"subj":"유통마케팅","q":"아래 글상자에서 설명하는 점포 레이아웃 형태로 옳은 것 은?","opts":{"1":"격자형 레이아웃 ② 자유형 레이아웃","2":"","3":"루프형 레이아웃 ④ 복합형 레이아웃","4":"","5":"부띠끄형 레이아웃"},"ans":1,"img":["boxes/2021_1_63.png"]},{"year":"2021년 1회","num":64,"subj":"유통마케팅","q":"고객생애가치(CLV, Customer lifetime value)에 대한 설명으 로 옳은 것은?","opts":{"1":"고객생애가치는 인터넷쇼핑몰 보다는 백화점을 이용하는 고객들을 평가하는데 용이하다.","2":"고객생애가치는 고객과 기업간의 정성적 관계 가치이므 로 수치화하여 측정하기 어렵다.","3":"고객생애가치는 고객점유율(customer share)에 기반하여 정확히 추정할 수 있다.","4":"고객생애가치는 고객이 일생동안 구매를 통해 기업에게 기여하는 수익을 현재가치로 환산한 금액을 말한다.","5":"고객생애가치는 고객의 이탈률과 비례관계에 있다."},"ans":4},{"year":"2021년 1회","num":66,"subj":"유통마케팅","q":"유형별 고객에 대한 설명으로 옳지 않은 것은?","opts":{"1":"고객이란 기업의 제품이나 서비스를 구매하거나 이용하 는 소비자를 말한다.","2":"이탈고객은 기업의 기준에 의해서 더 이상 자사의 제품 이나 서비스를 이용하지 않는 것으로 정의된 고객을 말 한다.","3":"내부고객은 조직 내부의 가치창조에 참여하는 고객으로 서 기업의 직원들을 의미한다.","4":"비활동 고객은 자사의 제품이나 서비스를 구매한 경험도 향후 자사의 고객이 될 수 있는 가능성도 없는 고객을 말한다.","5":"가망고객은 현재 고객은 아니지만 광고, 홍보를 통해 유 입될 가능성이 높은 고객을 말한다."},"ans":4},{"year":"2021년 1회","num":67,"subj":"유통마케팅","q":"점포 설계의 목적과 관련된 설명으로 가장 옳지 않은 것은?","opts":{"1":"점포는 다양하고 복잡한 모든 소비자들의 욕구와 니즈를 충족할 수 있도록 설계해야 한다.","2":"점포는 상황에 따라 상품구색 변경을 수용하고 각 매장 에 할당된 공간과 점포 배치의 수정이 용이하도록 설계 하는 것이 좋다.","3":"점포는 설계를 시행하고 외관을 유지하는데 드는 비용을 적정 수준으로 통제할 수 있도록 설계해야 한다.","4":"점포는 고객 구매 행동을 자극하는 방식으로 설계해야 한다.","5":"점포는 사전에 정의된 포지셔닝을 달성할 수 있도록 설 계해야 한다."},"ans":1},{"year":"2021년 1회","num":68,"subj":"유통마케팅","q":"유통업체의 업태 간 경쟁(intertype competition)을 유발시키 는 요인으로 가장 옳지 않은 것은?","opts":{"1":"소비자 수요의 질적 다양화","2":"생활 필수품의 범위 확대","3":"정보기술의 발달","4":"품목별 전문유통기업의 등장","5":"혼합상품화(scrambled merchandising) 현상의 증가"},"ans":4},{"year":"2021년 1회","num":71,"subj":"유통마케팅","q":"CRM 시스템에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"신규고객 창출, 기존고객 유지, 기존고객 강화를 위해 이 용된다.","2":"기업에서는 장기적인 고객관계 형성보다는 단기적인 고 객관계 형성을 위해 도입하고 있다.","3":"다양한 측면의 정보 분석을 통해 고객에 대한 이해도를 높여준다.","4":"유통업체의 경쟁우위 창출에 도움을 제공한다.","5":"고객유지율과 경영성과 모두를 향상시키기 위해 정보와 지식을 활용한다."},"ans":2},{"year":"2021년 1회","num":73,"subj":"유통마케팅","q":"충성도 프로그램에 대한 설명으로 옳지 않은 것은?","opts":{"1":"유통업체에서 운영하는 충성도 프로그램은 고객들의 구 매 충성도를 높이기 위해 운영되는 단발성 프로그램이 다.","2":"유통업체 고객의 충성도는 다양한데, 대표적인 충성도에 는 행동적 충성도와 태도적 충성도가 있다.","3":"유통업체 고객의 행동적 충성도의 대표적인 사례로는 고 객의 반복구매가 있다.","4":"유통업체 고객이 특정한 상품에 대해 애착을 형성하거나 우호적 감정을 갖는 것을 태도적 충성도라고 한다.","5":"유통업체에서 가지고 있는 충성도 강화 프로그램은 사전 에 정해진 지침에 의해 운영된다."},"ans":1},{"year":"2021년 1회","num":74,"subj":"유통마케팅","q":"유통업체들은 정보시스템 운영을 효율화하기 위해 ERP시스 템을 도입하고 있는데 ERP 시스템의 발전순서를 나열한 것 으로 옳은 것은?","opts":{"1":"㉢ - ㉣ - ㉠ - ㉡ ② ㉢ - ㉠ - ㉣ - ㉡","2":"","3":"㉢ - ㉡ - ㉠ - ㉣ ④ ㉠ - ㉣ - ㉢ - ㉡","4":"","5":"㉠ - ㉡ - ㉢ - ㉣"},"ans":1,"img":["boxes/2021_1_74.png"]},{"year":"2021년 1회","num":77,"subj":"유통정보","q":"전자상거래를 이용하는 고객들이 기업에서 발송하는 광고성 메일에 대해 수신거부 의사를 전달하면, 고객들은 광고성 메일을 받지 않을 수 있는데 이를 적절하게 설명하는 용어 로 옳은 것은?","opts":{"1":"옵트아웃(opt out) ② 옵트인(opt in)","2":"","3":"옵트오버(opt over) ④ 옵트오프(opt off)","4":"","5":"옵트온(opt on)"},"ans":1},{"year":"2021년 1회","num":78,"subj":"유통정보","q":"유통업체와 제조업체들이 환경에 해로운 경영 활동을 하면 서, 마치 친환경 경영 활동을 하고 있는 것처럼 광고하는 경우를 설명하는 용어로 옳은 것은?","opts":{"1":"카본 트러스트(Carbon Trust)","2":"자원 발자국(Resource Footprint)","3":"허브 앤 스포크(Hub and Spoke)","4":"그린워시(Greenwash)","5":"친환경 공급사슬(Greenness Supply Chain)"},"ans":4},{"year":"2021년 1회","num":79,"subj":"유통정보","q":"아래 글상자의 ( )안에 공통적으로 들어갈 공급사슬관리 개 념으로 가장 옳은 것은?","opts":{"1":"S&OP(Sales and Operations Planning)","2":"LTM(Lead Time Management)","3":"VMI(Vendor Managed Inventory)","4":"DF(Demand Fulfillment)","5":"SF(Supply Fulfillment) 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":1,"img":["boxes/2021_1_79.png"]},{"year":"2021년 1회","num":80,"subj":"유통정보","q":"전자자료교환(EDI)에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"전용선 기반이나 텍스트 기반의 EDI 서비스는 개방적인 터넷 환경으로 인해 보안상 취약성이 높아 웹기반 서비 스 불가하며, 2022년 서비스가 예정이다.","2":"EDI 서비스는 기업 간 전자상거래 서식 또는 공공 서식 을 서로 합의된 표준에 따라 표준화된 메시지 형태로 변 환해 거래 당사자끼리 통신망을 통해 교환하는 방식이 다.","3":"EDI 서비스는 수작업이나 서류 및 자료의 재입력을 하지 않게 되어 실수 및 오류를 방지하며 더 많은 비즈니스 문서를 보다 정확하고 보다 빨리 공유하고 처리할 수 있 다.","4":"EDI 시스템의 기본 기능에는 기업의 수주, 발주, 수송, 결제 등을 처리하는 기능이 있으며, 상업 거래 자료를 변환, 통신, 표준 관리 그리고 거래처 관리 등으로 활용 할 수 있다.","5":"EDI 서비스는 1986년 국제연합유럽경제위원회(UN/ECE) 주관으로 프로토콜 표준화 합의가 이루어졌고, 1988년 프로토콜의 명칭을 EDIFACT로 하였으며, 구문규칙을 국 제표준(ISO 9735)으로 채택하였다."},"ans":1},{"year":"2021년 1회","num":82,"subj":"유통정보","q":"e-SCM을 위해 도입해야 할 주요 정보기술로 가장 옳지 않 은 것은?","opts":{"1":"의사결정을 지원해주기 위한 자료 탐색(data mining) 기 술","2":"내부 기능부서 간의 업무통합을 위한 전사적 자원관리 (ERP) 시스템","3":"기업내부의 한정된 일반적인 업무활동에서 발생하는 거 래자료를 처리하기 위한 거래처리시스템","4":"수집된 고객 및 거래데이터를 저장하기 위한 데이터웨어 하우스(data warehouse)","5":"고객, 공급자 등의 거래 상대방과의 거래 처리 및 의사 소통을 위한 인터넷 기반의 전자상거래(e-Commerce)시 스템"},"ans":3},{"year":"2021년 1회","num":83,"subj":"유통정보","q":"바코드 기술과 RFID 기술에 대한 설명으로 옳지 않은 것은?","opts":{"1":"유통업체에서는 바코드 기술을 판매관리에 활용하고 있 다.","2":"바코드 기술은 핀테크 기술에 결합되어 다양한 모바일 앱에서 활용되고 있다.","3":"바코드 기술을 대체할 기술로는 RFID(Radio Frequency IDentification) 기술이 있다.","4":"RFID 기술은 바코드에 비해 구축비용이 저렴하지만, 보 안 취약성 때문에 활성화되고 있지 않다.","5":"RFID 기술은 단품관리에 활용될 수 있다."},"ans":4},{"year":"2021년 1회","num":85,"subj":"유통정보","q":"QR(Quick Response) 도입으로 얻는 효과로 가장 옳지 않 은 것은?","opts":{"1":"기업의 원자재 조달에서부터 상품이 소매점에 진열되기 까지 총 리드타임 단축","2":"낮은 수준의 재고와 대응시간의 감소가 서로 상충되어 프로세싱 시간 증가","3":"정확한 생산계획에 의한 생산관리로 낮은 수준의 재고 유지 가능","4":"전표 등을 EDI로 처리하여 정확성 및 신속성 향상","5":"기업 간 정보공유를 바탕으로 소비동향을 분석, 고객요 구를 신속하게 반영하는 것이 가능"},"ans":2},{"year":"2021년 1회","num":88,"subj":"유통정보","q":"지식관리에 대한 설명으로 옳지 않은 것은?","opts":{"1":"명시적 지식은 쉽게 체계화할 수 있는 특성이 있다.","2":"암묵적 지식은 조직에서 명시적 지식보다 강력한 힘을 발휘하기도 한다.","3":"명시적 지식은 경쟁기업이 쉽게 모방하기 어려운 지식으 로 경쟁우위 창출에 기반이 된다.","4":"암묵적 지식은 사람의 머릿속에 있는 지식으로 지적자본 (intellectual capital)이라고도 한다.","5":"기업에서는 구성원의 지식공유를 활성화하기 위하여 인 센티브 (incentive)를 도입한다."},"ans":3},{"year":"2021년 2회","num":1,"subj":"유통물류일반","q":"운송수단을 결정하기 전에 검토해야 할 사항에 대한 설명으 로 가장 거리가 먼 것은?","opts":{"1":"운송할 화물이 일반화물인지 냉동화물인지 등의 화물의 종류","2":"운송할 화물의 중량과 용적","3":"화물의 출발지, 도착지와 운송거리","4":"운송할 화물의 가격","5":"운송할 화물이 보관된 물류센터의 면적"},"ans":5},{"year":"2021년 2회","num":2,"subj":"유통물류일반","q":"SCM 관리기법 중 JIT(Just In Time)에 대한 내용으로 옳은 것은?","opts":{"1":"JIT는 생산, 운송시스템의 전반에서 재고부족으로 인한 위 험 요소를 제거하기 위해 안전재고 수준을 최대화한다.","2":"JIT에서 완성품은 생산과정품(Work In Process)에 포함시 키지만 부품과 재료는 포함시키지 않는다.","3":"구매측면에서는 공급자의 수를 최대로 선정하여 호혜적인 작업관계를 구축한다.","4":"수송단위가 소형화되고 수송빈도가 증가하므로 수송과정 을 효과적으로 점검, 통제하는 능력이 중요하다.","5":"창고설계 시 최대재고의 저장에 초점을 맞추는 것이지 재 고이동에 초점을 맞추는 것은 아니다."},"ans":4},{"year":"2021년 2회","num":3,"subj":"유통물류일반","q":"운송에 관련된 내용으로 옳지 않은 것은?","opts":{"1":"해상운송은 최종목적지까지의 운송에는 한계가 있기 때문 에 피시백(fishy back) 복합운송서비스를 제공한다.","2":"트럭운송은 혼적화물운송(LTL: Less than Truckload) 상 태의 화물도 긴급 수송이 가능하고 단거리 운송에도 경제 적이다.","3":"다른 수송형태에 비해 철도운송은 상대적으로 도착시간을 보증할 수 있는 정도가 높다.","4":"항공운송은 고객이 원하는 지점까지의 운송을 위해 버디 백(birdy back) 복합운송 서비스를 활용할 수 있다.","5":"COFC는 철도의 유개화차 위에 컨테이너를 싣고 수송하 는 방식이다."},"ans":5},{"year":"2021년 2회","num":4,"subj":"유통물류일반","q":"ROI에 대한 내용으로 옳지 않은 것은?","opts":{"1":"투자에 대한 이익률이다.","2":"순자본(소유주의 자본, 주주의 자본 혹은 수권자본)에 대 한 순이익의 비율이다.","3":"ROI가 높으면 제품재고에 대한 투자가 총이익을 잘 달성 했다는 의미이다.","4":"ROI가 낮으면 자산의 과잉투자 등으로 인해 사업이 성공 적이지 못하다는 의미이다.","5":"ROI가 높으면 효과적인 레버리지 기회를 활용했다는 의미 로도 해석된다."},"ans":3},{"year":"2021년 2회","num":6,"subj":"유통물류일반","q":"도·소매 물류를 7R을 활용하여 효과적으로 관리하는 방법에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"적절한 품질의 제품을 적시에 제공해야 한다.","2":"최고의 제품을 저렴한 가격으로 제공해야 한다.","3":"좋은 인상으로 원하는 장소에 제공해야 한다.","4":"적정한 제품을 적절한 양으로 제공해야 한다.","5":"적시에 원하는 장소에 제공해야 한다."},"ans":2},{"year":"2021년 2회","num":7,"subj":"유통물류일반","q":"기업이 외부조달을 하거나 외주를 주는 이유로 옳지 않은 것 은?","opts":{"1":"비용 상의 이점","2":"불충분한 생산능력 보유","3":"리드타임, 수송, 창고비 등에 대한 높은 통제가능성","4":"전문성 결여로 인한 생산 불가능","5":"구매부품의 품질측면의 우수성"},"ans":3},{"year":"2021년 2회","num":8,"subj":"유통물류일반","q":"인적자원관리에 관련된 능력주의와 연공주의를 비교한 설명 으로 옳지 않은 것은?","opts":{"1":"㉠ ② ㉡","2":"","3":"㉢ ④ ㉣","4":"","5":"㉤"},"ans":5,"img":["boxes/2021_2_8.png"]},{"year":"2021년 2회","num":9,"subj":"유통물류일반","q":"포트폴리오 투자이론에 관련된 설명으로 옳지 않은 것은?","opts":{"1":"포트폴리오란 투자자들에 의해 보유되는 주식, 채권 등과 같은 자산들의 그룹을 말한다.","2":"포트폴리오 수익률은 개별자산의 수익률에 투자비율을 곱 하여 모두 합한 값이다.","3":"포트폴리오 가중치는 포트폴리오의 총가치 중 특정 자산 에 투자된 비율을 말한다.","4":"체계적 위험은 주식을 발행한 각 기업의 경영능력, 발전 가능성, 수익성 등의 변동가능성으로 개별주식에만 발생 하는 위험이다.","5":"비체계적 위험은 분산투자로 어느 정도 제거가 가능한 위 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":4},{"year":"2021년 2회","num":10,"subj":"유통물류일반","q":"조직 내에서 이루어지는 공식, 비공식적인 의사소통의 유형 과 그 설명이 가장 옳지 않은 것은?","opts":{"1":"개선보고서와 같은 상향식 의사소통은 하위계층에서 상 위계층으로 이루어진다.","2":"태스크포스(task force)와 같은 하향식 의사소통은 전통 적 방식의 소통이다.","3":"다른 부서의 동일 직급 동료 간의 정보교환은 수평식 의 사소통이다.","4":"인사부서의 부장과 품질보증팀의 대리 간의 의사소통은 대각선 방식의 의사소통이다.","5":"비공식 의사소통 채널의 예로 그레이프바인(grape vine) 이 있다."},"ans":2},{"year":"2021년 2회","num":11,"subj":"유통물류일반","q":"아래의 글상자에서 설명하고 있는 동기부여전략으로 옳은 것은?","opts":{"1":"목표관리이론 ② 직무충실화이론","2":"","3":"직무특성이론 ④ 유연근로제","4":"","5":"기대이론"},"ans":1,"img":["boxes/2021_2_11.png"]},{"year":"2021년 2회","num":13,"subj":"유통물류일반","q":"유통경영 전략계획 수립에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"기업수준의 전략계획수립은 조직의 목표 및 역량과 변화 하는 마케팅 기회 간의 전략적 적합성을 개발·유지하는 과정을 말한다.","2":"기업수준의 전략계획수립은 기업 내에서 이루어지는 다 른 모든 계획수립의 근간이 된다.","3":"기업수준의 전략계획수립과정은 기업전반의 목적과 사명 을 정의하는 것으로 시작된다.","4":"기업수준의 전략계획이 실현될 수 있도록 마케팅 및 기 타 부서들은 구체적 실행계획을 수립한다.","5":"기업수준의 전략계획은 기능별 경영전략과 사업수준별 경영전략을 수립한 후 전략적 일관성에 맞게 수립해야 한다."},"ans":5},{"year":"2021년 2회","num":15,"subj":"유통물류일반","q":"기업의 과업환경에 속하지 않는 것은?","opts":{"1":"경쟁기업 ② 고객","2":"","3":"규제기관 ④ 협력업자","4":"","5":"인구통계학적 특성"},"ans":5},{"year":"2021년 2회","num":16,"subj":"유통물류일반","q":"기업의 이해관계자별 주요 관심사에 관한 설명으로 옳지 않 은 것은?","opts":{"1":"㉠ ② ㉡","2":"","3":"㉢ ④ ㉣","4":"","5":"㉤"},"ans":3,"img":["boxes/2021_2_16.png"]},{"year":"2021년 2회","num":18,"subj":"유통물류일반","q":"‘재고를 어느 구성원이 가지는가에 따라 유통경로가 만들어 진다’라고 하는 유통경로 결정 이론과 관련한 내용으로 옳 지 않은 것은?","opts":{"1":"중간상이 재고의 보유를 연기하여 제조업자가 재고를 가 진다.","2":"유통경로의 가장 최후시점까지 제품을 완성품으로 만들 거나 소유하는 것을 미룬다.","3":"자전거 제조업자가 완성품 조립을 미루다가 주문이 들어 오면 조립하여 중간상에게 유통시킨다.","4":"특수산업용 기계 제조업자는 주문을 받지 않는 한 생산 을 미룬다.","5":"다른 유통경로 구성원이 비용우위를 갖는 기능은 위양하 고 자신이 더 비용우위를 갖는 일은 직접 수행한다."},"ans":5},{"year":"2021년 2회","num":20,"subj":"유통물류일반","q":"소비자기본법(법률 제17290호, 2020.5.19., 타법개정) 상, 소비자중심경영의 인증 내용으로 옳지 않은 것은?","opts":{"1":"소비자중심경영인증의 유효기간은 그 인증을 받은 날부 터 1년으로 한다.","2":"소비자중심경영인증을 받은 사업자는 대통령령으로 정하 는 바에 따라 그 인증의 표시를 할 수 있다.","3":"소비자중심경영인증을 받으려는 사업자는 대통령령으로 정하는 바에 따라 공정거래위원회에 신청하여야 한다.","4":"공정거래위원회는 소비자중심경영인증을 신청하는 사업 자에 대하여 대통령령으로 정하는 바에 따라 그 인증의 심사에 소요되는 비용을 부담하게 할 수 있다.","5":"공정거래위원회는 소비자중심경영을 활성화하기 위하여 대통령령으로 정하는 바에 따라 소비자중심경영 인증을 받은 기업에 대하여 포상 또는 지원 등을 할 수 있다."},"ans":1},{"year":"2021년 2회","num":21,"subj":"유통물류일반","q":"최근 국내외 유통산업의 발전상황과 트렌드로 옳지 않은것 은?","opts":{"1":"제품설계, 제조, 판매, 유통 등 일련의 과정을 늘려 거대 한 조직을 만들어 복잡한 가치사슬을 유지하고 높은 재 고비용을 필요로 하는 가치사슬이 중요해졌다.","2":"소비자의 구매 패턴 등을 담은 빅데이터를 기반으로 생 산과 유통에 대한 의사결정이 이루어지고 있다.","3":"글로벌 유통기업들은 무인점포를 만들고, 시범적으로 드 론 배송서비스를 시작하였다.","4":"디지털 기술 및 다양한 기술이 융합됨에 따라 온라인 플 랫폼을 통하여 개인화된 제품으로 변화된 소비자 선호에 대응할 수 있게 되었다.","5":"VR/AR 등을 이용한 가상 스토어에서 물건을 살 수 있 다."},"ans":1},{"year":"2021년 2회","num":22,"subj":"유통물류일반","q":"중간상이 행하는 각종 분류기능 중 ㉠과 ㉡에 들어갈 용어 로 옳은 것은?","opts":{"1":"㉠수합(accumulation), ㉡등급(sort out)","2":"㉠등급(sort out), ㉡분배(allocation)","3":"㉠분배(allocation), ㉡구색(assortment)","4":"㉠구색(assortment), ㉡수합(accumulation)","5":"㉠수합(accumulation), ㉡분배(allocation)"},"ans":2,"img":["boxes/2021_2_22.png"]},{"year":"2021년 2회","num":24,"subj":"유통물류일반","q":"마이클 포터(Michael Porter)의 산업구조분석모형(5-forces model)에 대한 설명으로 옳지 않은 것은?","opts":{"1":"공급자의 교섭력이 높아질수록 시장 매력도는 높아진다.","2":"대체재의 유용성은 대체재가 기존 제품의 가치를 얼마나 상쇄할 수 있는지에 따라 결정된다.","3":"교섭력이 큰 구매자의 압력으로 인해 자사의 수익성이 낮아질 수 있다.","4":"진입장벽의 강화는 신규 진입자의 진입을 방해하는 요소 가 된다.","5":"경쟁기업간의 동질성이 높을수록 암묵적인 담합가능성이 높아진다."},"ans":1},{"year":"2021년 2회","num":25,"subj":"유통물류일반","q":"중간상의 사회적 존재 타당성에 대한 설명 중 그 성격이 다 른 하나는?","opts":{"1":"제조업은 고정비가 차지하는 비율이 변동비보다 크다.","2":"제조업자가 중간상과 거래하여 사회적 총 거래수가 감소 한다.","3":"유통업은 고정비보다 변동비의 비율이 높다.","4":"중간상이 배제되고 제조업이 유통의 역할을 통합하는 것 이 비용측면에서 이점이 크지 않다.","5":"제조업체가 변동비를 중간상과 분담함으로써 비용면에서 경쟁 우위를 차지할 수 있다."},"ans":2},{"year":"2021년 2회","num":26,"subj":"상권분석","q":"소매점 개점을 위한 투자계획에 관한 설명으로 가장 옳지 않은 것은?","opts":{"1":"투자계획은 개점계획을 자금계획과 손익계획으로 계수화 한 것이다.","2":"자금계획은 자금조달계획과 자금운영계획으로 구성된다.","3":"손익계획은 수익계획과 비용계획으로 구성된다.","4":"자금계획은 투자활동 현금흐름표, 손익계획은 연도별 손 익계산서로 요약할 수 있다.","5":"물가변동이 심하면 경상가격 대신 불변가격을 적용하여 화폐가치 변동을 반영한다."},"ans":4},{"year":"2021년 2회","num":28,"subj":"상권분석","q":"점포를 개점할 때 고려해야할 전략적 사항에 대한 설명으로 옳지 않은 것은?","opts":{"1":"점포는 단순히 하나의 물리적 시설이 아니고 소비자들의 생활과 직결되며, 라이프스타일에도 영향을 미친다.","2":"상권의 범위가 넓어져서 규모의 경제를 유발할 수 있기 때문에, 점포의 규모는 클수록 유리하다.","3":"점포개설로 인해 인접 주민 또는 소비자단체의 민원제기 나 저항이 일어나지 않도록 사전에 대비하여야 한다.","4":"취급하는 상품의 종류에 따라 소비자의 이동거리에 대한 저항감이 다르기 때문에 상권의 범위가 달라진다.","5":"경쟁관계에 있는 다른 점포의 규모나 위치를 충분히 검 토하여야 한다."},"ans":2},{"year":"2021년 2회","num":29,"subj":"상권분석","q":"상권설정이 필요한 이유로 가장 옳지 않은 것은?","opts":{"1":"지역내 고객의 특성을 파악하여 상품구색과 촉진의 방향 을 설정하기 위해","2":"잠재수요를 파악하기 위해","3":"구체적인 입지계획을 수립하기 위해","4":"점포의 접근성과 가시성을 높이기 위해","5":"업종선택 및 업태개발의 기본 방향을 확인하기 위해"},"ans":4},{"year":"2021년 2회","num":30,"subj":"상권분석","q":"현재 “상가건물 임대차보호법”(법률 제17471호, 2020.7.31., 일부개정) 등 관련 법규에서 규정하고 있는 상 가임대료의 인상률 상한(청구당시의 차임 또는 보증금 기준) 으로 옳은 것은?","opts":{"1":"3% ② 4%","2":"","3":"5% ④ 7%","4":"","5":"9%"},"ans":3},{"year":"2021년 2회","num":31,"subj":"상권분석","q":"입지후보지에 대한 예상 매출금액을 계량적으로 추정하기 위한 상권분석기법이 아닌 것으로만 짝지어진 것은?","opts":{"1":"유사점포법(analog method), 허프모델(Huff model)","2":"허프모델(Huff model), 체크리스트법(Checklist method)","3":"티센다각형(Thiessen polygon)모형, 체크리스트법 (Checklist method)","4":"회귀분석(regression analysis)모형, 허프모델(Huff model)","5":"다항로짓모델(multinomial logit model), 유사점포법 (analog method)"},"ans":3},{"year":"2021년 2회","num":33,"subj":"상권분석","q":"시계성 관점에서 상대적으로 좋은 입지에 대한 설명으로 가 장 옳지 않은 것은?","opts":{"1":"차량 이용보다는 도보의 경우에 더 먼 거리에서부터 인 식할 수 있게 해야 한다.","2":"간판은 눈에 띄기 쉬운 크기와 색상을 갖춰야 한다.","3":"건물 전체가 눈에 띄는 것이 효과적이다.","4":"교외형인 경우 인터체인지, 대형 교차로 등을 기점으로 시계성을 판단한다.","5":"주차장의 진입로를 눈에 띄게 하는 것도 중요하다."},"ans":1},{"year":"2021년 2회","num":34,"subj":"상권분석","q":"지도작성체계와 데이터베이스관리체계의 결합으로 상권 분 석의 유용한 도구가 되고 있는 지리정보시스템(GIS)의 기능 에 대한 설명으로 옳은 것은?","opts":{"1":"버퍼(buffer) - 지도상에서 데이터를 조회하여 표현하고, 특정 공간기준을 만족시키는 지도를 얻기 위해 조회도구 로써 지도를 사용하는 것이다.","2":"주제도(thematic map) 작성 - 속성정보를 요약하여 표 현한 지도를 작성하는 것이며, 면, 선, 점의 형상으로 구 성된다.","3":"위상 - 지리적인 형상을 표현한 지도상에 데이터의 값과 범위를 할당하여 지도를 확대·축소하는 등의 기능이다.","4":"데이터 및 공간조회 - 어떤 지도형상, 즉 점이나 선혹은 면으로부터 특정한 거리 이내에 포함되는 영역을 의미하 며, 면의 형태로 나타나 상권 혹은 영향권을 표현하는데 사용될 수 있다.","5":"프레젠테이션 지도작업 - 공간적으로 동일한 경계선을 가진 두 지도 레이어들에 대해 하나의 레이어에 다른 레 이어를 겹쳐 놓고 지도 형상과 속성들을 비교하는 기능 이다."},"ans":2},{"year":"2021년 2회","num":35,"subj":"상권분석","q":"동일하거나 유사한 업종은 서로 멀리 떨어져 있는 것보다 가까이 모여 있는 것이 고객을 유인할 수 있다는 입지 평가 의 원칙으로 옳은 것은?","opts":{"1":"보충가능성의 원칙 ② 점포밀집의 원칙","2":"","3":"동반유인의 원칙 ④ 고객차단의 원칙","4":"","5":"접근 가능성의 원칙"},"ans":3},{"year":"2021년 2회","num":36,"subj":"상권분석","q":"한 도시 내 상권들의 계층성에 대한 설명으로 가장 옳지 않 은 것은?","opts":{"1":"지역상권은 보통 복수의 지구상권을 포함한다.","2":"지역상권은 대체로 도시의 행정구역과 일치하기도 한다.","3":"일반적으로 점포상권은 점포가 입지한 지구의 상권보다 크지 않다.","4":"같은 지구 안의 점포들은 특성이 달라도 상권은 거의 일 치한다.","5":"지방 중소도시의 지역상권은 도시 중심부의 지구상권과 거의 일치한다."},"ans":4},{"year":"2021년 2회","num":38,"subj":"상권분석","q":"상권분석은 지역분석과 부지분석으로 나누어진다. 다음 중 지역분석의 분석항목 만으로 구성된 것은? um":86,"subj":"유통정보","q":"아래 글상자에서 설명하는 유통정보시스템으로 가장 옳은 것은?","opts":{"1":"QR(Quick Response)","2":"ECR(Efficient Consumer Response)","3":"VMI(Vendor Management Inventory)","4":"CPFR(Collaborative Planning, Forecasting and Replenishment)","5":"e-프로큐어먼트(e-Procurement)"},"ans":1,"img":["boxes/2021_2_86.png"]},{"year":"2021년 2회","num":87,"subj":"유통정보","q":"아래 글상자의 괄호 안에 공통적으로 들어갈 용어로 가장 옳은 것은?","opts":{"1":"디지털아카이브 ② 전자문서교환","2":"","3":"크롤링 ④ 클라우드저장소","4":"","5":"기기그리드"},"ans":1,"img":["boxes/2021_2_87.png"]},{"year":"2021년 2회","num":88,"subj":"유통정보","q":"노나카의 SECI모델을 근거로 아래 글상자의 내용 중 외재화 (externalization)의 사례를 모두 고른 것으로 가장 옳은 것 은?","opts":{"1":"㉠, ㉡ ② ㉡, ㉣","2":"","3":"㉢, ㉤ ④ ㉠, ㉢, ㉤","4":"","5":"㉡, ㉣, ㉤"},"ans":3,"img":["boxes/2021_2_88.png"]},{"year":"2021년 2회","num":90,"subj":"유통정보","q":"POS 시스템에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"POS 시스템은 유통업체에서 소비자의 상품구매 과정에 서 활용되는 판매관리 시스템이다.","2":"POS 시스템으로부터 얻은 데이터는 유통업체에서 판매 전략 수립에 활용된다.","3":"POS 시스템에서 바코드의 정보를 인식하는 스캐너 (scanner)는 출력장치이다.","4":"POS 시스템은 시간별, 주기별, 계절별 상품의 판매 특성 을 파악하는데 도움을 제공한다.","5":"제조업체는 유통업체로부터 협조를 얻어 POS 시스템으 로부터 얻은 데이터를 공유할 수 있고, 이를 통해 제품 제조전략을 수립하는데 도움을 제공한다. 최강 자격"},"ans":3},{"year":"2021년 3회","num":1,"subj":"유통물류일반","q":"공급자주도형재고관리(VMI:Vendor Managed Inventory)에 대 한 내용으로 옳은 것은?","opts":{"1":"VMI는 공급자가 고객사를 위해 제공하는 가치향상 서비스 활동이다.","2":"VMI는 생산공정의 효율적 관리를 위해 우선순위계획, 능 력계획, 우선순위통제관리, 능력통제관리 등을 수행하는 생산관리시스템이다.","3":"VMI에서는 고객사가 재고를 추적하고, 납품일정과 주문량 을 결정한다.","4":"VMI를 활용하면 공급자는 재고관리에 소요되는 인력이나 시간 등 비용절감 효과를 얻을 수 있다.","5":"CMI(Co-Managed Inventory)보다 공급자와 고객사가 더 협력적인 형태로 발전한 것이 VMI이다."},"ans":1},{"year":"2021년 3회","num":2,"subj":"유통물류일반","q":"직무분석과 직무평가에 대한 설명으로 옳지 않은 것은?","opts":{"1":"직무분석이란 과업과 직무를 수행하는데 요구되는 인적 자질에 의해 직무의 내용을 정의하는 공식적 절차를 말한 다.","2":"직무분석에서 직무요건 중 인적 요건을 중심으로 정리한 문서를 직무기술서라고 한다.","3":"직무분석은 효과적인 인적자원관리를 위해 선행되어야 할 기초적인 작업이다.","4":"직무평가는 직무를 일정한 기준에 의거하여 서로 비교 함 으로써 상대적 가치를 결정하는 체계적인 활동을 말한다.","5":"직무평가는 직무의 가치에 따라 공정한 임금지급 기준, 합리적인 인력의 확보 및 배치, 인력의 개발 등을 결정할 때 이용된다."},"ans":2},{"year":"2021년 3회","num":3,"subj":"유통물류일반","q":"조직문화에 대한 설명으로 옳지 않은 것은?","opts":{"1":"한 조직의 구성원들이 공유하는 가치관, 신념, 이념, 지식 등을 포함하는 종합적인 개념이다.","2":"특정 조직 구성원들의 사고판단과 행동의 기본 전제로 작 용하는 비가시적인 지식적, 정서적, 가치적 요소이다.","3":"조직구성원들이 공통적으로 생각하는 방법, 느끼는 방향, 공통의 행동 패턴의 체계이다.","4":"조직 외부 자극에 대한 조직 전체의 반응과 임직원의 가 치의식 및 행동을 결정하는 요인을 포함한다.","5":"다른 기업의 제도나 시스템을 벤치마킹하는 경우 그 조직 문화적가치도 쉽게 이전된다."},"ans":5},{"year":"2021년 3회","num":4,"subj":"유통물류일반","q":"유통경로구조를 결정하기 위해 체크리스트법을 사용할 때 고 려해야 할 요인들에 대한 설명으로 옳지 않은 것은?","opts":{"1":"재무적 능력이나 규모 등의 기업요인","2":"시장규모와 지역적 집중도 등의 시장요인","3":"제품의 크기와 중량 등의 제품요인","4":"경영전문성이나 구성원 통제 등에 대한 기업요인","5":"구매빈도와 평균 주문량 등의 제품요인"},"ans":5},{"year":"2021년 3회","num":6,"subj":"유통물류일반","q":"기업 내에서 일어날 수 있는 각종 윤리상의 문제들에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"다른 이해당사자들을 희생하여 회사의 이익을 도모하는 행위는 지양해야 한다.","2":"업무 시간에 SNS를 통해 개인활동을 하는 것은 업무시간 남용에 해당되므로 지양해야 한다.","3":"고객을 위한 무료 음료나 기념품을 개인적으로 사용하는 것은 지양해야 한다.","4":"회사에 손해를 끼칠 수 있는 사안이라면, 중대한 문제라 해도 공익제보를 하는 것은 지양해야 한다.","5":"다른 구성원들에게 위협적인 행위나 무례한 행동을 하는 것은 지양해야 한다."},"ans":4},{"year":"2021년 3회","num":7,"subj":"유통물류일반","q":"중간상이 있음으로 인해 각 경로구성원에 의해 보관되는 제 품의 총량을 감소시킨다는 내용이 의미하는 중간상의 필요성 을 나타내는 것으로 가장 옳은 것은?","opts":{"1":"효용창출의 원리 ② 총거래수 최소의 원칙","2":"","3":"분업의 원리 ④ 변동비 우위의 원리","4":"","5":"집중준비의 원리"},"ans":5},{"year":"2021년 3회","num":8,"subj":"유통물류일반","q":"최근 유통시장 변화에 대해 기술한 내용으로 옳지 않은 것 은?","opts":{"1":"신선식품 배송에 대한 수요가 증가하고 있다.","2":"외식업체들은 매장에 설치한 키오스크를 통해 주문을 받 음으로써 생산성을 높이고 고객의 이용 경험을 완전히 바 꾸는 혁신을 시도하고 있다.","3":"온라인 쇼핑 시장의 성장세가 두드러지면서 유통업체의 배송 경쟁이 치열해지고 있다.","4":"가공·즉석식품의 판매는 편의점 매출에 긍정적인 영향을 주었다.","5":"상품이 고객에게 판매되는 단계마다 여러 물류회사들이 역할을 나누어 서비스를 제공하는 풀필먼트 서비스를 통 해 유통 단계가 획기적으로 단축되고 있다."},"ans":5},{"year":"2021년 3회","num":10,"subj":"유통물류일반","q":"아웃소싱과 인소싱을 비교해 볼 때 아웃소싱의 단점을 설명 한 것으로 옳지 않은 것은?","opts":{"1":"부적절한 공급업자를 선정할 수 있는 위험에 노출된다.","2":"과다 투자나 과다 물량생산의 위험이 높다.","3":"핵심지원활동을 잃을 수도 있다.","4":"프로세스 통제권을 잃을 수도 있다.","5":"리드타임이 장기화 될 수도 있다."},"ans":2},{"year":"2021년 3회","num":11,"subj":"유통물류일반","q":"아래 글상자에서 설명하는 동기부여 이론으로 옳은 것은?","opts":{"1":"매슬로(Maslow)의 욕구단계이론","2":"맥그리거(Mcgregor)의 XY이론","3":"앨더퍼(Alderfer)의 ERG이론","4":"허츠버그(Herzberg)의 두 요인 이론","5":"피들러(Fiedler)의 상황적합성이론"},"ans":4,"img":["boxes/2021_3_11.png"]},{"year":"2021년 3회","num":12,"subj":"유통물류일반","q":"물류의 상충(trade off) 관계에 대한 설명으로 가장 옳지 않 은 것은?","opts":{"1":"기업의 물류합리화는 상충관계의 분석이 기본이 된다.","2":"기업 내 물류기능과 타 기능 간의 상충관계 역시 효율적 물류관리를 위해 고려해야 한다.","3":"제조업자와 운송업자 및 창고업자 등 기업조직과 기업 외 조직간의 상충관계 또한 고려해야한다.","4":"상충관계에서 발생하는 문제점을 극복하기 위해서는 물 류 흐름을 세분화하여 부분 최적화를 달성해야 한다.","5":"배송센터에서 수배송 차량의 수를 늘릴 경우 고객에게 도착하는 배송시간은 짧아지지만 물류비용은 증가하는 경우는 상충관계의 사례에 해당한다."},"ans":4},{"year":"2021년 3회","num":14,"subj":"유통물류일반","q":"신용등급이 낮은 기업이 자본을 조달하기 위해 발행하는 것 으로 높은 이자율을 지급하지만 상대적으로 높은 위험을 동 반하는 채무 수단으로 가장 옳은 것은?","opts":{"1":"변동금리채 ② 연속상환채권","2":"","3":"정크본드 ④ 무보증채","4":"","5":"보증채"},"ans":3},{"year":"2021년 3회","num":15,"subj":"유통물류일반","q":"리더십에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"민주적 리더십은 종업원이 더 많은 것을 알고 있는 전문 직인 경우에 효과적이다.","2":"독재적 리더십은 긴박한 상황에서 절대적인 복종이 필요 한 경우에 효과적이다.","3":"독재적 리더십은 숙련되지 않거나 동기부여가 안 된 종 업원에게 효과적이다.","4":"독재적 리더십은 자신의 지시를 따르게 하기 위해 경제 적 보상책을 사용하기도 한다.","5":"자유방임적 리더십은 종업원에게 신뢰와 확신을 보여 동 기요인을 제공한다."},"ans":1},{"year":"2021년 3회","num":16,"subj":"유통물류일반","q":"앤소프(Ansoff, H. I.)의 성장전략 중 아래 글상자에서 설명 하는 전략으로 가장 옳은 것은?","opts":{"1":"시장침투전략 ② 제품개발전략","2":"","3":"시장개발전략 ④ 코스트절감전략","4":"","5":"철수전략"},"ans":3,"img":["boxes/2021_3_16.png"]},{"year":"2021년 3회","num":18,"subj":"유통물류일반","q":"제3자 물류에 대한 설명으로 가장 옳은 것은?","opts":{"1":"거래기반의 수발주관계","2":"운송, 보관 등 물류기능별 서비스 지향","3":"일회성 거래관계","4":"종합물류서비스 지향","5":"정보공유 불필요"},"ans":4},{"year":"2021년 3회","num":19,"subj":"유통물류일반","q":"보관 효율화를 위한 기본적인 원칙과 관련된 설명으로 가장 옳지 않은 것은?","opts":{"1":"위치표시의 원칙 – 물품이 보관된 장소와 랙 번호 등을 표시함으로써 보관업무의 효율을 기한다.","2":"중량특성의 원칙 - 물품의 중량에 따라 보관 장소의 높 낮이를 결정한다.","3":"명료성의 원칙 – 보관된 물품을 시각적으로 용이하게 식 별할 수 있도록 보관한다.","4":"회전대응 보관의 원칙 - 물품의 입출고 빈도에 따라 장 소를 달리해서 보관한다.","5":"통로대면보관의 원칙 - 유사한 물품끼리 인접해서 보관 한다."},"ans":5},{"year":"2021년 3회","num":20,"subj":"유통물류일반","q":"유통산업의 다양한 역할 중 경제적, 사회적 역할로 가장 옳 지 않은 "IRS는 한 지역시장 내에서 특정 소매업태의 단위 매장 면적당 잠재수요를 나타낸다.","2":"IRS가 낮으면 점포가 초과 공급되어 해당 시장에서의 점 포간 경쟁이 치열함을 의미한다.","3":"IRS의 값이 클수록 공급보다 수요가 상대적으로 많으며 시장의 포화정도가 낮은 것이다.","4":"거주자의 지역외구매(outshopping) 정도가 낮으면 MEP 가 크게 나타나고 지역시장의 미래 성장가능성은 높은 것이다.","5":"MEP와 IRS가 모두 높은 지역시장이 가장 매력적인 시장 이다."},"ans":4},{"year":"2021년 3회","num":30,"subj":"상권분석","q":"현 소유주의 취득일과 매매과정, 압류, 저당권 등의 설정, 해당 건물의 기본내역 등이 기록되어 있는 공부서류로 가장 옳은 것은?","opts":{"1":"등기사항전부증명서 ② 건축물대장","2":"","3":"토지대장 ④ 토지이용계획확인서","4":"","5":"지적도"},"ans":1},{"year":"2021년 3회","num":32,"subj":"상권분석","q":"상권을 구분하거나 상권별 대응전략을 수립할 때 필수적으 로 이해하고 있어야 할 상권의 개념과 일반적 특성을 설명 한 내용 중에서 가장 옳지 않은 것은?","opts":{"1":"1차상권이 전략적으로 중요한 이유는 소비자의 밀도가 가장 높은 곳이고 상대적으로 소비자의 충성도가 높으며 1인당 판매액이 가장 큰 핵심적인 지역이기 때문이다.","2":"1차상권은 전체상권 중에서 점포에 가장 가까운 지역을 의미하는데 매출액이나 소비자의 수를 기준으로 일반적 으로 약 60% 정도까지를 차지하지만 그 비율은 절대적 이지 않다.","3":"2차상권은 1차상권을 둘러싸는 형태로 주변에 위치하여 매출이나 소비자의 일정비율을 추가로 흡인하는 지역이 다.","4":"3차상권은 상권으로 인정하는 한계(fringe)가 되는 지역 범위로, 많은 경우 지역적으로 넓게 분산되어 위치하여 소비자의 밀도가 가장 낮다.","5":"3차상권은 상권내 소비자의 내점빈도가 1차상권에 비해 높으며 경쟁점포들과 상권중복 또는 상권잠식의 가능성 이 높은 지역이다."},"ans":5},{"year":"2021년 3회","num":33,"subj":"상권분석","q":"상가건물 임대차보호법(약칭: 상가임대차법)(법률 제17471 호, 2020.7.31.,일부개정)에서 규정하는 임차인의 계약갱신 요구에 대한 정당한 거절사유에 해당하지 않는 것은?","opts":{"1":"임차인이 3기의 차임액에 해당하는 금액에 이르도록 차 임을 연체한 사실이 있는 경우","2":"임차인이 임대인의 동의 없이 목적 건물의 전부 또는 일 부를 전대(轉貸)한 경우","3":"임차인이 임차한 건물의 전부 또는 일부를 고의나 중대 한 과실로 파손한 경우","4":"서로 합의하여 임대인이 임차인에게 상당한 보상을 제공 한 경우","5":"최초의 임대차기간을 포함한 전체 임대차기간이 5년을 초과한 경우"},"ans":5},{"year":"2021년 3회","num":34,"subj":"상권분석","q":"일반적으로 인간은 이익을 얻는 쪽을 먼저 선택하고자 하는 심리가 있어서 길을 건널 때 처음 만나는 횡단보도를 이용 하려고 한다는 법칙으로 가장 옳은 것은?","opts":{"1":"안전우선의 법칙 ② 집합의 법칙","2":"","3":"보증실현의 법칙 ④ 최단거리 실현의 법칙","4":"","5":"주동선 우선의 법칙"},"ans":3},{"year":"2021년 3회","num":37,"subj":"상권분석","q":"상권분석을 위한 데이터를 소비자를 대상으로 직접 수집 하 는 방법의 하나로서, 내점객조사법과 조사대상의 특성이 가 장 유사한 것은?","opts":{"1":"그룹인터뷰조사법 ② 편의추출조사법","2":"","3":"점두조사법 ④ 지역할당조사법","4":"","5":"가정방문조사법"},"ans":3},{"year":"2021년 3회","num":38,"subj":"상권분석","q":"대형상업시설인 쇼핑센터의 전략적 특성은 ㉡ 머천다이징","4":"㉠ 입지, ㉡ 서비스","5":"㉠ 점포분위기, ㉡ 공급업자관리"},"ans":3,"img":["boxes/2021_3_56.png"]},{"year":"2021년 3회","num":57,"subj":"유통마케팅","q":"아래 글상자의 내용 중 협동광고(cooperative advertising) 가 상대적으로 중요한 촉진 수단으로 작용하는 상품들을 나 열한 것으로 가장 옳은 것은?","opts":{"1":"㉠, ㉡, ㉢ ② ㉡, ㉢, ㉥","2":"","3":"㉢, ㉣, ㉤ ④ ㉣, ㉤, ㉥","4":"","5":"㉢, ㉣, ㉥"},"ans":1,"img":["boxes/2021_3_57.png"]},{"year":"2021년 3회","num":58,"subj":"유통마케팅","q":"점포 배치 및 디자인과 관련된 설명으로 옳지 않은 것은?","opts":{"1":"자유형 점포배치는 특정 쇼핑경로를 유도하지 않는다.","2":"경주로형 점포배치는 고객들이 다양한 매장의 상품을 볼 수 있게 하여 충동구매를 유발하려는 목적으로 활용된 다.","3":"격자형 점포배치는 소비자들의 제품탐색을 용이하게 하 고 동선을 길게 만드는 장점이 있다.","4":"매장의 입구는 고객들이 새로운 환경을 둘러보고 적응하 는 곳이므로 세심하게 디자인해야 한다.","5":"매장 내 사인물(signage)과 그래픽은 고객들의 매장 탐 색을 돕고 정보를 제공한다."},"ans":3},{"year":"2021년 3회","num":60,"subj":"유통마케팅","q":"마케팅 커뮤니케이션 수단들에 대한 설명으로 가장 옳지 않 은 것은?","opts":{"1":"신뢰성이 높은 매체를 통한 홍보(publicity)는 고객의 우 호적 태도를 형성하기 위한 좋은 수단이다.","2":"인적판매는 대면접촉을 통하기 때문에 고객에게 구매를 유도하기에 적절한 도구이다.","3":"판매촉진은 시험적 구매를 유발하는데 효과적인 도구이 다.","4":"광고의 목적은 판매를 촉진하기 위한 것이라면, 홍보는 이미지와 대중 관계를 향상시키는데 목적이 있다.","5":"광고는 시간과 공간의 제약은 없으나 다른 커뮤니케이션 수단들에 비해 노출당 비용이 많이 소요된다는 단점이 있다."},"ans":5},{"year":"2021년 3회","num":62,"subj":"유통마케팅","q":"편의점이 PB상품을 기획하는 이유로 가장 옳지 않은 것은?","opts":{"1":"편의점은 대형마트나 수퍼마켓보다 비싸다는 점포 이미 지를 개선시킬 수 있다.","2":"PB상품이 NB상품에 비해 점포차별화에 유리하다.","3":"소량구매 생필품 중심으로 PB상품을 개발하여 매출을 높일 수 있다.","4":"PB상품이 중소 제조업체를 통해 납품될 경우, NB 상품 을 공급하는 대형 제조업체에 비해 계약조건이 상대적으 로 유리할 수도 있다.","5":"NB상품 보다 수익률은 낮지만 가격에 민감한 소비자 욕 구에 부응할 수 있다."},"ans":5},{"year":"2021년 3회","num":64,"subj":"유통마케팅","q":"옴니채널(omni channel) 소매업에 대한 설명으로서 가장 옳 은 것은?","opts":{"1":"세분시장별로 서로 다른 경로를 통해 쇼핑할 수 있게 한 다.","2":"동일한 소비자가 점포, 온라인, 모바일 등 다양한 경로를 통해 쇼핑할 수 있게 한다.","3":"인터넷만을 활용하여 영업한다.","4":"고객에게 미리 배포한 카달로그를 통해 직접 주문을 받 는 소매업이다.","5":"인포머셜이나 홈쇼핑채널 등 주로 TV를 활용하여 영업 하는 소매업이다."},"ans":2},{"year":"2021년 3회","num":65,"subj":"유통마케팅","q":"구매시점광고(POP)에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"구매하는 장소에서 이루어지는 광고로서 판매촉진 활동 에 대한 효과 측정이 용이하다.","2":"스토어트래픽을 창출하여 소비자의 관심을 끄는 역할을 한다.","3":"저렴한 편의품을 계산대 주변 시간절 약 서비스이다.","2":"진열은 상품선택 시 다른 상품과의 비교를 쉽게 해주는 비교서비스이다.","3":"진열은 상품종류를 쉽게 식별하게 해주는 식별서비스이 다.","4":"진열은 상품이 파손 없이 안전하게 보관되도록 하는 보 관서비스이다.","5":"진열은 무언의 커뮤니케이션으로 상품정보를 제공해주는 정보서비스이다."},"ans":4},{"year":"2022년 1회","num":60,"subj":"유통마케팅","q":"레이아웃의 영역에 해당하지 않는 것은?","opts":{"1":"상품 및 집기의 배치와 공간의 결정","2":"집기 내 상품 배치와 진열 양의 결정","3":"출입구와 연계된 주통로의 배치와 공간 결정","4":"상품품목을 구분한 보조통로의 배치와 공간 결정","5":"상품 계산대의 배치와 공간결정"},"ans":2},{"year":"2022년 1회","num":61,"subj":"유통마케팅","q":"아래 글상자에서 RFM기법에 대한 설명으로 옳은 것을 모두 나열한 것은?","opts":{"1":"㉠, ㉡, ㉤ ② ㉠, ㉢, ㉣","2":"","3":"㉠, ㉡, ㉢, ㉣ ④ ㉠, ㉡, ㉣, ㉤","4":"","5":"㉠, ㉡, ㉢, ㉣, ㉤"},"ans":5,"img":["boxes/2022_1_61.png"]},{"year":"2022년 1회","num":62,"subj":"유통마케팅","q":"마케팅통제(marketing control)에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"마케팅목표를 달성하기 위해 마케팅전략과 계획을 마케 팅 활동으로 전환시키는 과정이다.","2":"마케팅전략 및 계획의 실행결과를 평가하고, 마케팅목표 가 성취될 수 있도록 시정조치하는 것이다.","3":"마케팅계획의 실행과정에서 예상치 않은 일들이 발생하 기 때문에 지속적인 마케팅통제가 필요하다.","4":"운영통제(operating control)는 연간 마케팅계획에 대비 한 실제성과를 지속적으로 확인하고 필요할 때마다 시정 조치하는 것이다.","5":"전략통제(strategic control)는 기업의 기본전략들이 시장 기회에 잘 부응하는지를 검토하는 것이다."},"ans":1},{"year":"2022년 1회","num":63,"subj":"유통마케팅","q":"쇼루밍(showrooming) 소비자의 특징에 대한 설명으로 가장 옳은 것은?","opts":{"1":"주된 구매동기는 제품을 즉시 수령하고, 반품을 더 쉽게 하기 위함이다.","2":"온라인에서만 구매하는 온라인 집중형 소비자이다.","3":"오프라인 점포에서 제품을 살펴본 후 온라인에서 저렴한 가격으로 구입하려 한다.","4":"오프라인 상점에서만 직접 경험하고 구매하려는 오프라 격증 기출문제 전자문제집 CBT : www.comcbt.com","5":""},"ans":3},{"year":"2022년 1회","num":66,"subj":"유통마케팅","q":"소매 마케팅전략 수립을 위해 필요한 소매믹스(retailing mix)로 옳지 않은 것은?","opts":{"1":"소매가격 책정 ② 점포입지 선정","2":"","3":"유통정보 관리 ④ 소매 커뮤니케이션","4":"","5":"취급상품 결정"},"ans":3},{"year":"2022년 1회","num":67,"subj":"유통마케팅","q":"아래 글상자의 사례를 통해 계산한 A상품의 연간 상품 회전 율(rate of stock turnover)로 옳은 것은?","opts":{"1":"5회 ② 10회","2":"","3":"13회 ④ 15회","4":"","5":"20회"},"ans":1,"img":["boxes/2022_1_67.png"]},{"year":"2022년 1회","num":68,"subj":"유통마케팅","q":"유통목표설정에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"유통경로 상에서 소비자들이 기대하는 서비스 수준에 근 거하여 유통목표를 설정한다.","2":"유통목표는 포괄적인 유통관리를 위해 개념적으로 서술 되어야 한다.",
