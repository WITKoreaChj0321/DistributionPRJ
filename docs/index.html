":"다음 중 온라인 프로모션의 유형으로 가장 옳지 않은 것은?","opts":{"1":"디스플레이 광고(display advertising)","2":"검색관련 광고(search-related advertising)","3":"트레이드인 광고(trade-in advertising)","4":"콘텐츠 스폰서십(content sponsorship)","5":"직접 반응 광고(direct-response advertising)"},"ans":3},{"year":"2024년 1회","num":57,"subj":"유통마케팅","q":"소매업체 대상 판촉프로그램에 대한 설명으로 옳지 않은 것 은?","opts":{"1":"리베이트: 진열위치, 판촉행사, 매출실적 등 소매상의 협 력 정도에 따라 판매금액의 일정률에 해당하는 금액을 반환해 주는 것을 말한다.","2":"가격할인: 일정 기간의 구매량에 대해 가격을 할인해 주 는 방법을 말한다.","3":"할증판촉: 일정량 구매 시 동일제품을 무료로 더 제공하 는 것을 말한다.","4":"진열장비의 지원: 육가공·냉장음료 등의 보관에 필요한 쇼케이스나 진열보조용구 등을 지원하는 것을 말한다.","5":"판촉물지원: 신제품 출시 시 많이 사용하는 방법으로 소 비자 홍보를 통한 제품구매를 유도하기 위하여 점포내의 시식행사나 샘플배포비용을 지원하는 것을 말한다."},"ans":5},{"year":"2024년 1회","num":58,"subj":"유통마케팅","q":"온라인상의 마케팅 퍼널 모델(funnel model)에 대한 설명으 로 옳지 않은 것은?","opts":{"1":"온라인상의 마케팅 퍼널 모델은 고객이 웹이나 앱 서비 스에 접속한 후 상품을 구매하기까지의 일련의 경로를 단계별로 나누어 시각화한 모델이다.","2":"온라인상의 마케팅 퍼널이라는 용어는 상품을 인지하고 구매까지 나아가는 과정에서 단계별로 좁아지는 깔때기 같은 모양에서 비롯되었다.","3":"온라인상의 마케팅 퍼널 모델은 소비자 정보처리 이론을 바탕으로 형성되었다.","4":"온라인상의 마케팅 퍼널은 기존 소비자의 구매여정을 새 롭게 설계하여, 이탈고객을 대상으로 기업이 설계한 방 향대로 구매여정을 최적화하는 프로세스이다.","5":"온라인상에서 설계된 퍼널을 통해 기업은 각 단계마다 고객의 전환 및 이탈을 확인할 수 있기 때문에 해당 단 계에 적합한 전략들을 수립하는 것이 가능하다."},"ans":4},{"year":"2024년 1회","num":59,"subj":"유통마케팅","q":"고객관리를 위한 고객분석의 내용으로 옳지 않은 것은?","opts":{"1":"고객세분화 분석을 통한 구매자와 사용자, 잠재고객 파 악","2":"고객의 구매동기를 분석하여 제품의 특성과 추구목적 이 해","3":"고객 구매동기의 변화 가능성과 잠재적 욕구의 파악","4":"미충족된 고객욕구를 파악하여 문제점 및 제품만족도 개 선 사항 파악","5":"고객서비스 및 접객 방식의 개선 효과 분석을 통해 고객 응대에 활용 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":5},{"year":"2024년 1회","num":60,"subj":"유통마케팅","q":"유통마케팅 조사의 절차 중 조사설계에 해당하는 활동으로 가장 옳지 않은 것은?","opts":{"1":"조사의 성격 규정 ② 데이터 수집방법 결정","2":"","3":"데이터 수집도구 결정 ④ 표본 설정","4":"","5":"데이터 검증"},"ans":5},{"year":"2024년 1회","num":61,"subj":"유통마케팅","q":"소매점포의 레이아웃 중 아래 글상자의 괄호 안에 들어갈 용어로 가장 옳은 것은?","opts":{"1":"㉠ 경주형 레이아웃, ㉡ 자유형 레이아웃","2":"㉠ 격자형 레이아웃, ㉡ 자유형 레이아웃","3":"㉠ 격자형 레이아웃, ㉡ 경주형 레이아웃","4":"㉠ 자유형 레이아웃, ㉡ 격자형 레이아웃","5":"㉠ 경주형 레이아웃, ㉡ 격자형 레이아웃"},"ans":1,"img":["boxes/2024_1_61.png"]},{"year":"2024년 1회","num":62,"subj":"유통마케팅","q":"다음 촉진 예산 결정 방법 중 상향식 접근방법으로 옳은 것 은?","opts":{"1":"가용 예산법(affordable method)","2":"매출액 비율법(percentage-of-sales method)","3":"단위당 고정 비용법(fixed-sum-per-unit method)","4":"경쟁자 기준법(competitive parity method)","5":"목표 및 과업기준법(objective and task method)"},"ans":5},{"year":"2024년 1회","num":63,"subj":"유통마케팅","q":"상품 로스(loss)의 발생원인에 대한 설명으로 옳지 않은 것 은?","opts":{"1":"상품 로스가 발생하는 원인은 다양하지만 크게 상품 운 영상의 문제, 로스 관리상의 문제, 장비 및 시설 문제로 분류할 수 있다.","2":"과일과 채소 같은 신선식품의 경우 품질 관리를 위한 유 통 과정에서의 폐기로 인해 일반적인 상품보다 로스가 발생할 가능성이 높다.","3":"로스 다빈도 상품에 대한 방지대책 미흡은 로스 관리상 의 문제에 속한다.","4":"매입 및 반품에 대한 오류는 상품 운영상의 문제에 속한 다.","5":"고객 및 직원으로부터 발생하는 도난 사고는 장비 및 시 설문제에 속한다."},"ans":5},{"year":"2024년 1회","num":64,"subj":"유통마케팅","q":"소매점의 정량적 성과분석을 위한 관리지수로서 옳지 않은 것은?","opts":{"1":"전월, 전년, 또는 전분기 대비 당월, 금년, 현분기의 실 적 증감을 관리하는 신장률 관리","2":"매장의 단위면적(평)당 매출액 및 수익 등을 관리하는 평 효율 관리","3":"상품에 투자된 자금을 신속하게 회수하여 재고 과다로 인한 자금손실을 방지하는 재고회전율 관리","4":"입점 고객에 대한 신속한 니즈 파악 및 빠른 판매 마무 리를 관리하는 노동생산성 관리","5":"입점 고객 대비 구매 고객 수 및 고객 1인당 평균 매입 액을 관리하기 위한 구매율 객단가 관리 최강 자격"},"ans":4},{"year":"2024년 1회","num":65,"subj":"유통마케팅","q":"플랫폼 비즈니스전략을 수립할 때 고려해야 할 사항으로 가 장 옳지 않은 것은?","opts":{"1":"새로운 비즈니스 모델 및 양질의 콘텐츠가 성공의 핵심 요인이다.","2":"규모의 경제로 인해 선두주자는 반드시 성공한다.","3":"초기에 충분한 사용자를 확보하기 위해 빠른 시간 내에 네트워크 효과가 나타나게 해야 한다.","4":"제공 서비스 및 콘텐츠의 품질은 지속적으로 유지되어야 한다.","5":"독점적 지위를 이용하여 사용자에게 과다한 부담을 강요 하는 것은 장기적으로 해가 될 수 있다."},"ans":2},{"year":"2024년 1회","num":66,"subj":"유통마케팅","q":"서비스의 소멸성(perishability)을 극복하기 위한 서비스마케 팅으로 가장 옳지 않은 것은?","opts":{"1":"예약 시스템을 활용한 예약제도","2":"비수기 할인 등 시즌별 가격 차등화","3":"조조할인 등 시간대별 가격 차등화","4":"고객 후기 및 추천을 활용한 서비스 표준화","5":"피크 타임동안 가용능력의 효율성 극대화"},"ans":4},{"year":"2024년 1회","num":67,"subj":"유통마케팅","q":"상품구매와 관련하여 고관여 상황에서 제품들 사이에 차이 가 거의 없다고 판단할 경우 주로 나타나는 고객 구매행동 으로 옳은 것은?","opts":{"1":"맥락적 구매행동","2":"다양성 추구 구매행동","3":"습관적 구매행동","4":"인지부조화 감소 구매행동","5":"체계적 구매행동"},"ans":4},{"year":"2024년 1회","num":68,"subj":"유통마케팅","q":"아래 글상자에서 설명하는 매장 혼잡성 관리 전략으로 옳은 것은?","opts":{"1":"시설의 재배치 ② 최대용량 조절","2":"","3":"고객 수 통제 ④ 직원 수 조절","4":"","5":"고객의 인식관리"},"ans":5,"img":["boxes/2024_1_68.png"]},{"year":"2024년 1회","num":69,"subj":"유통마케팅","q":"CRM 채널관리 이슈 및 기대효과에 관한 내용으로 가장 옳 지 않은 것은?","opts":{"1":"기존 고객들만을 대상으로 마케팅을 수행하여 지속적인 경쟁우위를 창출할 수 있다.","2":"고객 니즈에 맞는 최적의 채널을 제공하고, 거래비용을 최소화할 수 있는 채널로 고객을 유도할 수 있다.","3":"채널의 정보교환 기능을 활성화하여 고객의 개별 니즈에 부합하는 가치를 창조해야 한다.","4":"채널을 차별화함으로써 발생할 수 있는 채널 간 갈등을 해소해야 한다.","5":"고객 행위에 대한 깊은 이해를 바탕으로 고객만족 및 고 객 애호도를 증대시킬 수 있다."},"ans":1},{"year":"2024년 1회","num":71,"subj":"유통마케팅","q":"지리적, 공간적 제약을 극복하고 어디서 누구와도 연결이 가능하도록 해주는 광역컴퓨팅기술과 관련 있는 기술로 가 장 옳지 않은 것은?","opts":{"1":"인터넷 기술 ② 미들웨어 기술","2":"","3":"분산처리 기술 ④ 네트워크컴퓨팅 기술","4":"","5":"데이터 압축복원 기술"},"ans":5},{"year":"2024년 1회","num":73,"subj":"유통마케팅","q":"유통업체에서 ERP 시스템을 도입할 때, 구축 비용에 영향을 미치는 요인으로 옳지 않은 것은?","opts":{"1":"ERP 시스템 구축 범위","2":"도입하려는 ERP 모듈 수","3":"ERP 시스템 이용자 수","4":"ERP 시스템 구축 프로젝트 추진 기간","5":"ERP 데모데이 참여 기업 수"},"ans":5},{"year":"2024년 1회","num":74,"subj":"유통마케팅","q":"유통정보시스템을 구축하려 한다. 구축 단계별 설명으로 가 장 옳지 않은 것은?","opts":{"1":"분석 - 최종사용자의 비즈니스 요구사항 분석을 수행한 다.","2":"설계 - 시스템을 지원하기 위해 필요한 기술적 아키텍처 와 서비스 모델을 설계한다.","3":"개발 - 기술적 아키텍처, 데이터베이스, 서비스를 구현 한다.","4":"테스팅 - 테스트조건을 구성하고 서비스와 시스템에 대 한 테스트를 수행한다.","5":"구현 - 시스템 사용자를 지원하기 위한 상담창구를 개설 한다."},"ans":5},{"year":"2024년 1회","num":75,"subj":"유통마케팅","q":"고객 충성도를 강화하기 위한 우수고객우대 프로그램에 대 한 설명으로 가장 옳지 않은 것은?","opts":{"1":"유통업체의 우수고객우대 프로그램은 금전적 혜택과 비 금전적 혜택을 제공하는데, 최근에는 금전적 혜택을 강 화하는 방향으로 진화하고 있다.","2":"유통업체의 우수고객우대 프로그램은 자사에서 제공하는 혜택이 자사 상품과 직접적인 관련성을 갖도록 함으로써 자사 상품의 가치를 증진시키는 것이 바람직하다.","3":"유통업체의 우수고객우대 프로그램은 고객의 거래실적이 많을수록 더 많은 혜택을 제공하는 등 고객 등급에 따라 혜택을 차등 제공하는 방식을 채택한다.","4":"유통업체에서 우수고객우대 프로그램을 도입하는 이유는 우수고객의 수익창출 기여도가 매우 높기 때문이다.","5":"유통업체의 우수고객우대 프로그램은 우수고객의 유지 최강 자격"},"ans":1},{"year":"2024년 1회","num":76,"subj":"유통정보","q":"오늘날 유통업체에서는 블록체인 기술을 활용해 정보시스템 을 구현하고 있다. 블록체인에 대한 설명으로 가장 옳지 않 은 것은?","opts":{"1":"퍼블릭 블록체인은 누구나 참여할 수 있고 모든 참여자 의 상호검증을 거치기 때문에 상대적으로 신뢰도가 높은 반면 처리속도가 느리다.","2":"프라이빗 블록체인은 서비스 제공자의 승인을 받아야만 참여할 수 있도록 구축되는 형태이다.","3":"한 번 연결된 블록은 수정하거나 삭제하기 어려워 불변 성을 가진다.","4":"새로운 블록은 생성되는 동시에 모든 참여자에게 전송되 어 공유되므로 참여자들 누구나 볼 수 있어 투명성을 가 진다.","5":"블록체인은 기존의 분권화된 방식을 탈피한 중앙집중식 방식으로 데이터를 보다 빠르게 처리할 수 있다."},"ans":5},{"year":"2024년 1회","num":77,"subj":"유통정보","q":"고객관계관리(CRM)를 통해 수집된 자료를 분석하는 마이닝 기법과 그 설명이 가장 옳지 않은 것은?","opts":{"1":"텍스트 마이닝의 주요 분석 기법들로는 주제어 분석, 동 시 출현 단어 분석, 토픽 모델링, 감성 분석 등이 있다.","2":"오피니언 마이닝은 문서에 나타난 의견의 극성을 분석하 는 감성분석이 중요하다.","3":"감성분석의 대표적 예로는 영화 리뷰 분석, 온라인 쇼핑 몰의 제품에 대한 구매후기 분석 등이 있다.","4":"웹콘텐츠 마이닝은 웹상에서 사용자가 찾고자 했던 것을 기록하고 있는 웹 서버 로그에서 유용한 정보를 추출하 는 과정이다.","5":"웹구조 마이닝은 웹사이트의 노드와 연결 구조를 분석하 기 위해 그래프 이론을 사용하는 과정이다."},"ans":4},{"year":"2024년 1회","num":78,"subj":"유통정보","q":"EDI(electronic data interchange)와 관련된 설명으로 가장 옳지 않은 것은?","opts":{"1":"EDI는 합의된 표준화를 기반으로 통신망을 통해 정보를 교환하는 기술이다.","2":"EDI는 서류의 내용을 수동으로 옮겨 작성하는데 있어 발 생할 수 있는 오류를 최소화시켜 준다.","3":"EDI 구성요소의 하나인 네트워크 소프트웨어는 거래기업 간 상호 데이터의 인식이 가능하도록 변환해 주는 기능 을 수행한다.","4":"EDI 시스템 구축은 종이 없는 업무환경이 가능하도록 지 원해 준다.","5":"애플리케이션 소프트웨어는 각각의 컴퓨터간 데이터의 전송을 가능하게 해주는 기능을 제공한다."},"ans":3},{"year":"2024년 1회","num":80,"subj":"유통정보","q":"유통업체에서 업무에 활용하고 있는 데이터시각화에 대한 설명으로 가장 옳은 것은?","opts":{"1":"정보 시각화는 데이터를 활용하여 객관적인 사실을 통계 표, 그래프, 이미지 등을 통해 요약적으로 표현하여 주어 직관적 통찰력을 높여 준다.","2":"인포그래픽은 과학적 현상의 시각화로 컴퓨터 과학의 한 부분인 컴퓨터 그래픽의 하위 집합으로 간주한다.","3":"과학적 시각화는 다량의 정보를 차트, 지도 다이어 그램, 로고, 일러스트레이션 등을 활용하여 정적으로 만들어 한눈에 파악할 수 있게 해준다.","4":"인포그래픽은 공학, 통계학, 수학 등을 이용해 데이터 분 석기능을 제공하는 통계 분석도구이다.","5":"도수분포를 그래프로 나타낸 것은 산포도이다."},"ans":1},{"year":"2024년 1회","num":81,"subj":"유통정보","q":"유통업체에서 활용하는 간편결제 방식에 대한 설명으로 가 장 옳은 것은?","opts":{"1":"온라인과 오프라인 상거래에서 빠르고 간편하게 결제하 는 전자결제 서비스이다.","2":"스마트워치 기기에 저장된 생체정보, 신용카드 정보 등 을 이용하여 결제되는 경우 반드시 2차 인증 수단을 추 가로 인증해야 사용할 수 있다.","3":"우리나라는 간편결제 서비스에 활용되는 QR코드 발급 시 개인·신용정보를 포함할 수 있도록 규정하고 위변조 방지 기술을 반드시 적용하도록 하고 있다.","4":"다른 방식의 결제 서비스에 비해 상대적으로 접속 속도 가 느리고 복잡하지만 높은 보안성을 확보하고 있다.","5":"간편결제 편의성과 안전성을 높이기 위해서 모바일 결제 시 QR코드 방식은 지원하지 않는다."},"ans":1},{"year":"2024년 1회","num":82,"subj":"유통정보","q":"우리나라의 바코드(EAN-13) 인쇄에 대한 내용으로 가장 옳 지 않은 것은?","opts":{"1":"바코드는 백색 바탕에 흑색 바코드를 권장하는 등 주로 밝은색 바탕에 어두운색 바를 사용할 것을 권장한다.","2":"일반적인 경우 상품 뒷면 오른쪽 아래 사분면에 인쇄하 도록 하며 어떠한 판독 방해물도 없도록 한다.","3":"묶음 상품인 경우 개별 상품의 바코드가 반드시 보이도 록 하고, 별도의 바코드를 부착한다.","4":"구석, 접지면, 주름진 곳은 피하고, 가능한 매끄러운 면 에 인쇄한다.","5":"형태가 원통형인 경우 제품을 똑바로 세웠을 때 측면에 인쇄하되 바코드 막대가 지면과 수평이 되도록 인쇄한 다."},"ans":3},{"year":"2024년 1회","num":84,"subj":"유통정보","q":"유통정보혁명 시대에 있어서 유통업체에 요구되는 발전전략 으로 가장 옳지 않은 것은?","opts":{"1":"특화된 고객전략에서 불특정 다수를 위한 고객전략으로 의 전환","2":"비용중심의 운영전략에서 시간중심의 운영전략으로의 전 환","3":"개별 기업중심의 경영체제에서 통합 공급체인 경영체제 로의 전환","4":"유통업의 기본개념을 제품유통 위주에서 정보유통 위주 의 전략으로의 전환","5":"기술우위의 기본개념을 신제품 개발 위주에서 정보 시스 템 및 네트워크 위주의 전략으로의 전환"},"ans":1},{"year":"2024년 1회","num":85,"subj":"유통정보","q":"아래 글상자의 괄호 안에 들어갈 용어로 가장 옳은 것은?","opts":{"1":"㉠ e-마켓플레이스, ㉡ 옴니채널","2":"㉠ 오픈마켓, ㉡ 초연결화","3":"㉠ e-온디맨드, ㉡ 옴니채널","4":"㉠ 옴니채널, ㉡ 온디맨드","5":"㉠ 오픈마켓, ㉡ 온디맨드"},"ans":4,"img":["boxes/2024_1_85.png"]},{"year":"2024년 1회","num":88,"subj":"유통정보","q":"아래 글상자에서 설명하는 용어로 가장 옳은 것은?","opts":{"1":"디지털 전환","2":"4차 산업혁명","3":"BPI(business process innovation)","4":"IoT(internet of things)","5":"IoE(internet of everything)"},"ans":1},{"year":"2024년 1회","num":89,"subj":"유통정보","q":"유통업체에서 많이 활용되고 있는 정보기술에 대한 설명으 로 가장 옳지 않은 것은?","opts":{"1":"HS(harmonized system)코드는 GS1(global standard #1), GTIN(global trade item number) 표준과 함께 국 내 또는 국외로 유통되는 상품을 식별하기 위해 사용되 는 유통표준코드이다.","2":"POS(point of sales)시스템을 이용하면 품목별 판매실적 과 단품별 판매동향을 파악할 수 있다.","3":"RFID(radio frequency identification) 기술은 무선통신을 활용하는 기술이다.","4":"RFID(radio frequency identification) 기술은 바코드 기 술과 비교해 볼 때, 초기 구축 비용이 많이 발생하는 단 점이 있다.","5":"RFID(radio frequency identification) 기술은 데이터 변 환 및 저장이 용이하다."},"ans":1},{"year":"2024년 2회","num":1,"subj":"유통물류일반","q":"아래 글상자 괄호 안에 알맞은 유통기관이 창출하는 가치를 순서대로 바르게 나열한 것은?","opts":{"1":"㉠ 탐색의 가치, ㉡ 거래횟수의 감소","2":"㉠ 형태의 가치, ㉡ 탐색의 가치","3":"㉠ 장소의 가치, ㉡ 형태의 가치","4":"㉠ 형태의 가치, ㉡ 거래횟수의 감소","5":"㉠ 장소의 가치, ㉡ 탐색의 가치"},"ans":3,"img":["boxes/2024_2_1.png"]},{"year":"2024년 2회","num":2,"subj":"유통물류일반","q":"아래 글상자의 괄호 안에 들어갈 유통의 기능으로 가장 옳은 것은?","opts":{"1":"운송기능 ② 보관기능","2":"","3":"표준화기능 ④ 정보제공기능","4":"","5":"위험부담기능"},"ans":3,"img":["boxes/2024_2_2.png"]},{"year":"2024년 2회","num":3,"subj":"유통물류일반","q":"아래 글상자에서 제조업자를 위한 도매상의 기능 설명으로 옳은 것을 모두 고르면?","opts":{"1":"㉠ ② ㉠, ㉡","2":"","3":"㉠, ㉡, ㉢ ④ ㉠, ㉡, ㉢, ㉣","4":"","5":"㉠, ㉡, ㉢, ㉣, ㉤"},"ans":5,"img":["boxes/2024_2_3.png"]},{"year":"2024년 2회","num":5,"subj":"유통물류일반","q":"유통업이 산업전반에 가져오는 경제적 역할에 대한 설명으로 옳지 않은 것은?","opts":{"1":"다양한 소비자의 욕구를 충족시켜줄 수 있는 소비문화를 발전시킨다.","2":"유통구조의 효율화를 통한 가격안정에 기여한다.","3":"다양한 유통업을 통해 고용창출 효과를 가져온다.","4":"생산자와 소비자를 연결시켜 주는 역할을 한다.","5":"제조업 전체의 경쟁력을 제고시키는 산업발전을 도모한 다."},"ans":1},{"year":"2024년 2회","num":6,"subj":"유통물류일반","q":"유통업태의 발전에 관한 이론으로 옳은 것은?","opts":{"1":"아코디언이론이 초점을 두고 있는 부분은 가격과 마진이 다.","2":"소매차륜이론은 상품믹스에만 초점을 맞추어 설명하는 한 계가 있다.","3":"소매수명주기이론은 한 소매기관이 등장해서 사라지는 과 정을 진입단계, 발전단계, 쇠퇴단계로 설명한다.","4":"진공지대이론은 소비자는 점포가 제공하는 서비스의 수준 과 상품의 가격에 영향을 받는다고 설명한다.","5":"변증법적이론은 장점을 가진 새로운 경쟁자가 출현하는 경우 기존의 소매업태는 완전히 모방하는 전략을 취한다 고 설명한다."},"ans":4},{"year":"2024년 2회","num":7,"subj":"유통물류일반","q":"아래 글상자 내용 중 변혁적 리더십과 관련된 내용으로만 나 열한 것을 모두 고르면?","opts":{"1":"㉠, ㉡, ㉢ ② ㉠, ㉢, ㉣","2":"","3":"㉠, ㉣, ㉤ ④ ㉡, ㉢, ㉣","4":"","5":"㉡, ㉢, ㉣, ㉤"},"ans":3,"img":["boxes/2024_2_7.png"]},{"year":"2024년 2회","num":8,"subj":"유통물류일반","q":"풀(Pull) 요인 관련 유통기업들이 글로벌 신규시장으로 진입 할 때의 위협요인으로 옳지 않은 것은?","opts":{"1":"통화의 차이가 발생한다.","2":"해외정부의 제약조건이 있다.","3":"문화적 차이는 존재하지 않는다. 격증 기출문제 전자문제집 CBT : www.comcbt.com","4":"","5":""},"ans":3},{"year":"2024년 2회","num":9,"subj":"유통물류일반","q":"유통산업 구조변화 요인 중 하나인 유통정보시스템 설명으로 옳지 않은 것은?","opts":{"1":"협의의 POS 시스템은 판매시점에서 어떤 상품이 얼마나 판매되었는지 판매정보를 파악 및 관리하는 시스템을 말 한다.","2":"광의의 POS 시스템은 판매정보 뿐만 아니라 발주, 재고, 배송, 매입 등 소매점포 안에서 발생하는 모든 정보를 관 리하는 시스템을 말한다.","3":"전자데이터교환은 기업 간에 주문을 하거나 대금청구 또 는 결재 등의 다양한 업무를 처리할 때 컴퓨터로 처리할 수 있도록 구조화되어 있다.","4":"데이터마이닝은 데이터베이스나 데이터웨어하우스로부터 고객의 연관성, 구매패턴, 성향 등 유용한 정보들을 추출 하는 역할을 한다.","5":"ERP는 표준화된 양식으로 전자문서교환을 통해 서로 간 처리할 데이터를 교환하는 시스템을 말한다."},"ans":5},{"year": 인 관계가 발생하는 경우 수 익을 중심으로 비교하여 선택하는 방법이다.","2":"일률적인 계산방식보다 상황에 맞는 계산방식을 활용한 다.","3":"물류의 원가로는 미래원가, 실제원가를 사용한다.","4":"총비용접근분석법은 각 비용의 부분적인 절감이 아닌 총 액의 관점에서 비용절감에 대해 분석하는 방법이다.","5":"개선이나 투자가 필요한 부분을 대상으로 실시한다."},"ans":1},{"year":"2024년 2회","num":25,"subj":"유통물류일반","q":"유통산업발전법(시행 2023.6.28., 법률 제19117호, 2022. 12.27., 타법개정) 상 상점가진흥조합에 대한 지원 내용으로 옳지 않은 것은?","opts":{"1":"점포시설의 표준화 및 현대화","2":"상품의 매매ㆍ보관ㆍ수송ㆍ검사 등을 위한 공동시설의 설치","3":"주차장ㆍ휴게소 등 공공시설의 설치","4":"판매원의 판매촉진을 위한 공동사업","5":"가격표시 등 상거래질서의 확립"},"ans":4},{"year":"2024년 2회","num":28,"subj":"상권분석","q":"신규점포에 대한 입지후보지 상권을 분석하고자 할 때, 그 상권에 대한 상권범위를 추정하는데 사용할 수 있는 기법이 아닌 것은?","opts":{"1":"회귀분석(regression analysis)","2":"체크리스트법(check-list method)","3":"유사점포법(analog method)","4":"허프(Huff)모델","5":"고객분포기법(CST: customer spotting technique)"},"ans":2},{"year":"2024년 2회","num":29,"subj":"상권분석","q":"프랜차이즈를 통한 출점이 가맹점(franchisee)인 소매점에게 제공하는 이점으로서 가장 옳은 것은?","opts":{"1":"무임승차 ② 규모의 경제","2":"","3":"로열티(royalty) 수입 ④ 사업 확장의 용이성","4":"","5":"개점ㆍ운영의 용이성"},"ans":5},{"year":"2024년 2회","num":30,"subj":"상권분석","q":"아래 글상자의 괄호 안에 들어갈 내용으로 가장 옳은 것은?","opts":{"1":"㉠ 상권에 영향을 미치는 요인들","2":"㉡ CST(customer spotting technique) map","3":"㉢ 유사점포의 임대료 수준","4":"㉣ 점포 레이아웃 계획","5":"㉤ 소비자들의 점포선택확률"},"ans":2,"img":["boxes/2024_2_30.png"]},{"year":"2024년 2회","num":31,"subj":"상권분석","q":"상권의 특성은 상권의 유형에 따라 서로 다르게 나타난다. 주변환경을 중심으로 상권을 분류할 때 상권의 유형과 일반 적인 상권특징에 대한 설명으로 옳지 않은 것은?","opts":{"1":"역세권 상권 – 역세권 상권의 범위는 역을 중심으로 일 정한 거리나 이동시간으로 정해져 있지 않으며 역의 규 모, 시설 및 기능, 주변 개발상황, 다른 교통수단과의 연 계성 등에 따라 다르게 설정될 수 있다.","2":"아파트상권 – 점포 공급의 적정성을 판단하기 위해 세대 당 상가면적을 검토해야 한다. 다른 단지나 인근 주택가 와의 연계성이 높지 않은 경우가 많아 일반적으로 단지 규모가 클수록 좋은 입지조건으로 판단한다.","3":"주택가상권 – 단독주택, 다가구 또는 다세대주택 등의 주거형태로 이루어진다. 유동인구 보다는 인근 거주자를 중심으로 소비자가 한정되는 경우가 많고 아파트상권과 달리 근린상업지역에 해당된다.","4":"사무실상권 – 사무실밀집지역에 형성된 상권을 의미하며 지역 내 거주인구가 적고 주로 직장인을 상대하므로 구 매 패턴이 일정하고 매출이 점심시간이나 퇴근시간의 짧 최강 자격","5":""},"ans":3},{"year":"2024년 2회","num":32,"subj":"상권분석","q":"상권설정에 비교적 간편하게 응용할 수 있는 상권구획모형 인 티센다각형(Thiessen Polygon)에 대한 설 거에 수집되어 이미 존재하는 자료이 다.","3":"1차 자료(primary data)는 당면한 조사목적을 달성하기 위하여 조사자가 직접 수집한 자료이다.","4":"모든 마케팅 조사에는 2차 자료(secondary data)가 필수 적으로 제시되어야 한다.","5":"탐험 조사(exploratory research)는 조사문제가 불명확할 때 기본적인 통찰과 아이디어를 얻기 위해 실시되는 조 사이다."},"ans":4},{"year":"2024년 2회","num":67,"subj":"유통마케팅","q":"유통경로의 성과평가를 위한 항목 중 유통경로의 효과성에 대한 평가항목으로 가장 옳지 않은 것은?","opts":{"1":"고객의 전반적인 만족도","2":"신시장 개척 건수 및 비율","3":"중간상의 거래 전환 건수","4":"단위당 총 물류비용","5":"클레임(claim) 건수"},"ans":4},{"year":"2024년 2회","num":68,"subj":"유통마케팅","q":"격자형(grid) 레이아웃에 대한 설명으로 옳지 않은 것은?","opts":{"1":"고객들의 주 통로와 직각을 이루고 있는 여러 단으로 구 성된 선반들이 평행으로 늘어서 있는 형태의 레이아웃을 의미한다.","2":"고객들의 주 통로와 여러 점포들의 입구가 연결되어 있 는 형태의 레이아웃을 의미한다.","3":"대형마트, 편의점, 전문점 등 다양한 소매 업태에서 주로 활용되고 있다.","4":"상품을 쉽게 찾을 수 있고, 고객들의 질서 있는 이동을 촉진시켜 공간을 효율적으로 사용할 수 있는 장점이 있 다.","5":"딱딱하고 사무적인 분위기를 연출하는 단점이 있다."},"ans":2},{"year":"2024년 2회","num":70,"subj":"유통마케팅","q":"점포 구성요소에 관한 내용으로 가장 옳지 않은 것은?","opts":{"1":"점포 입지와 매장 배치의 편리성","2":"점포 외관 이미지와 점포 내부 인테리어","3":"목표 소비자의 이미지와 분위기","4":"목표 고객에게 소구하는 상품 구성과 적합한 가격대","5":"점포의 기본 설비와 시설, 진열집기 및 디스플레이"},"ans":3},{"year":"2024년 2회","num":71,"subj":"유통마케팅","q":"대표적인 반정형데이터로, 웹과 컴퓨터 프로그램에서 용량 이 적은 데이터를 교환하기 위해 데이터 객체를 속성 (attribute)과 값(value)의 쌍 형태로 나열해서 표현하는 형식 을 지칭하는 용어로 가장 옳은 것은?","opts":{"1":"JSON ② XML","2":"","3":"API ④ FILES","4":"","5":"LOG"},"ans":1},{"year":"2024년 2회","num":72,"subj":"유통마케팅","q":"아래 글상자의 괄호 안에 들어갈 정보기술로 가장 옳은 것 은?","opts":{"1":"블록체인 ② 무인로봇","2":"","3":"인공지능 ④ 모빌리티","4":"","5":"메타버스"},"ans":3,"img":["boxes/2024_2_72.png"]},{"year":"2024년 2회","num":75,"subj":"유통마케팅","q":"유통업체에서의 CRM 시스템 활용에 대한 설명으로 옳지 않 은 것은?","opts":{"1":"유통업체에서는 CRM 시스템을 활용해서 신규고객 창출, 기존고객 유지, 충성고객 개발에 활용하고 있다.","2":"유통업체에서 CRM 시스템은 장기적인 측면보다는 철저 하게 단기적인 측면에서 매출 증대를 위해 활용되고 있 다.","3":"CRM 시스템은 고객 데이터에 대한 다양한 분석을 통해 고객에 대한 이해도를 높여준다.","4":"CRM 시스템은 유통업체의 경쟁우위 창출에 도움을 제공 한다.","5":"CRM 시스템은 유통업체의 판매, 서비스, 영업 업무 수 행에 도움을 제공한다."},"ans":2},{"year":"2024년 2회","num":76,"subj":"유통정보","q":"판매시점관리시스템에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"판매 시점의 정보를 실시간으로 취합해서 관리할 수 있 도록 지원하는 시스템이다.","2":"유통업체의 경우 인기제품, 비인기 제품의 신속한 파악 이 가능하고, 실시간으로 재고 파악이 가능하다.","3":"판매시점에 시스템을 통한 정보 입력으로 처리속도 증 진, 오타 및 오류 방지 등의 효과를 얻을 수 있다.","4":"품목별 판매실적, 판매실적 구성비 등 판매시점관리시스 템에 누적된 판매정보로 다양한 분석이 가능하다.","5":"상품 판매 정보만 관리하기 때문에 고객분석에는 활용되 지 않는다."},"ans":5},{"year":"2024년 2회","num":78,"subj":"유통정보","q":"아래 글상자의 신규고객 창출 과정을 순서대로 제시한 것으 로 가장 옳은 것은?","opts":{"1":"㉠ - ㉡ - ㉢ - ㉣ - ㉤","2":"㉠ - ㉡ - ㉣ - ㉤ - ㉢","3":"㉠ - ㉢ - ㉡ - ㉣ - ㉤","4":"㉡ - ㉢ - ㉤ - ㉣ - ㉠","5":"㉤ - ㉡ - ㉢ - ㉠ - ㉣"},"ans":1,"img":["boxes/2024_2_78.png"]},{"year":"2024년 2회","num":79,"subj":"유통정보","q":"QR코드에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"QR코드는 일본 도요타 자동차의 자회사 덴소 웨이브가 표준화한 기술이다.","2":"Micro QR코드의 가장 큰 특징은 위치 찾기 심볼이 하나 인 것이며, QR코드보다 더 작은 공간에 인쇄할 수 있다.","3":"iQR코드는 종래의 QR코드보다 더 많은 정보량을 저장할 수 있다.","4":"QR코드는 오류복원 기능을 가지고 있어서 일부 코드가 손상되더라도 데이터를 복원할 수 있다.","5":"데이터의 양이 증가해도 QR코드를 구성하는 셀(cell)은 정해져 있기 때문에 QR코드의 크기는 일정하다."},"ans":5},{"year":"2024년 2회","num":80,"subj":"유통정보","q":"EDI 도입에 따른 효과에 대한 내용으로 가장 옳지 않은 것 은?","opts":{"1":"업무처리 비용 절감","2":"표준화와 암호화로 조직 내 또는 조직 간 연결성 낮춤","3":"고객관계의 증진","4":"문서거래시간의 단축","5":"업무처리 오류 감소"},"ans":2},{"year":"2024년 2회","num":81,"subj":"유통정보","q":"전자상거래에서의 프라이버시 보호행동에 대한 설명으로 가 장 옳지 않은 것은?","opts":{"1":"일반적으로 전자상거래 고객들은 프라이버시에 대한 염 려가 발생하면, 프라이버시를 보호하려는 행동을 한다. 전자상거래 고객들의 프라이버시 보호에 대한 반응은 정 보제공 활동, 개인 활동, 공개 활동으로 구분할 수 있다.","2":"전자상거래 고객의 프라이버시 보호에 대한 방어적인 태 도는 마케팅 담당자가 감수해야 할 비용을 감소시키고, 기업의 고객관계관리 활동을 보다 효과적으로 촉진되도 록 도움을 제공한다.","3":"전자상거래 고객들이 프라이버시에 대한 염려를 회피하 기 위한 대표적인 정보제공 활동으로는 개인정보제공을 거부하는 행동이다.","4":"전자상거래 고객들이 프라이버시에 대한 염려를 회피하 기 위한 대표적인 개인 활동으로는 개인정보 제공이 위 험하다고 이야기하는 행동이다.","5":"전자상거래 고객들이 프라이버시에 대한 염려를 회피하 기 위한 대표적인 공개 활동으로는 기업에 직접적으로 불평하는 행동이다."},"ans":2},{"year":"2024년 2회","num":83,"subj":"유통정보","q":"u커머스(ubiquitous commerce)의 특징 중에서 아래 글상자 의 내용에 부합하는 특성으로 가장 옳은 것은?","opts":{"1":"보편성 ② 접근성","2":"","3":"조화성 ④ 차별성","4":"","5":"편재성"},"ans":1,"img":["boxes/2024_2_83.png"]},{"year":"2024년 2회","num":84,"subj":"유통정보","q":"고객이 주문한 상품이 목적지에 도착하기까지의 과정에서 고객 만족도 증대를 위해 유통업체가 활용하는 배송 품질차 별화 전략으로 가장 옳은 것은?","opts":{"1":"푸시 전략","2":"퍼스트 마일 배송 전략","3":"스마트 로지스틱 전략","4":"라스트 마일 배송 전략","5":"공급망 동기화 전략"},"ans":4},{"year":"2024년 2회","num":85,"subj":"유통정보","q":"아래 글상자 설명은 유통업체의 정보시스템 구현과 관련된 설명이다. 괄호 안에 들어갈 개념으로 가장 옳은 것은?","opts":{"1":"서비스 수준관리 ② 엣지 컴퓨팅","2":"","3":"블록체인 ④ 분산 처리","4":"","5":"가상화 기술"},"ans":5,"img":["boxes/2024_2_85.png"]},{"year":"2024년 2회","num":86,"subj":"유통정보","q":"오늘날 유통업체에서는 마케팅을 위해서 메타버스를 활용하 고 있다. 메타버스에 대한 설명으로 적절하지 않은 것은?","opts":{"1":"가속연구재단(ASF: Acceleration Studies Foundation)은 메타버스 서비스를 정보표현 형태(외부 환경 정보와 개 인/개체 중심 정보)와 공간활용 특성(현실공간과 가상공 간)에 따라 4가지로 구분하였다.","2":"가상현실은 현실 세계에 가상의 정보를 증강하여 서비스 를 제공하는 메타버스 유형이다.","3":"라이프로깅은 개인 및 개체들에 대한 현실생활의 정보를 가상세계에 증강하여 정보를 통합 제공하는 메타버스유 형이다.","4":"거울세계는 가상세계에서 외부의 환경정보를 통합하여 서비스를 제공하는 메타버스 유형으로 실제세계의 디지 털화라 할 수 있다.","5":"가상세계는 가상공간에서 다양한 개인 및 개체들의 정보 를 제공하는 메타버스 유형이다. 최강 자격"},"ans":2},{"year":"2024년 2회","num":87,"subj":"유통정보","q":"인공지능이 비즈니스에서 필요한 이유로 가장 옳지 않은 것 은?","opts":{"1":"인공지능은 인간 전문가가 가지는 시간적ㆍ공간적 한계 를 뛰어넘을 수 있도록 전문지식을 저장하여 상황에 적 절한 의사결정을 내리도록 도움을 준다.","2":"생성형AI를 활용한 프롬프트 형태의 서비스는 문제해결 에 도움이 되는 정보를 짧은 시간에 얻을 수 있어 업무 효율을 높여주는 효과를 얻을 수 있다.","3":"강한인공지능을 활용한 사례인 알파고, 닥터와슨 등은 인간을 뛰어넘는 결정을 지원하기 때문이다.","4":"약한인공지능 기술은 특정분야에 인간의 지능을 흉내내 어 신속하게 문제를 해결할 수 있는 방안을 제시해 준 다.","5":"복잡한 상황에서 빠른 판단과 결정에 도움이 되는 결과 를 받을 수 있어 의사결정에 활용할 수 있다."},"ans":3},{"year":"2024년 2회","num":89,"subj":"유통정보","q":"기업들이 소셜 미디어 플랫폼에서 이루어지는 브랜드, 제품, 산업, 또는 특정 주제와 관련된 온라인 대화, 토론, 언급에 관심을 가지고 데이터 수집ㆍ분석을 통해 고객의 니즈를 파 악하고 통찰력을 얻는 활동을 수행하고 있다. 이러한 활동 을 가리키는 용어로 가장 옳은 것은?","opts":{"1":"SNPS(Social Net Promoter Score)","2":"FGI(Focus Group Interview)","3":"소셜리스닝(Social Listening)","4":"워크숍(Workshop)","5":"SOV(Share of Voice)"},"ans":3},{"year":"2024년 2회","num":90,"subj":"유통정보","q":"고객충성도 프로그램 유형의 하나로 아래 글상자에서 설명 하는 서비스 제도의 종류로 가장 옳은 것은?","opts":{"1":"공동(cooperate)","2":"머천다이징(merchandising)","3":"메인터넌스(maintenance)","4":"컨비니언스(convenience)","5":"프라이비트(private) 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":2,"img":["boxes/2024_2_90.png"]},{"year":"2024년 3회","num":1,"subj":"유통물류일반","q":"중간상이 필요한 이유 중 집중준비의 원리에 대한 설명으로 가장 옳은 것은?","opts":{"1":"제조업자는 생산을, 유통업자는 유통을 전문화함으로써 보다 효율적이고 경제적일 수 있다.","2":"유통경로 상에 가능하면 많은 수의 도매상을 개입시켜서 경로구성원에 의해 보관되는 제품의 총량을 감소시킬 수 있다.","3":"중간상에게 유통기능을 분담시키는 것이 비용면에서 훨씬 유리할 수 있다.","4":"중간상이 참여하면 생산자와 소비자 간의 거래빈도수를 감소시켜 거래비용을 절감할 수 있다.","5":"소비자가 원하는 상품을 항상 준비하여 24시간 구매할 수 있는 편의점처럼 시간 효용을 제공한다."},"ans":2},{"year":"2024년 3회","num":2,"subj":"유통물류일반","q":"유통경로 상에서 수행되는 유통의 기능 중 거래 및 물적유통 이 원활하게 이루어지도록 보조하는 조성기능에 해당되지 않 는 것은?","opts":{"1":"소비자 또는 생산자에게 자금을 대부함으로써 거래를 원 활하게 하는 기능","2":"재고유지 및 상품의 진부화를 포함한 여러 가지 위험을 부담하는 기능","3":"예상판매량, 가격정보, 소비자 정보 등을 생산자에게 제공 하는 기능","4":"생산시점과 소비시점의 차이를 연결함으로써 장소 효용을 창조하는 기능","5":"상품을 품질 수준에 따라 분류하거나 규격화하는 기능"},"ans":4},{"year":"2024년 3회","num":3,"subj":"유통물류일반","q":"소매업 발전이론 중 아래 글상자의 괄호 안에 들어갈 이론을 순서대로 나열한 것으로 옳은 것은?","opts":{"1":"㉠ 변증법적 이론, ㉡ 진공지대 이론","2":"㉠ 소매상 적응행동 이론, ㉡ 진공지대 이론","3":"㉠ 소매상 수레바퀴 이론, ㉡ 변증법적 이론","4":"㉠ 소매상 수레바퀴 이론, ㉡ 소매점 아코디언 이론","5":"㉠ 소매점 아코디언 이론, ㉡ 소매상 적응행동 이론"},"ans":4,"img":["boxes/2024_3_3.png"]},{"year":"2024년 3회","num":4,"subj":"유통물류일반","q":"구매의 전략적 중요성과 시장의 복잡성을 기준으로 공급업체 를 세분화하는 기법으로 옳은 것은?","opts":{"1":"공급업체 세분화 풍차","2":"Same Page 프레임워크","3":"균형성과지표","4":"크랄직 매트릭스(Kraljic Matrix)","5":"SWOT 분석표"},"ans":4},{"year":"2024년 3회","num":6,"subj":"유통물류일반","q":"디지털기술의 발전으로 인한 유통산업의 환경변화에 대한 설 명으로 가장 옳지 않은 것은?","opts":{"1":"소매기술을 통해 온라인과 오프라인을 결합한 쇼핑경험을 제공할 수 있다.","2":"온라인과 오프라인의 경계 구분이 무의미할 정도로 온·오 프융합시대로 접어들고 있다.","3":"경쟁도구로서 첨단기술의 중요성이 증가하고 있다.","4":"플랫폼 기반의 유통비즈니스가 주목받고 있다.","5":"옴니채널의 등장으로 업태 간 경쟁은 해소되었지만 업태 내 경쟁은 격화되었다."},"ans":5},{"year":"2024년 3회","num":7,"subj":"유통물류일반","q":"환경분석을 통해 소매업체가 추구할 수 있는 다양한 성장 전 략에 관한 설명으로 가장 옳지 않은 것은?","opts":{"1":"시장침투를 증가시키기 위해서는 표적시장에 보다 많은 점포를 개설하거나 기존 점포의 영업시간을 늘리기도 한 다.","2":"고객에게 드레스를 판매한 후 그에 어울릴 스카프를 판매 하는 교차판매는 시장다각화전략의 예이다.","3":"관련다각화는 현재의 표적시장과 새로운 사업기회가 공통 점이 있는 경우로 동일한 물류시스템을 활용하기도 한다.","4":"PB를 기획하던 소매업체가 생산 공장을 소유하는 것은 일종의 수직적 통합이다." 으로써 드러나지 않은 특성을 구 체화할 수 있다.","4":"예측하고자 하는 효과에 대한 가설을 세우고 검증하는 조사로 다양한 가설을 검증해 볼 수 있다.","5":"대부분 직접 자료를 수집하여 정량적 인과관계를 분석하 기 때문에 상대적으로 시간과 비용을 단축할 수 있다."},"ans":1},{"year":"2024년 3회","num":61,"subj":"유통마케팅","q":"다음 중 가격경쟁을 최소화할 수 있다는 장점과 고객측면을 전혀 고려하지 않는다는 단점을 동시에 가지고 있는 가격결 정 방법으로 가장 옳은 것은?","opts":{"1":"원가기준법 ② 목표수익률기준법","2":"","3":"경쟁기준법 ④ 지각된 가치기준법","4":"","5":"수요기준법"},"ans":3},{"year":"2024년 3회","num":62,"subj":"유통마케팅","q":"관계지향적 판매방식에 관한 내용으로 가장 옳지 않은 것 은?","opts":{"1":"판매보다는 고객 요구를 이해하는 데 초점을 맞춘다.","2":"설득, 화술, 가격 조건 등을 통해 신규고객을 확보하고 매출을 늘리고자 노력한다.","3":"제품에 대해 설명하는 데 치중하기보다는 고객의 욕구를 이해하고 문제를 해결하는 데 중점을 둔다.","4":"상호 신뢰와 신속한 반응을 통해 고객과 장기적인 관계 를 형성하고자 한다.","5":"단기적인 매출은 낮아질 수 있으나, 장기적인 매출은 높 아지는 것이 일반적이다. 최강 자격"},"ans":2},{"year":"2024년 3회","num":63,"subj":"유통마케팅","q":"점포를 구성하는 물리적 환경의 역할에 대한 설명으로 옳지 않은 것은?","opts":{"1":"패키지: 제품의 패키지가 소비자의 감각적 반응에 호소 하도록 고안된 것처럼 물리적 환경은 점포의 첫인상을 만들거나 고객의 기대를 설정하는 역할을 한다.","2":"편의제공: 환경 내에서 활동하는 사람들의 성과를 돕는 역할을 한다.","3":"사회화: 잘 갖춰진 물리적 환경은 고객과 직원으로 하여 금 기대된 역할과 행동을 하도록 돕는다.","4":"차별화: 물리적 환경을 통해서 기업은 경쟁자와 차별화 할 수 있고, 이를 통해 의도된 고객 세분화가 가능하다.","5":"지표화: 이용 가능한 공간의 크기, 공간 내 사람의 수 등 에 대한 객관적 평가를 제공한다."},"ans":5},{"year":"2024년 3회","num":65,"subj":"유통마케팅","q":"매장 내부인테리어(interior) 관리에 대한 설명으로 가장 옳 지 않은 것은?","opts":{"1":"내부인테리어는 고객의 구매욕구를 적극적으로 유발할 수 있도록 구성한다.","2":"내부인테리어 중 향기와 음악은 고객의 기분에 영향을 미친다.","3":"파이프나 배관과 같은 매장의 설비물은 내부인테리어를 구성하는 데 영향을 주지 않는다.","4":"내부인테리어 중 매장의 온도는 고객의 기분에 영향을 미친다.","5":"내부인테리어 중 조명시설은 고객의 구매욕구에 영향을 미친다."},"ans":3},{"year":"2024년 3회","num":67,"subj":"유통마케팅","q":"고객관계관리(CRM)를 성공적으로 적용하기 위해서 고려해 야 하는 요인으로 옳지 않은 것은?","opts":{"1":"판매자를 중심으로 모든 거래 데이터가 통합되어야 한 다.","2":"고객 분석을 위한 고객의 상세정보가 수집되어야 한다.","3":"고객의 정의와 고객그룹별 관리 방침이 수립되어야 한 다.","4":"고객데이터의 분석 모형 개발 및 모형의 유효성 검증체 제가 갖추어져야 한다.","5":"고객 분석결과를 활용할 수 있도록 제반 업무절차가 정 립되고 시행되어야 한다."},"ans":1},{"year":"2024년 3회","num":68,"subj":"유통마케팅","q":"다음은 마케팅 조사와 관련된 내용이다. 가장 옳지 않은 것 은?","opts":{"1":"1차자료는 당면한 조사목적을 달성하기 위하여 조사자가 직접 수집한 자료이다.","2":"기술조사는 표적모집단이나 시장의 특성에 관한 자료를 수집 · 분석하고 결과를 기술하는 조사이다.","3":"2차자료는 당면한 조사목적이 아닌 다른 목적을 위해 과 거에 수집되어 이미 존재하는 자료이다.","4":"모든 마케팅 조사에는 2차자료가 반드시 필요하다.","5":"심층인터뷰는 조사문제가 불명확할 때 기본적인 통찰과 아이디어를 얻기 위해 실시되는 조사이다."},"ans":4},{"year":"2024년 3회","num":69,"subj":"유통마케팅","q":"아래 글상자에서 설명하는 평가 기법으로 가장 옳은 것은?","opts":{"1":"상시종업원당 총이익 ② 평당 총이익","2":"","3":"경로구성원 총자산 수익률 ④ 경로구성원 성과평가","4":"","5":"직접제품이익"},"ans":5,"img":["boxes/2024_3_69.png"]},{"year":"2024년 3회","num":70,"subj":"유통마케팅","q":"다단계 판매의 특징으로 옳지 않은 것은?","opts":{"1":"다단계 판매의 상품구색은 다양하지만, 일반적으로 양호 한 품질의 중저가 소비재를 중심으로 구성된다.","2":"다단계 판매에서 판매원의 수입은 자신 및 하위 판매원 의 판매액을 기초로 책정된다.","3":"다단계 판매는 신규 판매원에게 가입비, 교육비, 상품구 매비 등 과도한 가입비용을 요구한다.","4":"다단계 판매는 강제적인 재고부담이 없다.","5":"다단계 판매는 공제조합에 소비자피해보상보험 가입을 의무화하고 있다."},"ans":3},{"year":"2024년 3회","num":72,"subj":"유통마케팅","q":"QR코드에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"바코드와 동일한 양의 자료를 표현하려면 QR코드 사각 형 모양의 크기가 더 커야 한다.","2":"QR코드는 일부분이 손상되어도 바코드와 다르게 인식률 이 높은 편이다.","3":"QR코드는 바코드에 비해 저장할 수 있는 정보의 양이 많다.","4":"QR코드는 숫자, 영문자, 한글, 한자 등 다양한 데이터를 처리하는 것이 가능하다.","5":"QR코드는 360° 어느 방향에서든지 인식이 가능하다."},"ans":1},{"year":"2024년 3회","num":74,"subj":"유통마케팅","q":"노나카의 지식변환 4가지 유형과 그 설명이 가장 옳은 것 은?","opts":{"1":"사회화(socialization) - 생각이나 노하우를 언어나 그림 등의 형태로 표현한다.","2":"외부화(externalization) - 사제관계에서의 노하우 (know-how)를 전수 받는다.","3":"형식화(normalization) - 고객분석내용을 보고 고객행태 유형을 체득한다.","4":"내면화(internalization) - 인턴을 하면서 체득한 조직에 서의 바른 생활을 블로그에 올려 예비 인턴들에게 공유 한다.","5":"종합화(combination) - 형식지에서 형식지를 얻는다."},"ans":5},{"year":"2024년 3회","num":75,"subj":"유통마케팅","q":"유통업체에서 활용하고 있는 ERP 시스템에 대한 발전 순서 를 바르게 제시한 것은?","opts":{"1":"ERP → Extended ERP → MRP → MRPⅡ","2":"ERP → Extended ERP → MRPⅡ → MRP","3":"MRP → MRPⅡ → ERP → Extended ERP","4":"MRP → ERP → Extended ERP → MRPⅡ","5":"ERP → MRPⅡ → Extended ERP → MRP 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":3},{"year":"2024년 3회","num":76,"subj":"유통정보","q":"글로벌기업이 공급사슬관리상에서 복잡한 물류체계를 효율 적으로 운영하기 위해 추진하는 글로벌 물류전략 중 하나인 지연전략에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"지연전략은 재고를 일반적 수준으로 적게 보유할 수 있 게 한다.","2":"지연전략 이점을 최대한 활용하기 위해서는 중앙집중화 를 고려한 제품설계가 필요하다.","3":"지역적 매출량 예측이 전 세계 매출량을 예측하는 것보 다 어렵기 때문에 지연전략은 글로벌시장에서 효과적인 전략이다.","4":"지연전략은 재고 유연성을 확보하게 되는데, 그것은 동 일한 요소, 모듈 또는 플랫폼이 다양한 종류의 최종제품 에서 구현되는 것을 의미한다.","5":"지연전략은 공통 플랫폼, 요소 또는 모듈을 이용하여 제 품을 디자인하고 최종목적지 또는 고객 요구사항이 알려 질 때까지 최종조립을 늦추는 전략이다."},"ans":2},{"year":"2024년 3회","num":77,"subj":"유통정보","q":"공급사슬관리를 위한 QR시스템의 특징에 대한 설명으로 가 장 옳지 않은 것은?","opts":{"1":"QR은 제조업체 중심으로 신속한 대응을 핵심으로 한다.","2":"Harris et al.(1999)의 연구에 의하면 JIT에서 발전해 QR 의 개념이 형성되었고, QR이 발전해 ECR의 개념이 형 성되었다.","3":"QR은 유통업체 및 소매업체를 중심으로 효율적인 고객 대응을 위해 1993년 식품, 잡화, 슈퍼마켓 업계에서 출 현하였다.","4":"QR의 핵심은 생산자 사이에 걸쳐있는 유통경로 상의 제 약조건 및 재고를 줄임으로써 제품 공급사슬의 효율성을 극대화하는 데 있다.","5":"QR의 목적은 IT기술을 이용하여 조직의 효율성을 높이 고 공급사슬파트너와의 협업과 조화를 통하여 비용을 절 감하고, 수익을 창출하는 데 있다."},"ans":3},{"year":"2024년 3회","num":78,"subj":"유통정보","q":"전자서식교환(EDI)은 웹, 클라우드와 결합된 형태로 진화하 고 있다. EDI에 관련된 내용으로 가장 옳지 않은 것은?","opts":{"1":"기업 간 전자상거래 서식 또는 공공 서식을 서로 합의된 표준에 따라 표준화된 메시지 형태로 변환해 거래 당사 자끼리 통신망을 통해 교환하는 방식이다.","2":"통신 링크를 통해 한 컴퓨터 애플리케이션에서 다른 컴 퓨터 애플리케이션으로 사전 정의된 형식의 전자데이터 를 전송하는 방법이다.","3":"웹 EDI 서비스는 전세계 어디서나 이용가능하다는 장점 에 비해 고가의 특별한 접속 프로그램이 필요하며 보안 에 취약하다는 단점이 있다.","4":"EDI는 문서거래시간의 단축, 자료의 재입력 방지, 업무 처리의 오류감소 등의 직접적 효과가 있다.","5":"EDIFACT는 여러 행정, 상업 및 운송을 위한 전자 자료 교환이라는 뜻이다."},"ans":3},{"year":"2024년 3회","num":79,"subj":"유통정보","q":"아래 글상자의 신규고객 창출 프로세스를 순서대로 나열한 것으로 옳은 것은?","opts":{"1":"㉠-㉡-㉢-㉣-㉤-㉥ ② ㉠-㉡-㉢-㉤-㉣-㉥","2":"","3":"㉠-㉡-㉣-㉢-㉤-㉥ ④ ㉠-㉢-㉡-㉣-㉤-㉥","4":"","5":"㉠-㉢-㉣-㉡-㉤-㉥ 최강 자격"},"ans":1,"img":["boxes/2024_3_79.png"]},{"year":"2024년 3회","num":80,"subj":"유통정보","q":"아래 글상자에서 설명하는 전자지갑형 전자화폐로 가장 옳 은 것은?(문제 오류로 가답안 발표시 1번으로 발표되었지만 확정답안 발표시 1, 4, 5번이 정답처리 되었습니다. 여기서 는 가답안인 1번을 누르시면 정답 처리 됩니다.)","opts":{"1":"앤캐시 ② 뱅크타운","2":"","3":"아이캐시 ④ 애니카드","4":"","5":"사이버패스"},"ans":1,"img":["boxes/2024_3_80.png"]},{"year":"2024년 3회","num":81,"subj":"유통정보","q":"아래 글상자의 OECD 프라이버시 8대 원칙에 대한 설명 중 옳지 않은 것만을 나열한 것은?","opts":{"1":"㉠, ㉡ ② ㉠, ㉢","2":"","3":"㉠, ㉤ ④ ㉢, ㉣","4":"","5":"㉣, ㉤"},"ans":3,"img":["boxes/2024_3_81.png"]},{"year":"2024년 3회","num":83,"subj":"유통정보","q":"클라우드 컴퓨팅 서비스 지원 수준에 따라 구분된 유형으로 가장 옳은 것은?","opts":{"1":"개인용 컴퓨팅 환경, 클라이언트-서버 환경, 클라우드 컴퓨팅 환경","2":"IaaS(infrastructure as a service), PaaS(platform as a service), SaaS(software as a service)","3":"플랫폼, 운영체계, 디바이스","4":"운영체계, 응용 소프트웨어, 클라이언트","5":"클라우드, 엣지, 디바이스"},"ans":2},{"year":"2024년 3회","num":84,"subj":"유통정보","q":"메타버스를 구현하는 주요 기반 기술과 그 설명이 가장 옳 지 않은 것은?","opts":{"1":"XR(eXtended Reality) 기술 - 현실과 가상 세계를 연결 하는 인터페이스로, 현실과 가상세계의 공존을 촉진하고 몰입감 높은 가상융합 공간과 디지털 휴먼 등을 구현하 는 데 활용된다.","2":"디지털트윈 기술 - 가상세계에 현실세계를 3D로 복제하 고 동기화한 뒤 시뮬레이션·가상훈련 등을 통해 지식의 확장과 효과적 의사결정을 지원하는 데 활용된다.","3":"블록체인 기술 - 메타버스 창작물에 대한 저작권 관리, 사용자 신원 확인 및 데이터 프라이버시 보호, 콘텐츠 이용 내역 모니터링 및 저작권료 정산 등을 지원하는 데 활용된다.","4":"인공지능 기술 - 이용자 요구나 수요 변화에 따라 컴퓨 팅 자원을 유연하게 배분하여 활용된다.","5":"데이터 분석 기술 - 실세계 데이터 취득 및 유효성 검 증, 데이터 저장·처리·관리 등에 활용된다."},"ans":4},{"year":"2024년 3회","num":85,"subj":"유통정보","q":"아래 글상자의 융합기술 발전 2단계에 부합하는 사례만을 나열한 것으로 가장 옳은 것은?","opts":{"1":"IPTV, 휴대형 PC","2":"IPTV, 휴대형 PC, 지능형 자동차","3":"IT 융합건설, 지능형 자동차, 수중에너지 탐사로봇시스템","4":"IT 융합건설, 휴대형 PC, 수중에너지 탐사로봇 시스템","5":"IPTV, 지능형 자동차, 수중에너지 탐사로봇 시스템"},"ans":3,"img":["boxes/2024_3_85.png"]},{"year":"2024년 3회","num":87,"subj":"유통정보","q":"CRM 시스템에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"CRM 시스템은 신규고객 창출, 기존고객 유지, 기존 고 객 강화를 위해 이용된다.","2":"기업에서는 장기적 측면의 고객관계 강화보다는 단기적 측면의 고객관계 강화를 위해 CRM 시스템을 도입하고 있다.","3":"CRM 시스템은 다양한 측면의 고객 정보를 분석해 고객 에 대한 이해도를 높여준다.","4":"CRM 시스템은 유통업체의 경쟁우위 창출에 도움을 제공 한다.","5":"CRM 시스템은 고객유지율 개선 및 경영성과 개선을 위 해 고객정보를 활용한다."},"ans":2},{"year":"2024년 3회","num":88,"subj":"유통정보","q":"전사적자원관리(ERP)와 관련된 내용으로 가장 옳지 않은 것 은?","opts":{"1":"ERP의 목적은 통합관점에서의 정보자원관리이다.","2":"ERP는 회계, 재무, 조달, 프로젝트 관리, 공급망 관리 및 제조 같은 조직의 일상적인 비즈니스 활동을 전사적으로 지원한다.","3":"ERP는 여러 비즈니스 프로세스를 한데 묶어 각 프로세 스 간 데이터의 흐름을 가능하게 해준다.","4":"SaaS ERP는 온프레미스(on-premise) ERP에 비해 초기 착수 비용이 상대적으로 적게 소요된다.","5":"온프레미스(on-premise) ERP는 SaaS ERP에 비해 즉각 적인 확장성과 안정적 운영이 보장된다는 장점이 있다."},"ans":5},{"year":"2024년 3회","num":89,"subj":"유통정보","q":"아래 글상자의 괄호 안 "공급망의 원활한 운영을 방해하는 잠재적인 위험으로 가장 옳지 않은 것은?","opts":{"1":"채찍효과와 같은 수요 증폭을 유발하는 수요위험","2":"프로세스의 탄력성과 병목 현상 같은 프로세스위험","3":"날씨나 지정학적 격변과 같은 환경위험","4":"글로벌 소싱, 주요 공급업체에 대한 높은 의존도와 같은 공급위험","5":"기업의 평판 손실로 인한 통제위험"},"ans":5},{"year":"2025년 2회","num":19,"subj":"유통물류일반","q":"침투가격(penetration pricing) 전략이 적용되는 경우의 설명 으로 가장 옳지 않은 것은?","opts":{"1":"시장에 경험 효과가 존재하는 경우","2":"시장에 규모의 경제가 존재하는 경우","3":"수요의 가격탄력성이 크지 않은 경우","4":"단기간에 매출액과 시장점유율을 확보하고자 하는 경우","5":"대량판매를 통하여 높은 이익을 올릴 수 있다고 판단되 는 경우"},"ans":3},{"year":"2025년 2회","num":20,"subj":"유통물류일반","q":"정량주문법과 정기주문법을 비교한 설명으로 가장 옳은 것 은?","opts":{"1":"정량주문법은 고가품목에, 정기주문법은 저가품목에 상 대적으로 유리하다.","2":"정기주문법은 재고수준을 최소화시켜 품절위험을 낮출 수 있다.","3":"정량주문법은 여러 품목의 운송·발주를 통합해 비용 절 감이 가능하다.","4":"정기주문법은 주문비용 최적화가 가능하지만 과잉 재고 가 발생할 수 있다.","5":"정량주문법은 주문주기가 정해져 있고, 정기주문법은 불 규칙하다."},"ans":1},{"year":"2025년 2회","num":21,"subj":"유통물류일반","q":"POS(point of sales)시스템의 업무처리절차가 옳게 나열된 것은?","opts":{"1":"상품에 인쇄된 바코드를 스캐너가 판독 - 스토어 컨트 롤러에서 POS 시스템으로 발신 - 정보가 스토어 컨트 롤러로 송신 - 스토어 컨트롤러가 당일의 상품 판매 관 련 각종 보고서 작성 - 영수증 발행 및 인쇄","2":"상품에 인쇄된 바코드를 스캐너가 판독 - 정보가 스토어 컨트롤러에 송신 - 스토어 컨트롤러에서 POS 단말기로 발신 - 영수증 발행 및 인쇄 - 스토어 컨트 롤러가 당일 의 상품 판매 관련 각종 보고서 작성","3":"상품에 인쇄된 바코드를 스캐너가 판독 – 정보가 POS 단말기에 송신 - 영수증 발행 및 인쇄 - POS 단말기에 서 스토어 컨트롤러로 발신 - POS 단말기가 당일의 상 품 판매 관련 각종 보고서 작성","4":"상품에 인쇄된 바코드를 스캐너가 판독 - 정보가 스토어 컨트롤러에 송신 - 스토어 컨트롤러에서 POS 단말기로 발신 - 스토어 컨트롤러가 당일의 상품 판매 관련 각종 보고서 작성 - 영수증 발행 및 인쇄","5":"상품에 인쇄된 바코드를 스캐너가 판독 - 정보가 POS 단말기에 송신 - POS 단말기에서 스토어 컨트 롤러로 발신 - 스토어 컨트롤러가 당일의 상품 판매 관련 각종 보고서 작성 - 영수증 발행 및 인쇄"},"ans":2},{"year":"2025년 2회","num":23,"subj":"유통물류일반","q":"포장의 유형 중 목적별 분류에 대한 설명으로 가장 옳지 않 은 것은?","opts":{"1":"상업포장은 유통과정에서 물품보호 기능을 최우선으로 두고 포장한다.","2":"방청포장은 기계나 금속제품이 녹이 스는 것을 막기 위 한 포장으로 산소가 닿지 않게 포장한다.","3":"집합포장은 지게차 등 하역기기에 의한 작업이 용이 하 도록 포장단위별로 묶어서 포장한다.","4":"방습포장은 습기가 스며드는 것을 방지하는 것으로 의약 품이나 건조식품에 활용한다.","5":"완충포장은 내용물에 충격이 가해지는 것을 방지하기 위 해 외부 압력을 완화시키도록 포장한다."},"ans":1},{"year":"2025년 2회","num":24,"subj":"유통물류일반","q":"기업이 윤리경영을 실천해야 하는 이유로 가장 옳지 않은 것은?","opts":{"1":"기업의 활동이 윤리성을 바탕으로 이루어지면 기업 이미 지가 좋아지고 장기적으로 성장과 발전에 도움을 준다.","2":"기업의 비윤리적 행동에 대해 사회가 지불해야 하는 사 회적 비용의 규모가 커지고 있기 때문이다.","3":"기업윤리는 객관적인 윤리기준으로 업종에 상관없이 기 업이 지켜야할 구체적이고 통일된 기준이기 때문 이다.","4":"기업윤리를 소홀하게 다루는 기업은 궁극적으로 기업 경 영을 비효율적으로 만들기 때문이다.","5":"기업의 사회적 책임 중 하나인 기업윤리에 대한 사회의 기대와 요구가 점점 커지고 있기 때문이다."},"ans":3},{"year":"2025년 2회","num":25,"subj":"유통물류일반","q":"유통산업발전법(법률 제20444호, 2024. 9. 20., 일부 개정) 에 의한 유통관리사 관련 내용으로 가장 옳지 않은 것은?","opts":{"1":"유통관리사가 되려는 사람은 산업통상자원부장관이 실시 하는 유통관리사 자격시험에 합격하여야 한다.","2":"산업통상자원부장관은 거짓이나 그 밖의 부정한 방법으 로 유통관리사의 자격을 취득한 사람에 대하여 그 자격 을 취소하여야 한다.","3":"유통관리사의 등급, 유통관리사 자격시험의 실시방법ㆍ 응시자격ㆍ시험과목 및 시험과목의 면제나 시험 점수의 가산, 자격증의 발급 등에 필요한 사항은 대통령령으로 정한다.","4":"산업통상자원부장관 또는 지방자치단체의 장은 유통 관 리사를 고용한 유통사업자 및 유통사업자단체에 대하여 다른 유통사업자 및 사업자단체에 우선하여 자금 등을 지원할 수 있다.","5":"산업통상자원부장관은 다른 사람에게 유통관리사의 명의 를 사용하게 하거나 자격증을 빌려준 사람에 대하여 대 통령령으로 정하는 바에 따라 3개월 이내의 기간을 정하 여 자격을 정지할 수 있다."},"ans":5},{"year":"2025년 2회","num":28,"subj":"상권분석","q":"넬슨(R.L. Nelson)의 입지원칙 중에서 상호 보완관계에 있 는 점포가 서로 인접하여 있는 경우에 고객 흡인력을 높일 수 있다는 특성으로 병원 근처에 약국이 입지한다든가 식당 가 근처에 카페가 분포하는 것과 가장 관련이 높은 원칙은?","opts":{"1":"중간저지성 ② 누적적 흡인력","2":"","3":"양립성 ④ 접근가능성","4":"","5":"경쟁회피성"},"ans":3},{"year":"2025년 2회","num":29,"subj":"상권분석","q":"중심지 상권의 계층성을 설명하는 중심지이론의 고차원 중 심지와 저차원 중심지의 비교설명으로 가장 옳지 않은 것 은?","opts":{"1":"고차원 중심지일수록 고급상품을 취급한다.","2":"교통이 발달할수록 저차원 중심지는 쇠락한다.","3":"인구가 증가할수록 중심지 간 거리는 멀어진다.","4":"고차원 중심지일수록 소비자 도달거리가 커진다.","5":"고차원 중심지일수록 소비자 이용 빈도가 낮아진다."},"ans":3},{"year":"2025년 2회","num":30,"subj":"상권분석","q":"GIS(지리정보시스템)를 활용한 상권분석과 입지의사결정에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"점포에 대한 정보는 그 속성값으로 점포명칭, 점포유형, 매장면적, 월매출액, 종업원 수 등의 자료를 포함할 수 있다.","2":"편의점, 은행, 대형마트, 백화점 등에서의 신규점포 입지 선정이나 기존점포의 점포망관리, 점포의 이동과 폐점결 정 등에도 활용이 확대되고 있다.","3":"각종 도로나 지하철 노선 등은 선(線)데이터로 지도에 수 록하고 데이터베이스를 구축한다.","4":"개별 상점이나 상점가의 위치정보, 행정구역, 토지이용 정보는 좌표를 갖는 점(點)데이터로 지도에 수록한다.","5":"소매점포를 이용하는 소비자 대상의 설문조사 자료도 지 도데이터베이스에 포함하여 보다 정밀한 상권분석이 가 능하다."},"ans":4},{"year":"2025년 2회","num":33,"subj":"상권분석","q":"다음 중 상권분석의 내용으로 가장 옳지 않은 것은?","opts":{"1":"상권의 공간적 범위 확정","2":"상권내 임대료의 적절성 분석","3":"자사점포의 시장점유율의 추정","4":"상권내 상주인구의 인구특성 분석","5":"상권내 경쟁자들의 전략 특성 분석"},"ans":2},{"year":"2025년 2회","num":34,"subj":"상권분석","q":"도시와 도시, 지역과 지역간에 관찰할 수 있는 역외구매 (outshopping) 현상과 관련한 설명으로 옳지 않은 것은?","opts":{"1":"해당지역에 거주하는 소비자들이 외부지역에서 구매 하 는 상황을 말한다.","2":"IRS가 크다는 것은 거주자의 역외구매 정도가 낮다는 것 을 의미한다.","3":"해당 지역의 전체 혹은 1인당 예상지출액과 실제지출 액 이 차이를 유발한다.","4":"소비자의 이동가능성을 높이는 교통수단의 발달은 역외 구매현상을 촉진할 수 있다.","5":"역외구매 현상이 많아 신규수요창출 가능성이 큰 것 이 므로 MEP가 높다고 해석한다."},"ans":2},{"year":"2025년 2회","num":35,"subj":"상권분석","q":"점포의 입지분석과 관련된 설명으로 그 내용이 옳지 않은 것은?","opts":{"1":"인스토어형 점포는 대형할인점, 백화점, 쇼핑센터 등 대 형소매점 내에 입주해 있는 개별 매장을 의미한다.","2":"인스토어형 점포가 입주해 있는 대형소매점은 그 위치와 주요 내점 교통수단에 따라 도시형, 교외형, 혼합형으로 구분된다.","3":"도시형 점포의 경우 주 출입구에서 에스컬레이터까지가 주동선이다.","4":"교외형 점포의 경우 주 주차장에서 주 출입구까지가 주 동선이 된다.","5":"인스토어점포 내에서 고객유발매장을 출입구에 가깝게 배치하여 고객 가로치기 현상을 방지하도록 관리한다."},"ans":5},{"year":"2025년 2회","num":37,"subj":"상권분석","q":"소비자의 동선을 파악하기 위해서는 개별 통행자의 심리 상 태에 대한 원리를 이해하는 것이 중요하다. 목적지를 향한 인간의 심리상태를 나타내는 원리에 대한 설명으로 옳지 않 은 것은?","opts":{"1":"집합의 법칙: 사람들은 여러 사람들이 모이는 곳으로 가 려한다.","2":"최단거리 실현의 법칙: 사람들은 목적지에 최단거리로 가려고 한다.","3":"안전중시의 법칙: 사람들은 자신의 안전을 위해 위험 하 다고 생각되거나 다른 사람들이 가지 않는 곳으로 통행 하지 않는다.","4":"보증실현의 법칙: 사람들은 득실을 미리 예상하고 득이 되는 쪽을 선택한다.","5":"부동선 선호 법칙: 사람들은 부동선을 주동선보다 선호 한다."},"ans":5},{"year":"2025년 2회","num":38,"subj":"상권분석","q":"GIS(지리정보시스템)의 기능 중 중첩(overlay)은 공간적으로 동일한 경계선을 가진 두 지도 레이어들에 대해 하나의 레 이어에 다른 레이어를 겹쳐 놓고 지도 형상과 속성들을 비 교하는 기능이다. 중첩의 기능에 해당되지 않는 것은?","opts":{"1":"결합(union) ② 교차(intersection)","2":"","3":"동일성(identity) ④ 절단(clip)","4":"","5":"질의(query)"},"ans":5},{"year":"2025년 2회","num":39,"subj":"상권분석","q":"권리금에 대한 설명 중 옳은 것은?","opts":{"1":"권리금은 법률적으로 반환을 보장받을 수 있다.","2":"임대차 계약기간동안의 사업수익으로 충분히 충당될 수 있는 정도여야 적당하다고 볼 수 있다.","3":"신축건물에도 바닥권리금이라는 것이 있는데, 이는 주변 상권의 강점을 반영하는 것이므로 높아도 무방하다.","4":"일종의 영업권이며 계약 종료시 원칙적으로 전액 반환 받을 수 있다.","5":"해당 상권의 강점 등이 반영된 영업권의 일종으로, 점포 의 소유자에게 임차인이 제공하는 추가적인 비용이다."},"ans":2},{"year":"2025년 2회","num":40,"subj":"상권분석","q":"점포를 중심으로 거리가 멀어질수록 소비자의 구매행동에 차이가 있다는 인식을 근거로 소매점포의 상권을 전략적 차 원에서 구분한다. 이와 관련한 설명이 타당하지 않은 것은?","opts":{"1":"1차상권은 점포에서 가장 가까운 지역이며 소비자의 충 성도가 높으며 상대적으로 1인당 판매액이 커서 소매점 경영의 핵심적 공간이다.","2":"1차상권은 매출액이나 소비자의 수를 기준으로 비중이 가장 크지만 그 비율에 대한 절대적기준은 없다. 경쟁 점과의 상권중복 가능성이 상대적으로 높다.","3":"2차상권은 1차상권을 둘러싸는 형태로 매출이나 소비자 의 일정비율을 추가로 흡인하는 지역이다. 대체로 1차 상권에 비해 소비자 내점빈도와 1인당 판매액이 낮은 편 이다. 최강 자격","4":"","5":""},"ans":2},{"year":"2025년 2회","num":41,"subj":"상권분석","q":"백화점이나 쇼핑센터 등 다층구조의 대형소매점에서 개점계 획 시 공간배치 관련 의사결정을 내릴 때 매장을 찾는 고객 의 동선(動線)을 전략적으로 유도하여 매출을 극대화하려는 목적으로 샤워효과, 분수효과, 나비효과를 고려하기도 한다. 이와 관련한 일반적 내용으로 옳지 않은 것은?","opts":{"1":"분수효과(Fountain effect)는 분수의 물이 아래에서 위로 물이 뿜어져 나오는 것처럼 대형소매점 하층부의 이벤트 가 상층부로 고객을 유도하여 매장전체의 매출을 증가시 키는 효과를 갖는 것을 말한다.","2":"분수효과(Fountain effect)는 백화점 등에서 지하매장에 식료품코너를 배치하여 고객집객효과가 위층까지 영향을 미치게 하는 것이 대표적 적용사례이다.","3":"샤워효과(Shower effect)는 대형소매점의 상층부에 고객 을 유인하는 상품매장이나 시설 등을 배치하여 그곳을 방문한 고객이 하층부로 내려오면서 고객집객효과가 하 층부로 연계되는 효과를 말한다.","4":"샤워효과(Shower effect)는 백화점에서 상층부에 문화 센터, 전문식당가, 명품브랜드 매장을 배치하여 고객 집 객효과가 아래층으로 유도되는 것이 일반적 적용사례이 다.","5":"나비효과(Butterfly effect)는 브랜드 인지도와 집객력이 큰 앵커매장(anchor shop)을 엘리베이터나 에스컬레이 터에서 멀리 떨어져 있는 매장 안쪽에 배치하여 주변 매 장의 상품도 구매하는 연계매출 증대를 꾀하는 것을 말 한다."},"ans":4},{"year":"2025년 2회","num":42,"subj":"상권분석","q":"점포를 개점할 때는, 행정관청에서 사업자등록번호를 부여 받고 사업자등록증을 교부받아야 한다. 이와 관련된 아래의 내용 중에서 옳지 않은 것은?","opts":{"1":"업종에 따라 영업 신고, 영업 등록, 영업 허가 등이 필요 한 업종이 있고, 이 모든 것이 필요 없는 업종도 있다.","2":"독서실, 노래방, 약국 등은 영업 신고를 하면 개점이 가 능하다.","3":"편의점, 문방구, 잡화점 등은 임대차 계약서만 있으면 사 업자등록이 가능하다.","4":"유흥주점, 단란주점 등은 영업 허가를 받아야 개점이 가 능하다.","5":"부동산 중개업, 병원, 안경점 등은 행정관청에서 영업 등 록을 해줘야만 개점이 가능하다."},"ans":2},{"year":"2025년 2회","num":43,"subj":"상권분석","q":"특정 지역상권 내에서 신규 개점을 하려 한다. 상권규모와 경쟁상태는 아래 글상자의 내용과 같다. 매장면적을 기준으 로 매출액을 예상하여 개점전략을 수립하려 한다. 신규 개 점 점포의 예상매출액은 얼마인가?","opts":{"1":"약 1억 8,100만원 ② 약 1억 6,700만원","2":"","3":"약 1억 4,200만원 ④ 약 1억 2,300만원","4":"","5":"약 1억 1,200만원"},"ans":3,"img":["boxes/2025_2_43.png"]},{"year":"2025년 2회","num":45,"subj":"상권분석","q":"소매점포의 신규개설 시 개점할 입지결정, 기존 소매점의 폐점, 점포이전, 점포규모의 축소 및 확대와 관련한 의사 결 정에 활용할 수 있는 Huff모델과 관련한 설명으로 옳지 않 은 것은?","opts":{"1":"점포면적 및 거리에 대한 민감도계수는 분석대상이 되는 상권에서 소비자의 구매행동 자료를 통해 추정한다.","2":"상권분석의 대상이 되는 공간상에서 소매상권이 연속적 이고 중복적인 성격이 있다는 것을 인정한다.","3":"상권조사 대상지역 개별소비자의 점포이용자료 보다는 평균적이고 객관적인 통계자료를 이용한다.","4":"특정 점포의 효용이 다른 점포들의 효용보다 크면 그 점 포의 선택가능성이 높아진다.","5":"소비자로부터 점포까지의 이동거리는 소요시간으로 대체 하여 계산하기도 한다."},"ans":3},{"year":"2025년 2회","num":46,"subj":"상권분석","q":"효과적인 시장세분화의 요건으로서 아래 글상자의 괄호 안 에 들어갈 내용으로 가장 옳은 것은?","opts":{"1":"㉠ 측정 가능성, ㉡ 충분한 규모의 시장크기","2":"㉠ 접근 가능성, ㉡ 실행 가능성","3":"㉠ 차별화 가능성, ㉡ 측정 가능성","4":"㉠ 접근 가능성, ㉡ 차별화 가능성","5":"㉠ 측정 가능성, ㉡ 차별화 가능성"},"ans":2,"img":["boxes/2025_2_46.png"]},{"year":"2025년 2회","num":48,"subj":"상권분석","q":"재고자산의 손실은 감모손실과 평가손실로 구분한다. 다음 중 감모손실의 직접적 관리 대상으로 가장 옳지 않은 것은?","opts":{"1":"도난 ② 파손","2":"","3":"마모 ④ 증발","4":"","5":"가격할인"},"ans":5},{"year":"2025년 2회","num":50,"subj":"상권분석","q":"거래형 마케팅(transactional marketing)과 관계형 마케팅 (relational marketing)을 비교한 내용 중에서 옳지 않은 것 은?","opts":{"1":"거래형 마케팅은 특정거래처와의 거래경험의 중요성이 높지만, 관계형 마케팅은 거래경험의 중요성이 낮다.","2":"거래형 마케팅은 시장점유율을 중시한다면, 관계형 마케 팅은 고객점유율을 중시한다.","3":"거래형 마케팅은 거래처에 대한 상대적 의존도가 낮지 만, 관계형 마케팅은 상대적 의존도가 높다.","4":"거래형 마케팅은 잠재거래선이 다수이지만, 관계형 마케 팅은 잠재거래선이 소수이다.","5":"거래형 마케팅은 거래처에 대한 신뢰의 정도가 낮지만, 관계형 마케팅은 신뢰의 정도가 높다."},"ans":1},{"year":"2025년 2회","num":51,"subj":"유통마케팅","q":"성장 기회를 확보하려는 유통업체가 기존사업을 개선하여 경쟁사의 고객을 확보하거나 주요 표적 고객이 아니었던 소 비자를 끌어들이는 전략으로서 가장 옳은 것은?","opts":{"1":"집중적 성장전략 ② 다각화 성장전략","2":"","3":"전방통합 전략 ④ 후방통합 전략","4":"","5":"철수전략"},"ans":1},{"year":"2025년 2회","num":52,"subj":"유통마케팅","q":"아래 글상자는 소매업의 주요 경쟁 요인을 나열하고 있다. 다음 중 시간의 흐름에 따른 소매업체 간 경쟁 요인의 진화 과정에 대한 기술로서 가장 옳은 것은?","opts":{"1":"㉠ → ㉡ → ㉢ ② ㉠ → ㉢ → ㉡","2":"","3":"㉡ → ㉠ → ㉢ ④ ㉢ → ㉡ → ㉠","4":"","5":"경쟁요인의 진화는 무작위적이다."},"ans":1,"img":["boxes/2025_2_52.png"]},{"year":"2025년 2회","num":54,"subj":"유통마케팅","q":"수명주기의 차이 때문에 상품별로 구매계획 수립의 용이성 이 다르다. 다음 중 구매계획 수립의 용이성이 가장 높은 상품 유형으로 옳은 것은?","opts":{"1":"일시성 상품(fad merchandise)","2":"계절성 상품(seasonal merchandise)","3":"유행성 상품(fashion merchandise)","4":"지속성 상품(staple merchandise)","5":"비상용 상품(emergency merchandise)"},"ans":4},{"year":"2025년 2회","num":55,"subj":"유통마케팅","q":"다음 중 가격에 대한 설명으로 가장 옳은 것은?","opts":{"1":"수요탄력성이 낮은 경우는 저가전략을, 가격-품질 연상 효과를 위해서는 고가전략을 활용한다.","2":"상시저가 정책은 경쟁기준 가격결정, 고/저 가격 정책은 고객기반 가격결정 방식이다.","3":"권장소비자가격은 제조원가를 기반으로, 오픈가격은 수 요와 공급에 의해 가격이 결정된다.","4":"단수가격 결정 및 단위가격 표시는 경쟁점과의 과도한 경쟁을 감소시킨다.","5":"슈퍼마켓에서는 저가전략을, 백화점에서는 고가전략을 활용하는 정책을 이중요율 가격이라 한다."},"ans":3},{"year":"2025년 2회","num":56,"subj":"유통마케팅","q":"아래 글상자의 괄호 안에 들어갈 판매촉진 관련 용어를 바 르게 나열한 것은?","opts":{"1":"㉠ 입점 공제, ㉡ 광고 공제","2":"㉠ 입점 공제, ㉡ 진열 공제","3":"㉠ 진열 공제, ㉡ 구매 공제","4":"㉠ 진열 공제, ㉡ 광고 공제","5":"㉠ 광고 공제, ㉡ 구매 공제"},"ans":2,"img":["boxes/2025_2_56.png"]},{"year":"2025년 2회","num":57,"subj":"유통마케팅","q":"다음 중 자사 웹사이트에 대한 검색엔진 최적화(SEO)의 목 적으로 가장 옳은 것은?","opts":{"1":"소비자가 입력하는 검색 키워드에 맞춘 광고의 표시","2":"웹사이트가 소비자에게 제공하는 이점의 최적화","3":"웹사이트 구조의 최적화를 통한 사용 편의성 제고","4":"웹사이트에 게시할 상품과 콘텐츠의 매력 최적화","5":"웹사이트를 효과적으로 알리는 경로 확보의 최적화"},"ans":5},{"year":"2025년 2회","num":59,"subj":"유통마케팅","q":"기존의 마케팅 커뮤니케이션과 인터랙티브 캠페인의 특징을 비교한 내용으로 옳지 않은 것은?","opts":{"1":"㉠, ㉡ ② ㉠, ㉢","2":"","3":"㉡, ㉢ ④ ㉡, ㉣","4":"","5":"㉢, ㉣"},"ans":5,"img":["boxes/2025_2_59.png"]},{"year":"2025년 2회","num":60,"subj":"유통마케팅","q":"다음 중 장부재고 오류에 대한 설명으로 가장 옳은 것은?","opts":{"1":"장부재고 오류는 장부재고는 정확하지만 실재고가 잘못 계산된 경우이다.","2":"장부재고 오류로 인한 로스의 발생은 실제 수량에 오류 가 있거나 인식이 잘못되었을 때 발생한다.","3":"장부재고 오류는 시스템상의 기록이 실제 수량과 불일치 하는 경우이다.","4":"장부재고 오류의 대표적인 원인은 도난에 의한 것이다.","5":"장부재고 오류를 막기 위해 항상 상품을 정리하고 도난 을 방지하기 위한 대책을 수립해야 한다."},"ans":3},{"year":"2025년 2회","num":61,"subj":"유통마케팅","q":"유통경로 성과와 관련된 각종 지표에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"순매출 이익률은 당기순이익을 순매출로 나눈 비율로, 제품 혹은 서비스 구매원가, 영업비와 감가상각비, 금융 비용 등의 제 비용을 상환할 수 있는 능력을 나타 낸다.","2":"순가치 대비 순이익비율은 투자에 따른 배당이 얼마나 이루어질 것인가를 판단하는 지표가 된다.","3":"순가치 대비 총자산비율이 낮을수록 차입금보다 자기 자 본 의존도가 높아 재무구조가 안정적이라 볼 수 있다.","4":"총자산 이익률은 유통경로의 각 단계별로 발생하는 물류 비용을 측정하여 유통 효율성을 나타내는 지표 이다.","5":"재고자산 총이익률은 매출총이익을 재고자산으로 나눈 값으로, 이는 이익  ㉣ ④ ㉠, ㉢, ㉤","4":"","5":"㉠, ㉣, ㉤"},"ans":3,"img":["boxes/2025_2_71.png"]},{"year":"2025년 2회","num":72,"subj":"유통마케팅","q":"유통업체에서 판매 증진을 위해 활용하는 옴니채널 (Omni-Channel) 전략에 대한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"옴니채널이라는 용어는 '모든'이라는 뜻의 단어 '옴니 (omni)'와 '경로'를 뜻하는 '채널(channel)'의 합성어 이 다.","2":"옴니채널 활성화에 따라 크로스 쇼퍼(cross shopper)가 감소하게 되었다.","3":"옴니채널은 온라인과 오프라인 유통 채널을 통합해 어떤 채널에서도 고객에게 최선의 선택을 제공한다.","4":"옴니채널에서는 온라인과 오프라인 모든 채널에서 비즈 니스를 추구할 수 있다.","5":"옴니채널은 정보기술 발전으로 소비자들이 온라인과 오 프라인에서 보다 편리하게 쇼핑을 할 수 있게 된 것과 밀접한 관련이 있다."},"ans":2},{"year":"2025년 2회","num":73,"subj":"유통마케팅","q":"상품식별코드에 관한 설명으로 가장 옳지 않은 것은?","opts":{"1":"표준상품식별코드는 상품을 식별하기 위한 상품 고유의 번호이다.","2":"표준상품식별코드가 바코드에 입력되면 GS1표준바코 드 가 만들어진다.","3":"바코드는 식별코드를 기계가 읽을 수 있도록 막대 모양 으로 표현한 것이다.","4":"상품식별코드 만으로도 해당 상품의 상품명, 가격 등의 정보를 알 수 있다.","5":"식별코드는 주민등록번호나 자동차등록번호 등과 같이 사람 또는 사물의 식별을 위한 번호체계이다."},"ans":4},{"year":"2025년 2회","num":76,"subj":"유통정보","q":"아래 글상자에서 설명하는 내용으로 가장 옳은 것은?","opts":{"1":"QR코드 ② ITF-14","2":"","3":"GTIN-14 ④ GS1-128","4":"","5":"GS1 DataBar"},"ans":1,"img":["boxes/2025_2_76.png"]},{"year":"2025년 2회","num":78,"subj":"유통정보","q":"유통업체에서 활용이 증가하고 있는 블록체인에 대한 설명 으로 가장 옳지 않은 것은?","opts":{"1":"일반적으로 블록체인은 네트워크 관리 권한 및 접근 자 격에 따라 개방형(public), 폐쇄형(private), 컨소시 엄형 (consortium)으로 구분할 수 있다.","2":"폐쇄형 블록체인은 네트워크 확장이 용이하고, 거래 속 도가 빠르다.","3":"컨소시엄형 블록체인은 거래 속도가 빠르고, 네트워크 확장성이 높다.","4":"개방형 블록체인 검증을 위해서는 작업 증명(Proof of Work), 지분 증명(Proof of Stake) 등의 방법이 활용된 다.","5":"개방형 블록체인은 네트워크 확장이 용이하고, 익명성이 보장되며, 거래속도가 빠르다."},"ans":5},{"year":"2025년 2회","num":79,"subj":"유통정보","q":"개인정보보호법에서 정의하는 개인정보의 정의와 처리에 대 한 내용으로 가장 옳지 않은 것은?","opts":{"1":"성명, 주민등록번호 및 영상 등을 통하여 개인을 알아 볼 수 있는 정보이다.","2":"살아있는 자를 포함하여 사망한 자, 자연인과 법인 등에 관한 정보이다.","3":"해당 정보만으로는 특정 개인을 알아볼 수 없더라도 다 른 정보와 쉽게 결합하여 알아볼 수 있는 정보이다.","4":"가명처리를 통해 원래의 상태로 복원하기 위한 추가 정 보의 사용, 결합없이는 특정 개인을 알아볼 수 없는 정 보이다.","5":"개인정보처리자는 개인정보가 분실·도난·유출·위조·변조 또는 훼손되지 아니하도록 안전성 확보에 필요한 기술 적·관리적 및 물리적 조치를 하여야 한다."},"ans":2},{"year":"2025년 2회","num":80,"subj":"유통정보","q":"A사는 전문업체인 B사를 선정하여 유통정보시스템을 구축 하고자 한다. 다음 중 사업 착수 후 분석 단계에서 실행되 는 활동으로 가장 옳은 것은?","opts":{"1":"단위테스트 수행 ② 데이터베이스 설계","2":"","3":"사용자매뉴얼 작성 ④ 인수테스트 수행","4":"","5":"요구사항 정의"},"ans":5},{"year":"2025년 2회","num":82,"subj":"유통정보","q":"ERP 시스템 구축 프로젝트 수행 중 여러 가지 문제의 발생 으로 ERP 프로젝트 구축 범위가 변경되어 프로 젝트가 종 료되지 않고 지속되는 현상을 나타내는 용어로 가장 옳은 것은?","opts":{"1":"빅뱅 접근법(Big Bang Approach)","2":"바닐라 접근법(Vanilla Approach)","3":"반추(Rumination)","4":"베스트 오브 브리드 접근법(Best-of-Breed Approach)","5":"네버 엔딩 프로젝트 신드롬(Never-ending Project Syndrome)"},"ans":5},{"year":"2025년 2회","num":83,"subj":"유통정보","q":"고객충성도 프로그램에 대한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"고객충성도 프로그램으로는 마일리지 프로그램과 우수 고객 우대 프로그램 등이 있다.","2":"고객충성도에는 행동적 충성도와 태도적 충성도가 있다.","3":"고객충성도 프로그램은 단기적 측면보다는 장기적 측면 에서 운영되어야 유통업체가 고객 경쟁력을 확보할 수 있다.","4":"고객충성도 프로그램 운영에 있어 비금전적 혜택보 다는 금전적 혜택을 제공하는 것이 유통업체 측면에서 보다 효율적이다.","5":"각종 혜택을 통해 경쟁업체가 아닌 자사를 이용하도록 브랜드 충성도를 강화시킨다."},"ans":4},{"year":"2025년 2회","num":84,"subj":"유통정보","q":"전자상거래 시스템 내에서 구현해야 할 보안요건들 중 아래 글상자에서 설명하는 것으로 가장 옳은 것은?","opts":{"1":"인증 ② 기밀성","2":"","3":"무결성 ④ 복호화","4":"","5":"부인방지"},"ans":3,"img":["boxes/2025_2_84.png"]},{"year":"2025년 2회","num":86,"subj":"유통정보","q":"아래 글상자의 괄호 안에 들어갈 용어로 가장 옳은 것은?","opts":{"1":"㉠ 엣지컴퓨팅, ㉡ 온디바이스 AI","2":"㉠ 공간지능, ㉡ 지속가능 AI","3":"㉠ 블록체인, ㉡ 제로트러스트네트워크","4":"㉠ 컨테이너보안, ㉡ 엣지컴퓨팅","5":"㉠ 공간지능, ㉡ 블록체인"},"ans":1,"img":["boxes/2025_2_86.png"]},{"year":"2025년 2회","num":87,"subj":"유통정보","q":"쇼루밍(Showrooming)과 역쇼루밍(Reverse-Showrooming) 에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"역쇼루밍은 온라인 쇼핑 채널에서 상품을 선택한 후에, 오프라인 쇼핑 매장에서 상품을 구입하는 행동을 의미 한다.","2":"상품 선택은 오프라인 매장에서 하고, 실제 상품 구매는 온라인 쇼핑 채널에서 하는 쇼핑 행동을 쇼루밍이 라고 한다.","3":"역쇼루밍 트렌드는 화장품, 유아용품, 명품 브랜드 등 에 서 많이 나타나고 있다.","4":"역쇼루밍족은 온라인 쇼핑 채널에서 다양한 상품구매 후 기 등을 검색해서 정보를 습득한다.","5":"쇼루밍족과 역쇼루밍족의 등장은 온라인과 오프라인 쇼 핑 채널의 경계를 무너뜨리면서 유통업계의 크로스 채널 (cross channel) 구축을 방해하고 있다."},"ans":5},{"year":"2025년 2회","num":89,"subj":"유통정보","q":"아래 글상자의 괄호 안에 공통적으로 들어갈 용어로 가장 옳은 것은?","opts":{"1":"대시보드(dashboard)","2":"옵저버빌리티(observability)","3":"비쥬얼라이제이션(visualization)","4":"키퍼모먼스(key performance)","5":"인텔리전스(intelligence)"},"ans":2,"img":["boxes/2025_2_89.png"]},{"year":"2025년 2회","num":90,"subj":"유통정보","q":"다음 중 데이터 마이그레이션(migration)에 대한 설명 으로 가장 옳지 않은 것은?","opts":{"1":"데이터 일치는 외부로부터 유입된 데이터를 기업 표준으 로 변환하는 작업이다.","2":"데이터 정제는 린 코드번호, 의미없는 데이터, 데이터 중 복 및 데이터 오기처럼 부정확한 데이터를 올바르게 고 치는 작업이다.","3":"데이터 정제는 데이터를 ERP시스템에서 사용할 수 있도 록 수정하는 작업이다.","4":"데이터 운반은 기존의 레거시 시스템과 데이터베이스에 서 데이터를 꺼내는 작업이다.","5":"데이터 수집은 새로운 데이터를 디지털 포맷으로 변환하 기 위해 모으는 작업이다. 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":4},{"year":"2025년 3회","num":1,"subj":"유통물류일반","q":"수직적 유통마케팅시스템의 도입 이유로 가장 옳지 않은 것 은?","opts":{"1":"목표이익의 확보","2":"가격안정의 필요","3":"경쟁자에 대한 효과적인 대응","4":"유통경로 내에서의 지배력 획득","5":"같은 단계의 유통기업 간 협력으로 인한 경쟁력 강화"},"ans":5},{"year":"2025년 3회","num":2,"subj":"유통물류일반","q":"유통업의 사회·경제적 역할 중 소비자에 대한 소매업의 역할 로 가장 옳지 않은 것은?","opts":{"1":"쇼핑의 지리적 편의성을 제공하는 역할","2":"필요한 상품 재고를 유지하는 역할","3":"적절한 상품의 구색을 갖추는 역할","4":"소비자가 신뢰할 수 있는 올바른 상품을 제공하는 역할","5":"수요에 대한 정보를 적시에 전달해 주는 역할"},"ans":5},{"year":"2025년 3회","num":3,"subj":"유통물류일반","q":"유통경로 상에서 수행되는 분업의 원칙으로 볼 수 없는 것 은?","opts":{"1":"보관기능 ② 하역기능","2":"","3":"수급조절기능 ④ 정보수집기능","4":"","5":"인사관리기능"},"ans":5},{"year":"2025년 3회","num":4,"subj":"유통물류일반","q":"유통경로구조 결정을 설명하는 거래비용이론과 관련된 설명 으로 가장 옳지 않은 것은?","opts":{"1":"수직적 통합에 의한 내부화와 시장거래 중에서 하나를 선 택하는 과정을 설명하는 이론이다.","2":"인간의 행동에 대해 완벽한 합리성을 전제로 하기에 모든 경제적 교환은 계약에 의해 효율적으로 이루어질 수 있다 고 가정한다.","3":"거래의 빈도가 높을수록 내부화된 거래를 선호하기에 수 직적 통합이 촉진된다.","4":"기업은 외부거래비용과 내부관리비용을 비교해 수직적 통 합 여부를 결정한다.","5":"잠재적 거래 규모가 작은 경우에는 통합구조를 유지하기 어려워진다."},"ans":2},{"year":"2025년 3회","num":5,"subj":"유통물류일반","q":"O2O서비스의 성공요인에 대한 설명으로 가장 옳지 않은 것 은?","opts":{"1":"공급업체 간 경쟁이 낮거나 공급이 부족한 분야일수록 성 공가능성이 높다.","2":"소비자가 주기적 또는 반복적으로 자주 구매하는 서비스 분야이어야 한다.","3":"고객이 얻는 가치를 증진시키는 방안을 이용해 경쟁업체 와 차별화를 이루어야 한다.","4":"서비스를 제공하는 업체들에게도 이익을 제공해야 한다.","5":"서비스에 대한 이용후기 및 평가를 통해 플랫폼에 대한 소비자의 신뢰를 얻어야 한다."},"ans":1},{"year":"2025년 3회","num":9,"subj":"유통물류일반","q":"비용-조업도-이익분석(CVP분석)에서 변동비로 처리하는 비 용요소들로만 바르게 나열한 것은?","opts":{"1":"보험료 - 종업원 훈련비 – 임차료 - 수선유지비","2":"직접재료비 - 보험료 - 직접노무비 - 종업원 훈련비","3":"직접재료비 - 포장비 - 판매수수료 - 운반비","4":"보험료 - 운송비 - 외주가공비 - 포장비","5":"성과급여 - 수선유지비 - 임차료 – 판매수수료"},"ans":3},{"year":"2025년 3회","num":10,"subj":"유통물류일반","q":"물류표준화의 장점에 대한 설명으로 옳지 않은 것은?","opts":{"1":"판매자의 판매활동이 능률화된다.","2":"물류자동화와 기계화가 가능해진다.","3":"물류기업 규격의 표준설정이 가능해진다.","4":"높은 유연성으로 고객맞춤서비스를 강화시킨다.","5":"물류기업의 생산활동에 효율화를 기할 수 있다."},"ans":4},{"year":"2025년 3회","num":12,"subj":"유통물류일반","q":"기업의 거시환경을 분석하기 위해 사용할 수 있는 PEST모 델에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"정치적 요인은 세금 정책이나 정치의 안정성 등을 포함 한다.","2":"환경적 요인은 물가와 인플레이션, 경기변동 등을 포함 한다.","3":"사회 문화적 요인은 기업이 활동하는 해당 지역이나 국 가의 문화를 분석하여 반영하는 것이다.","4":"소확행 즉 소소하지만 확실한 행복과 같은 새로운 가치 관의 출현은 사회 문화적 요인에 해당된다.","5":"디지털 혁명의 적용능력, 정보기술과의 융복합 등은 기 술적 요인에 해당된다."},"ans":2},{"year":"2025년 3회","num":13,"subj":"유통물류일반","q":"동기부여와 관련된 강화이론에 대한 설명으로 옳지 않은 것 은?","opts":{"1":"적극적 강화는 일련의 자극을 주어 반응을 강화하는 자 극이다.","2":"소거는 어떤 행위가 더 이상 보상 받지 못할 때 그 행위 는 줄어들게 된다.","3":"처벌은 바람직하지 못한 행동을 한 경우 불쾌한 자극을 주어 그러한 행동을 약화시키는 것이다.","4":"강화 적합성에 따르면 바람직한 행위가 있었을 경우에는 보상을 약간 지연시켜 제공하여 기대를 크게 만드는 것 이 효과적이다.","5":"성과와 관련 없이 보상을 제공하면 더 이상 적극적 강화 요인이 되지 못하기에 바람직한 행동이 있을 때에만 제 공하는 것이 효과적이다."},"ans":4},{"year":"2025년 3회","num":14,"subj":"유통물류일반","q":"유통경로가 직면하는 환경적 특징에 대한 설명으로 가장 옳 지 않은 것은?","opts":{"1":"갈등은 유통경로구성원이 경쟁하는 시장 변화의 빈도를 기준으로 나타낼 수 있다.","2":"집중성은 시장을 통제하려는 기업이나 조직의 수가 어느 정도인지를 근거로 나타난다.","3":"상호의존성은 경로구성원들이 경쟁하는 시장에서 행동의 반응 정도와 민감성을 나타낸다.","4":"다양성은 목표 시장 내 소비자들의 유사성과 차별성으로 인해 나타난다.","5":"상호연관성은 관련 있는 경로기관들의 수와 연계된 패턴 에 따른 상황을 나타낸다."},"ans":1},{"year":"2025년 3회","num":15,"subj":"유통물류일반","q":"기업이 유통전략을 수립할 때 고려해야 할 내용으로 가장 옳지 않은 것은?","opts":{"1":"4차 산업혁명기술의 발전이 기업에 어떤 영향을 주며 기 업 활동 패러다임을 바꾸고 있는지 고려한다.","2":"소비자의 욕구가 다양화되는 추세이기에 동종업종뿐만 아니라 이종업종 간, 경쟁자와의 협력도 중요하다.","3":"시장환경이 개성화, 다양화된 수요로 변하고 있기에 신 속하고 표준화된 대응방안을 구축해야 한다.","4":"양적인 성장만큼 질적인 내실화를 추구해 균형 잡힌 전 략이 될 수 있게 한다.","5":"급변하는 환경에 능동적으로 대응할 수 있는 유연성을 최강 자격"},"ans":3},{"year":"2025년 3회","num":17,"subj":"유통물류일반","q":"경로-목표 이론에 따른 리더십 유형으로 옳지 않은 것은?","opts":{"1":"부하가 어떤 일을 언제 어떻게 해야하는지 분명하게 지 시하는 지시적 리더십","2":"부하들에게 우호적이고 친절하며 즐거운 마음으로 일을 하도록 신경쓰는 지원적 리더십","3":"부하들을 중요한 의사결정에 참여시키고 그들의 의견을 반영하는 참여적 리더십","4":"리더에 대한 복종의 대가로 보상을 지급하는 거래적 리 더십","5":"도전적인 목표를 제시하고 그들의 능력을 최대한 발휘하 게 만드는 성취지향적 리더십"},"ans":4},{"year":"2025년 3회","num":18,"subj":"유통물류일반","q":"자재소요계획(MRP) 시스템의 단점에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"MRP 시스템은 생산계획에 따라 운영되며 일단 시스템이 작동하면 변경이 쉽지 않다.","2":"MRP 시스템은 재고관리모델이 아니어서 단기수요변동에 둔감하여 주문점을 놓칠 위험이 있다.","3":"MRP 시스템은 예측 오류에 대해 실시간으로 유연하게 대처하기 어렵다.","4":"MRP 시스템은 재고수량이나 리드타임과 같은 투입자료 가 부정확하면 문제로 이어질 수 있다.","5":"MRP 시스템은 적시 공급인 pull방식에 초점을 맞춰 안전 재고가 부족할 수 있다."},"ans":5},{"year":"2025년 3회","num":20,"subj":"유통물류일반","q":"아래 글상자에서 설명하는 창고입지선정법을 순서대로 옳게 나열한 것은?","opts":{"1":"㉠ 총비용비교법, ㉡ 톤ㆍ킬로법","2":"㉠ 운송비최소화법, ㉡ 톤ㆍ킬로법","3":"㉠ 운송비최소화법, ㉡ 무게중심법","4":"㉠ 요소분석법, ㉡ 무게중심법","5":"㉠ 요소분석법, ㉡ 브라운&깁슨법(Brown-Gibson Method)"},"ans":4,"img":["boxes/2025_3_20.png"]},{"year":"2025년 3회","num":21,"subj":"유통물류일반","q":"아래 글상자에서 설명하는 시스템으로 옳은 것은?","opts":{"1":"크로스도킹시스템 ② 자동발주시스템","2":"","3":"제3자 물류시스템 ④ 풀필먼트시스템","4":"","5":"신속대응시스템"},"ans":1,"img":["boxes/2025_3_21.png"]},{"year":"2025년 3회","num":22,"subj":"유통물류일반","q":"기업의 윤리적 책임과 큰 관련이 없는 것은?","opts":{"1":"성문화되어 있지는 않으나 사회구성원들에 의해 제한되 는 행동들이다.","2":"성문화되어 있지는 않으나 사회구성원들에 의해 기대되 는 행동들이다.","3":"소비자, 직원, 주주 그리고 공동체가 정당하고 정의롭다 고 여기는 것들에 대해 관심을 갖는 것이다.","4":"자신의 경제적 의무를 주어진 틀의 테두리 안에서 완수 하는 것이다.","5":"이해관계자(stakeholder)의 윤리적 권리를 존중 또는 보 호하기 위한 노력이다."},"ans":4},{"year":"2025년 3회","num":23,"subj":"유통물류일반","q":"최초 출발지로부터 최종 목적지까지 파렛트에 적재된 화물 형태를 변형 및 환적하지 않고 일관되게 운송하는 일관파렛 트화에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"파렛트 단위의 표준화로 기계화가 용이해져서 인력과 비 용을 절감할 수 있다.","2":"파렛트 단위로 지게차를 활용하는 상하역 작업을 위해서 는 전용설비와 넓은 창고공간이 필요하다.","3":"초기 투자비용은 높지 않으나 운영 중 파렛트 회수에 추 가적인 비용이 발생한다.","4":"신속한 보관 및 하역을 통한 보관능력 향상, 재고절감 최강 자격","5":""},"ans":3},{"year":"2025년 3회","num":25,"subj":"유통물류일반","q":"유통산업발전법(법률 제20357호, 2024.2.27., 타법개정)에서 유통정보화의 촉진 및 유통부문의 전자거래기반을 넓히기 위하여 산업통상자원부장관이 수립하고 시행해야 할 유통정 보화시책에 포함되지 않는 것은?","opts":{"1":"유통정보 또는 유통정보시스템의 표준화 촉진","2":"유통표준전자문서의 보급","3":"판매시점 정보관리시스템의 보급","4":"유통산업에 종사하는 사람의 자질 향상을 위한 교육ㆍ연 수","5":"다수의 유통ㆍ물류기업 간 기업정보시스템의 연동을 위 한 시스템의 구축 및 보급"},"ans":4},{"year":"2025년 3회","num":26,"subj":"상권분석","q":"지리정보시스템(GIS)을 기반으로 한 상권정보시스템과 관련 된 내용으로 옳지 않은 것은?","opts":{"1":"토지이용 등의 정보는 면(面) 데이터로 지도에 수록된다.","2":"지하철노선, 도로 등은 선(線) 데이터로 지도에 수록된 다.","3":"고객의 인구통계정보는 DB로 구축하여 표적고객집단 파 악, 상권경계선 추정 등에 활용할 수 있게 한다.","4":"주제도 작성, 공간 조회, 버퍼링을 통해 효과적인 상권 분석이 가능하다.","5":"지리정보시스템에 기반한 상권분석정보는 대규모점포에 한정하여 상권분석, 입지선정, 잠재수요 예측, 매출액 추 정에 활용되고 있다."},"ans":5},{"year":"2025년 3회","num":27,"subj":"상권분석","q":"상권과 입지의 기본적 개념 및 특성과 관련된 설명으로 옳 지 않은 것은?","opts":{"1":"상권은 점포를 이용하는 소비자들이 분포하는 공간적범 위를 의미하거나 점포의 매출이 발생하는 지역범위이다.","2":"입지는 점포를 경영하기 위해 선택한 장소 또는 그 장소 의 부지와 점포주변의 위치적 조건을 의미한다.","3":"입지분석은 특정 점포를 대상으로 가시성, 접근성, 인지 성 등을 파악하며, 구체적 평가항목에는 점포의 면적, 형 태, 층수, 층고, 주차장, 도로와 교통망, 임대 조건 등이 있다.","4":"상권분석은 해당 상권의 시장잠재력, 배후지 인구 및 유 동인구의 특성, 경쟁점포의 규모 및 특성, 향후 발전 가 능성에 대해 평가한다.","5":"상권은 일정한 위치를 나타내는 주소나 좌표를 가지는 점(point)으로 표시되고 입지는 일정한 공간적 구역 격증 기출문제 전자문제집 CBT : www.comcbt.com"},"ans":5},{"year":"2025년 3회","num":28,"subj":"상권분석","q":"상권분석에 관한 주요이론들에 대한 설명 중에서 가장 옳지 않은 것은?","opts":{"1":"Huff 모형은 신규출점점포의 매출액을 예측하는 데에도 유용하다.","2":"Christaller의 중심지이론은 소비자가 유사점포 가운데 선 택할 때 자신의 거점에서 가장 가까운 점포를 선택한다 고 가정한다.","3":"Reilly의 소매중력이론은 인구가 많아질수록 도시의 쇼핑 매력도가 증가한다고 본다.","4":"Huff 모형은 도시 내부에서의 상권경계를 설정하는 데는 적합하지 않다.","5":"확률적 점포선택모델은 Luce의 선택공리를 기초로 특정 점포의 매력도 평가를 통해 소비자의 점포선택을 설명한 다."},"ans":4},{"year":"2025년 3회","num":29,"subj":"상권분석","q":"소매점포의 상권분석 과정에서 실무적으로 관찰할 수 있는 일반적인 특성으로 보기 어려운 것은?","opts":{"1":"동일한 도시나 지역에 입지한 상황이더라도 점포규모에 따라 개별 점포의 상권범위는 다르게 나타난다.","2":"도시의 중심상권, 부도심상권, 근린상권 등 점포의 위치 에 따라서 업종이 같아도 점포의 상권범위는 차이를 보 인다.","3":"소매점포의 상권형태는 일반적으로 점포를 중심으로 일 정거리 이내를 포함하는 동심원의 형태로 나타난다.","4":"동일업종 동일규모의 소매점포인 경우에도 소매마케팅전 략의 차이에 따라 각 점포의 상권범위가 달라진다.","5":"상권의 범위와 형태는 점포의 전략적 변화가 없어도 교 통상황의 변화나 요일의 변화 등에 의해 유동적으로 변 화하기 마련이다."},"ans":3},{"year":"2025년 3회","num":34,"subj":"상권분석","q":"아 s/2025_3_62.png"]},{"year":"2025년 3회","num":63,"subj":"유통마케팅","q":"다음 중 상품 로스에 대한 설명으로 가장 옳지 않은 것은?","opts":{"1":"상품로스는 장부상 재고 금액과 실사 재고 금액의 차이 를 말한다.","2":"상품로스율은 일정기간동안의 상품매출액에 대한 상품 로스액의 비율로 계산한다.","3":"상품로스는 부주의로 인한 관리 소홀 및 고객의 도난 등 매장에서 발생하는 부분에 집중된다.","4":"상품별 회전율을 고려한 상품 발주 및 진열을 통해 로스 를 방지해야 한다.","5":"상품매입 시 검품을 철저히 시행하여 상품의 로스를 미 연에 방지할 수 있다."},"ans":3},{"year":"2025년 3회","num":65,"subj":"유통마케팅","q":"온라인 유통마케팅의 성과지표에 대한 설명으로 가장 옳은 것은?","opts":{"1":"CTR은 '동영상 광고 시청 완료율'로 광고를 건너뛰지 않 고 끝까지 시청한 사람의 비율을 뜻한다.","2":"KPI는 광고 스케줄이 획득할 수 있는 총 노출 횟수를 의 미한다.","3":"CVR이란 '전환율'로서, 사이트로 유입된 방문자들 가운 데 사이트가 유도한 행위를 하는 비율을 의미한다.","4":"MAU는 '클릭 완성률'로 광고를 본 사람 중 클릭한 숫자 의 비율을 의미한다.","5":"CPM은 캠페인에 투입한 광고비 대비 캠페인을 통해 얻 은 수익률로서, 광고 비용의 효율성을 측정하는 지표의 하나이다."},"ans":3},{"year":"2025년 3회","num":66,"subj":"유통마케팅","q":"고객 접점의 '진실의 순간 (MOT : Moment Of Truth)'에 관 한 설명으로 가장 옳지 않은 것은?","opts":{"1":"'진실의 순간'은 서비스 품질에 대한 인식에 결정적인 역 할을 하기 때문에 흔히 '결정적 순간'이라고도 일컫는다.","2":"고객과의 접점에서 발생하는 '진실의 순간' 중 단 한가지 가 나쁜 경우에도 한순간에 고객을 잃어버릴 수 있다.","3":"고객과의 접점에서 발생하는 '진실의 순간'이 중요한 것 은 고객이 경험하는 서비스 품질이나 만족도는 소위 '덧 셈의 법칙'이 적용되기 때문이다.","4":"고객이 서비스를 이용하는 동안 모든 고객접점을 잘 관 리하여 고객 만족을 증대시켜야 한다.","5":"고객이 서비스를 받는 상황에서 '진실의 순간'이 발생하 는 일련의 과정을 '서비스 사이클(service cycle)'이라고 도 한다."},"ans":3},{"year":"2025년 3회","num":67,"subj":"유통마케팅","q":"인적판매에 관한 내용으로 가장 옳지 않은 것은?","opts":{"1":"외부판매는 판매사원이 잠재구매자를 방문하여 판매활동 을 하는 것을 의미한다.","2":"컨설턴트식 판매는 판매보다는 고객의 욕구를 이해하고 문제를 해결해 줌으로써 장기적인 관계 구축에 초점을 두는 판매방식이다.","3":"거래지향적 판매는 상호 신뢰와 신속한 반응을 통하여 고객과 장기적인 관계를 형성하고자 한다.","4":"내부판매는 소매 또는 도매 점포에서 판매사원이 잠재 구매자에게 판매활동을 하는 것이다.","5":"관계지향적 판매는 상대적으로 단기적인 매출은 낮을 수 있으나, 장기적인 매출은 높아질 수 있다."},"ans":3},{"year":"2025년 3회","num":69,"subj":"유통마케팅","q":"아래 글상자에서 설명하는 용어로 가장 옳은 것은?","opts":{"1":"Back Room ② 매장","2":"","3":"Back Yard ④ 점두시설","4":"","5":"휴게실"},"ans":1,"img":["boxes/2025_3_69.png"]},{"year":"2025년 3회","num":70,"subj":"유통마케팅","q":"다음 중 경험리테일링(experiential retailing)에서 고객의 경 험을 개선하기 위해 활용하는 소매믹스로 가장 옳은 것은?","opts":{"1":"상품 구색 ② 점포 입지","2":"", // ── 보기 정규화: OCR로 ①②③④⑤ 마커가 한 보기에 합쳐진 경우 분리 ──
//   예) {1:"상품 구색 ② 점포 입지", 2:"", 3:"점포 분위기 ④ 서비스 믹스", ...}
//       → {1:"상품 구색", 2:"점포 입지", 3:"점포 분위기", 4:"서비스 믹스", ...}
//   순서문제(㉠㉡…)는 다른 문자라 영향 없음. 정답번호(ans)는 순서가 보존되어 그대로 유효.
(function normalizeMergedOptions() {
  QUIZ_DATA.forEach(q => {
    const o = q.opts || {};
    const merged = [1, 2, 3, 4, 5].some(k => /[①②③④⑤]/.test(o[k] || o[String(k)] || ''));
    if (!merged) return;
    const pieces = [];
    for (let k = 1; k <= 5; k++) {
      const v = (o[k] || o[String(k)] || '').trim();
      if (!v) continue;
      v.split(/[①②③④⑤]/).map(s => s.trim()).filter(Boolean).forEach(p => pieces.push(p));
    }
    if (!pieces.length) return; // 마커뿐인 손상 데이터는 원본 유지
    const fixed = {};
    pieces.forEach((p, i) => { fixed[i + 1] = p; });
    q.opts = fixed;
  });
})();

// ── Filter UI ──
document.querySelectorAll('#subj-filter .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#subj-filter .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterSubj = btn.dataset.val;
    updateStat();
  });
});
document.querySelectorAll('#year-filter .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#year-filter .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterYear = btn.dataset.val;
    updateStat();
  });
});
document.getElementById('count-sel').addEventListener('change', e => { qCount = parseInt(e.target.value); });

function getPool() {
  return QUIZ_DATA.filter(q =>
    (!filterSubj || q.subj === filterSubj) &&
    (!filterYear || q.year.startsWith(filterYear))
  );
}
function updateStat() {
  const p = getPool();
  document.getElementById('stat-total').textContent = `${p.length}문제 해당`;
}

// ── Shuffle ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Start Quiz ──
function startQuiz() {
  pool = getPool();
  if (!pool.length) { alert('해당 조건의 문제가 없습니다.'); return; }
  sessionQ = shuffle([...pool]).slice(0, Math.min(qCount, pool.length));
  current = 0; correct = 0; answered = 0; wrongs = [];
  show('quiz');
  renderQ();
}

// ── Render Question ──
function renderQ() {
  const q = sessionQ[current];
  const total = sessionQ.length;

  document.getElementById('prog-text').textContent = `${current + 1} / ${total}`;
  document.getElementById('prog-fill').style.width = `${(current / total) * 100}%`;
  document.getElementById('score-badge').textContent = `맞춤: ${correct}`;

  const meta = document.getElementById('q-meta');
  meta.innerHTML = `
    <span class="badge badge-subj">${q.subj}</span>
    <span class="badge badge-year">${q.year}</span>
    <span class="badge badge-num">${q.num}번</span>`;

  document.getElementById('q-text').textContent = q.q;

  // 글상자/그림 이미지 (원본 PDF에서 추출)
  const box = document.getElementById('q-box');
  if (q.img && q.img.length) {
    box.innerHTML = q.img.map(src => `<img class="q-box-img" src="${src}" alt="글상자" loading="lazy">`).join('');
    box.style.display = '';
  } else {
    box.innerHTML = '';
    box.style.display = 'none';
  }

  const nums = ['①','②','③','④','⑤'];
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  [1,2,3,4,5].forEach(n => {
    const txt = q.opts[n] || q.opts[String(n)];
    if (!txt) return;
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-num">${nums[n-1]}</span><span>${txt}</span>`;
    btn.onclick = () => selectOpt(n, btn, q);
    opts.appendChild(btn);
  });

  const rm = document.getElementById('result-msg');
  rm.style.display = 'none'; rm.className = 'result-msg';

  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-finish').style.display = 'none';
}

// ── Select Option ──
function selectOpt(n, btn, q) {
  if (btn.classList.contains('answered')) return;
  // Disable all
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.add('answered'));

  const rm = document.getElementById('result-msg');
  answered++;

  if (n === q.ans) {
    btn.classList.add('correct');
    correct++;
    rm.className = 'result-msg correct';
    rm.textContent = '✅ 정답입니다!';
  } else {
    btn.classList.add('wrong');
    rm.className = 'result-msg wrong';
    const nums = ['①','②','③','④','⑤'];
    rm.textContent = `❌ 오답! 정답은 ${nums[q.ans-1]}번입니다.`;
    // Highlight correct
    const allBtns = document.querySelectorAll('.opt-btn');
    allBtns.forEach((b, i) => { if (i + 1 === q.ans) b.classList.add('show-correct'); });
    wrongs.push({q, chosen: n});
    saveWrong(q, n);
  }
  rm.style.display = 'block';
  document.getElementById('score-badge').textContent = `맞춤: ${correct}`;

  const isLast = current === sessionQ.length - 1;
  if (isLast) {
    document.getElementById('btn-finish').style.display = 'block';
  } else {
    document.getElementById('btn-next').style.display = 'block';
  }
}

// ── Next ──
function nextQ() {
  current++;
  renderQ();
}

// ── Result ──
function showResult() {
  const total = sessionQ.length;
  const pct = Math.round((correct / total) * 100);
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-total').textContent = total;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = total - correct;

  const grades = [
    [90, '🏆 완벽! 유통관리사 합격 확실!'],
    [70, '👍 우수! 합격권에 진입했습니다!'],
    [60, '📈 양호. 조금 더 노력하면 합격!'],
    [40, '💪 기초를 다시 복습해 보세요.'],
    [0,  '📚 처음부터 차근차근 공부합시다.'],
  ];
  const [, msg] = grades.find(([t]) => pct >= t);
  document.getElementById('grade-msg').textContent = msg;
  document.getElementById('review-section').style.display = 'none';
  show('result');
}

// ── Review ──
function toggleReview() {
  const rs = document.getElementById('review-section');
  if (rs.style.display !== 'none') { rs.style.display = 'none'; return; }
  const nums = ['①','②','③','④','⑤'];
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  if (!wrongs.length) {
    list.innerHTML = '<p style="text-align:center;color:#16a34a;padding:12px">오답이 없습니다! 🎉</p>';
  } else {
    wrongs.forEach(({q, chosen}, idx) => {
      const div = document.createElement('div');
      div.className = 'review-item';
      const boxHtml = (q.img && q.img.length)
        ? q.img.map(src => `<img class="review-box-img" src="${src}" alt="글상자">`).join('')
        : '';
      let html = `<div class="review-q">${idx+1}. [${q.year} ${q.num}번] ${q.q}</div>${boxHtml}<div class="review-opts">`;
      [1,2,3,4,5].forEach(n => {
        const txt = q.opts[n] || q.opts[String(n)];
        if (!txt) return;
        let cls = 'rn';
        if (n === q.ans) cls = 'rc';
        else if (n === chosen) cls = 'rw';
        const mark = n === q.ans ? '✅ ' : (n === chosen ? '❌ ' : '');
        html += `<div class="review-opt ${cls}">${mark}${nums[n-1]} ${txt}</div>`;
      });
      html += '</div>';
      div.innerHTML = html;
      list.appendChild(div);
    });
  }
  rs.style.display = 'block';
  rs.scrollIntoView({behavior:'smooth'});
}

// ── Utils ──
function show(id) {
  ['home','quiz','result'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}
function goHome() { show('home'); updateStat(); renderNote(); }

// ── 오답 노트 (localStorage 영구 저장) ──
const WRONG_KEY = 'dist_quiz_wrongs_v1';
// 배포된 백엔드 URL (예: 'https://your-api.onrender.com'). 비우면 서버 수집 비활성.
const API_BASE = '';

function loadWrongs() {
  try { return JSON.parse(localStorage.getItem(WRONG_KEY)) || []; } catch (e) { return []; }
}
function persistWrongs(arr) {
  try { localStorage.setItem(WRONG_KEY, JSON.stringify(arr)); } catch (e) {}
}
function saveWrong(q, chosen) {
  const arr = loadWrongs();
  const id = `${q.year}|${q.num}`;
  if (!arr.some(w => w.id === id)) {               // localStorage는 중복 제외
    arr.push({ id, year: q.year, num: q.num, subj: q.subj, q: q.q,
               opts: q.opts, ans: q.ans, img: q.img || null });
    persistWrongs(arr);
    renderNote();
  }
  postWrongToServer(q, chosen);                    // 서버는 매 오답 기록(집계용)
}

// 오답 1건을 백엔드로 fire-and-forget 전송 (실패해도 퀴즈엔 영향 없음)
function postWrongToServer(q, chosen) {
  if (!API_BASE) return;
  const ansTxt = (q.opts[q.ans] || q.opts[String(q.ans)] || '').toString();
  const img = (q.img && q.img.length) ? new URL(q.img[0], location.href).href : '';
  try {
    fetch(API_BASE.replace(/\/$/, '') + '/api/wrong', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        qkey: `${q.year}|${q.num}`, subject: q.subj, year: q.year, num: q.num,
        question_text: q.q, answer_text: ansTxt, answer_no: q.ans,
        chosen_no: chosen || 0, img_url: img,
      }),
      keepalive: true,
    }).catch(() => {});
  } catch (e) { /* 무시 */ }
}
function clearWrongs() {
  if (!loadWrongs().length) { alert('저장된 오답이 없습니다.'); return; }
  if (!confirm('저장된 오답 기록을 모두 지울까요?')) return;
  localStorage.removeItem(WRONG_KEY);
  renderNote();
}
function renderNote() {
  const el = document.getElementById('note-count');
  if (el) el.textContent = `저장된 오답 ${loadWrongs().length}문제`;
}

// ── 텔레그램으로 오답 보내기 (t.me 공유 링크 · 봇/토큰/로그인 불필요) ──
function buildWrongsMessage() {
  const arr = loadWrongs();
  if (!arr.length) return '';
  const nums = ['①','②','③','④','⑤'];
  const lines = [`📚 유통관리사 오답노트 (${arr.length}문제)`, ''];
  arr.forEach((w, i) => {
    const ansTxt = (w.opts[w.ans] || w.opts[String(w.ans)] || '').toString();
    let block = `${i + 1}. [${w.subj}] ${w.year} ${w.num}번\nQ. ${(w.q || '').trim()}\n✅ 정답 ${nums[w.ans - 1] || ''} ${ansTxt}`;
    if (w.img && w.img.length) block += `\n📷 글상자: ${new URL(w.img[0], location.href).href}`;
    lines.push(block, '');
  });
  return lines.join('\n');
}
function sendWrongsTelegram() {
  const arr = loadWrongs();
  if (!arr.length) { alert('저장된 오답이 없습니다. 먼저 퀴즈를 풀어보세요.'); return; }
  let text = buildWrongsMessage();
  const LIMIT = 3500;   // 텔레그램/URL 길이 안전선
  if (text.length > LIMIT) {
    text = text.slice(0, LIMIT) + '\n…(내용이 길어 일부만 포함했습니다. 기록을 줄이거나 나눠 보내세요.)';
  }
  const url = 'https://t.me/share/url?url=' + encodeURIComponent(location.href) +
              '&text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'noopener');
}

// Init
updateStat();
renderNote();
</script>
