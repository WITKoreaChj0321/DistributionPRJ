<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유통관리사 최빈출 퀴즈</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── 퀴즈 전용 스타일 (style.css 토큰 재사용) ── */
    .quiz-nav { display:flex; gap:8px; margin-bottom:16px; }
    .quiz-nav a { font-size:.86rem; color:var(--text-2); text-decoration:none;
      padding:6px 12px; border:1px solid var(--border); border-radius:var(--radius-sm);
      background:var(--surface); transition:var(--transition); }
    .quiz-nav a:hover { border-color:var(--primary); color:var(--primary); }

    .stat-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
    .stat-box { background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-md); padding:12px 8px; text-align:center; box-shadow:var(--shadow-sm); }
    .stat-box .num { font-size:1.35rem; font-weight:800; color:var(--text-1); line-height:1.1; }
    .stat-box .lbl { font-size:.72rem; color:var(--text-3); margin-top:4px; }
    .stat-box.wrong .num { color:var(--danger); }
    .stat-box.acc .num { color:var(--primary); }

    .quiz-controls { display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:10px; margin-bottom:16px; }
    .wrong-only-wrap { display:flex; align-items:center; gap:7px; font-size:.86rem; color:var(--text-2); cursor:pointer; }
    .wrong-only-wrap input { width:16px; height:16px; accent-color:var(--primary); cursor:pointer; }

    .quiz-qhead { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .quiz-qtext { font-size:1.08rem; font-weight:700; color:var(--text-1);
      line-height:1.55; margin-bottom:18px; word-break:keep-all; }

    .choice-btn { display:flex; align-items:flex-start; gap:12px; width:100%;
      text-align:left; background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius-md); padding:14px 16px; margin-bottom:10px;
      font-size:.95rem; color:var(--text-1); cursor:pointer; transition:var(--transition); line-height:1.5; }
    .choice-btn:not(:disabled):hover { border-color:var(--primary); background:var(--primary-light); }
    .choice-btn:disabled { cursor:default; }
    .choice-num { flex:0 0 26px; width:26px; height:26px; border-radius:50%;
      background:var(--primary-light); color:var(--primary); font-weight:700; font-size:.85rem;
      display:flex; align-items:center; justify-content:center; }
    .choice-text { flex:1; word-break:keep-all; }
    .choice-btn.correct { border-color:var(--success); background:#ECFDF5; }
    .choice-btn.correct .choice-num { background:var(--success); color:#fff; }
    .choice-btn.wrong { border-color:var(--danger); background:#FEF2F2; }
    .choice-btn.wrong .choice-num { background:var(--danger); color:#fff; }

    .quiz-feedback { border-radius:var(--radius-md); padding:13px 16px; font-weight:700;
      font-size:.95rem; margin-top:6px; }
    .quiz-feedback.ok { background:#ECFDF5; color:#065F46; }
    .quiz-feedback.no { background:#FEF2F2; color:#991B1B; }
    .quiz-explain { margin-top:10px; padding:13px 16px; background:var(--bg);
      border-radius:var(--radius-md); font-size:.88rem; color:var(--text-2); line-height:1.6; word-break:keep-all; }
    .quiz-next-wrap { margin-top:16px; text-align:center; }
    .hidden { display:none !important; }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">&#128221;</span>
          <span class="logo-text">유통관리사 최빈출 퀴즈</span>
        </div>
        <p class="header-desc">여러 해 반복 출제된 핵심 문제를 직접 풀어보세요 · 틀린 문제는 더 자주 출제됩니다</p>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">

      <nav class="quiz-nav">
        <a href="index.html">&#128293; 최빈출 목록 / 카카오 전송</a>
        <a href="quiz.html" style="border-color:var(--primary);color:var(--primary);">&#128221; 퀴즈 풀기</a>
      </nav>

      <!-- 통계 -->
      <div class="stat-bar">
        <div class="stat-box"><div class="num" id="stat-total">0</div><div class="lbl">푼 문제</div></div>
        <div class="stat-box"><div class="num" id="stat-correct">0</div><div class="lbl">맞힌 횟수</div></div>
        <div class="stat-box acc"><div class="num" id="stat-acc">–</div><div class="lbl">정답률</div></div>
        <div class="stat-box wrong"><div class="num" id="stat-wrong">0</div><div class="lbl">틀린 문제</div></div>
      </div>

      <!-- 과목 필터 -->
      <div id="subject-tabs" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
        <button class="btn btn-sm subject-tab active" data-subject="전체">전체</button>
        <button class="btn btn-sm subject-tab" data-subject="유통물류일반관리">유통물류</button>
        <button class="btn btn-sm subject-tab" data-subject="상권분석">상권분석</button>
        <button class="btn btn-sm subject-tab" data-subject="유통마케팅">유통마케팅</button>
        <button class="btn btn-sm subject-tab" data-subject="유통정보">유통정보</button>
      </div>

      <div class="quiz-controls">
        <label class="wrong-only-wrap">
          <input type="checkbox" id="wrong-only" />
          틀린 문제만 풀기
        </label>
        <button class="btn btn-sm btn-ghost" id="reset-btn" type="button">기록 초기화</button>
      </div>

      <!-- ===== 퀴즈 카드 ===== -->
      <section class="card" id="quiz-card">
        <div class="quiz-qhead">
          <span class="badge badge-subject" id="quiz-subject"></span>
          <span class="badge badge-year" id="quiz-freq"></span>
        </div>
        <p class="quiz-qtext" id="quiz-qtext">불러오는 중...</p>

        <div id="quiz-choices"></div>

        <div class="quiz-feedback hidden" id="quiz-feedback"></div>
        <div class="quiz-explain hidden" id="quiz-explain"></div>

        <div class="quiz-next-wrap">
          <button class="btn btn-primary btn-lg hidden" id="quiz-next-btn" type="button">다음 문제 &rarr;</button>
        </div>
      </section>

      <!-- ===== TOAST ===== -->
      <div class="toast hidden" id="toast">
        <span class="toast-icon" id="toast-icon"></span>
        <span class="toast-msg" id="toast-msg"></span>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2025 유통관리사 최빈출 퀴즈 &nbsp;|&nbsp; 본 서비스는 학습 보조 목적으로 제공됩니다.</p>
    </div>
  </footer>

  <script src="quiz.js?v=1"></script>
</body>
</html>
