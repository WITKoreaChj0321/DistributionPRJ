<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유통관리사 최빈출 기출문제</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">&#128293;</span>
          <span class="logo-text">유통관리사 최빈출 기출</span>
        </div>
        <p class="header-desc">여러 해 반복 출제된 핵심 문제를 골라 카카오톡으로 받아보세요</p>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">

      <!-- ===== 카카오 연동 (선택) ===== -->
      <section class="card" id="section-kakao">
        <h2 class="section-title">
          <span class="section-num">&#128172;</span>
          카카오톡 연동 <span style="font-size:.8rem;font-weight:400;color:#94A3B8;">(전송하려면 로그인)</span>
        </h2>

        <div class="kakao-login-area" id="kakao-login-area">
          <button class="btn btn-kakao btn-lg" id="kakao-login-btn" type="button"
                  onclick="window.location.href='/auth/kakao';">
            <span class="kakao-icon">&#128172;</span>
            카카오 로그인
          </button>
          <p class="kakao-hint">로그인하면 최빈출 문제를 나 또는 친구에게 보낼 수 있습니다.</p>
        </div>

        <div class="kakao-friend-area hidden" id="kakao-friend-area">
          <div class="kakao-user-info" id="kakao-user-info">
            <div class="user-avatar" id="user-avatar">&#128100;</div>
            <div class="user-details">
              <span class="user-name" id="user-name">사용자</span>
              <span class="user-logged-in">로그인됨</span>
            </div>
            <button class="btn btn-sm btn-ghost" id="kakao-logout-btn" type="button">로그아웃</button>
          </div>
          <div class="friend-select-wrap">
            <label class="form-label" for="friend-select">전송 대상</label>
            <div class="select-wrap">
              <select class="form-select" id="friend-select">
                <option value="me">나에게 보내기</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <!-- ===== 최빈출 문제 ===== -->
      <section class="card" id="section-frequent">
        <h2 class="section-title">
          <span class="section-num">&#128293;</span>
          최빈출 기출문제
        </h2>
        <p class="section-desc">2020~2025년 기출 중 여러 해 반복 출제된 핵심 문제입니다.</p>

        <!-- 과목 필터 -->
        <div id="subject-tabs" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
          <button class="btn btn-sm subject-tab active" data-subject="전체">전체</button>
          <button class="btn btn-sm subject-tab" data-subject="유통물류일반관리">유통물류</button>
          <button class="btn btn-sm subject-tab" data-subject="상권분석">상권분석</button>
          <button class="btn btn-sm subject-tab" data-subject="유통마케팅">유통마케팅</button>
          <button class="btn btn-sm subject-tab" data-subject="유통정보">유통정보</button>
        </div>

        <!-- 개수 선택 -->
        <div class="friend-select-wrap" style="margin-bottom:16px;">
          <label class="form-label" for="count-select">표시 개수</label>
          <div class="select-wrap">
            <select class="form-select" id="count-select">
              <option value="10">10개</option>
              <option value="20" selected>20개</option>
              <option value="30">30개</option>
            </select>
          </div>
        </div>

        <div id="frequent-list">
          <p style="color:#94A3B8;font-size:.9rem;padding:20px 0;text-align:center;">불러오는 중...</p>
        </div>

        <!-- 전송 액션 -->
        <div class="result-actions">
          <button class="btn btn-kakao btn-lg" id="send-frequent-btn" type="button">
            <span class="kakao-icon">&#128172;</span>
            카카오톡으로 전송
          </button>
        </div>
        <p style="font-size:.76rem;color:#94A3B8;margin-top:8px;text-align:center;">
          전송 시 화면에 보이는 과목·개수만큼 보내드립니다.
        </p>
      </section>

      <!-- ===== TOAST ===== -->
      <div class="toast hidden" id="toast">
        <span class="toast-icon" id="toast-icon"></span>
        <span class="toast-msg" id="toast-msg"></span>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2025 유통관리사 최빈출 기출 &nbsp;|&nbsp; 본 서비스는 학습 보조 목적으로 제공됩니다.</p>
    </div>
  </footer>

  <script src="/static/frequent.js?v=1"></script>
</body>
</html>
